        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        /* Loading spinner */
        .trade-spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }

        /* Game card hover */
        .game-card { transition: transform 0.2s, box-shadow 0.2s; }
        .game-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

        /* Modal overlay */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; }

        /* Progress bar */
        .progress-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

        /* Table styles for dashboard */
        .score-table { width: 100%; border-collapse: collapse; }
        .score-table th, .score-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .score-table th { background: rgba(255,255,255,0.05); color: #94a3b8; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .score-table tr:hover { background: rgba(255,255,255,0.03); }

        /* Emoji icon sizing */
        .emoji-icon { font-size: 1.2em; vertical-align: middle; }
        .emoji-icon-lg { font-size: 1.5em; }
        .emoji-icon-xl { font-size: 2em; }

        .tip-card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid rgba(250,204,21,0.3); border-radius: 12px; padding: 16px; }

        /* 1st place — Gold gradient + shimmer animation */

            border: 2px solid rgba(234,179,8,0.6);
            box-shadow: 0 0 20px rgba(234,179,8,0.2), inset 0 0 20px rgba(234,179,8,0.05);
            animation: shimmerGold 3s ease-in-out infinite, fadeInUp 0.5s ease-out;
            transform: scale(1.02);
        }

        /* 2nd place — Silver gradient + subtle glow */
        .leaderboard-rank-2 {
            background: linear-gradient(135deg, rgba(192,192,220,0.2), rgba(148,163,184,0.15), rgba(192,192,220,0.2));
            border: 2px solid rgba(192,192,220,0.5);
            box-shadow: 0 0 15px rgba(192,192,220,0.15);
            animation: glowSilver 4s ease-in-out infinite, fadeInUp 0.5s ease-out;

        /* 3rd place — Bronze/copper gradient */

            border: 2px solid rgba(205,127,50,0.4);
            box-shadow: 0 0 10px rgba(205,127,50,0.1);
            animation: fadeInUp 0.5s ease-out;
        }

            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            animation: fadeInUp 0.5s ease-out;
        }

            0%, 100% {

    // =====================================================================
    //  TradeGameBridge — Auth + API integration
    // =====================================================================
    const TradeGameBridge = {
        user: null,
        _ready: false,

        async init() {
            const userData = await AuthModule.requireAuth('/login');
            if (!userData) return false;

            let userInfo = null;
            try {
                userInfo = await AuthModule.getUserInfo();
            } catch(e) {
                console.warn('getUserInfo failed, using verify data', e);
            }

            this.user = {
                id: userData.id || userData.user_id,
                username: userData.username || userData.sub,
                name: userInfo?.display_name || userInfo?.real_name || userInfo?.nickname || userData.display_name || userData.username || userData.sub || '玩家',
                role: userData.role || 'student',
                class_name: userInfo?.class_name || userData.class_name || '',
            };
            this._ready = true;
            return true;
        },

        isTeacher() {
            return this.user && ['teacher', 'admin'].includes(this.user.role);
        },

        async checkAccess() {
            const resp = await APIClient.get('/api/trade-game/access');
            return resp?.data || { allowed: false };
        },

        async checkPlayed() {
            const resp = await APIClient.get('/api/trade-game/scores/check');
            return resp?.data || { played: false, score: null };
        },

        async submitScore(scoreData) {
            return APIClient.post('/api/trade-game/scores', scoreData);
        },

        async getLeaderboard(difficulty, limit = 50) {
            const params = { limit };
            if (difficulty) params.difficulty = difficulty;
            const resp = await APIClient.get('/api/trade-game/scores/leaderboard', params);
            return resp?.data || [];
        },

        async getAllScores(className) {
            const params = {};
            if (className) params.class_name = className;
            const resp = await APIClient.get('/api/trade-game/scores/all', params);
            return resp?.data || [];
        },

        async deleteScore(scoreId) {
            return APIClient.delete(`/api/trade-game/scores/${scoreId}`);
        },

        async updateScore(scoreId, data) {
            return APIClient.put(`/api/trade-game/scores/${scoreId}`, data);
        },

        getExportUrl(className) {
            const token = AuthModule.getToken();
            let url = `/api/trade-game/scores/export?token=${encodeURIComponent(token)}`;
            if (className) url += `&class_name=${encodeURIComponent(className)}`;
            return url;
        }
    };

    // =====================================================================

    function useLanguage() {
        const [lang, setLang] = useState(() => localStorage.getItem('trade_lang') || 'zh');
        const t = useCallback((key) => LANG[lang]?.[key] || LANG.zh[key] || key, [lang]);
        const toggleLang = useCallback(() => {
            const next = lang === 'zh' ? 'en' : 'zh';
            setLang(next);
            localStorage.setItem('trade_lang', next);
        }, [lang]);
        return { lang, t, toggleLang };
    }

    const MAX_TURNS = 20;

    // =====================================================================
    //  Helper: calculate score (uses static base prices)
    // =====================================================================
    function calcScore(state) {
        const inventoryValue =
            (state.inventory.food || 0) * RESOURCE_KEYS.FOOD.basePrice +
            (state.inventory.industry || 0) * RESOURCE_KEYS.INDUSTRY.basePrice +
            (state.inventory.tech || 0) * RESOURCE_KEYS.TECH.basePrice;
        return Math.round(state.money + inventoryValue + state.security * 10);
    }

    // =====================================================================
    //  Helper: generate market prices (uses static data)
    // =====================================================================
    function generatePrices(basePrices, event) {
        const prices = {};
        for (const [key, res] of Object.entries(RESOURCE_KEYS)) {
            const base = res.basePrice;
            const eventMod = event ? (event.effects[res.key] || 0) : 0;
            const randomMod = (Math.random() - 0.5) * 0.3;
            const finalPrice = Math.max(10, Math.round(base * (1 + eventMod + randomMod)));
            prices[res.key] = finalPrice;
        }
        return prices;
    }

    // =====================================================================
    //  Helper: AI decision (uses static data)
    // =====================================================================
    function aiTurn(aiState, prices, difficulty) {
        const actions = [];
        const diff = DIFF_DATA[difficulty];

        for (const [key, res] of Object.entries(RESOURCE_KEYS)) {
            const price = prices[res.key];
            const owned = aiState.inventory[res.key] || 0;

            if (price > res.basePrice * 1.2 && owned > 2) {
                const sellQty = Math.min(owned - 1, Math.ceil(owned * 0.5));
                aiState.inventory[res.key] -= sellQty;
                aiState.money += sellQty * price;
                actions.push({ type: 'sell', resource: res.key, qty: sellQty, price });
            }
            else if (price < res.basePrice * 0.85 && aiState.money > price * 3) {
                const buyQty = Math.min(5, Math.floor(aiState.money * 0.2 / price));
                if (buyQty > 0) {
                    aiState.inventory[res.key] += buyQty;
                    aiState.money -= buyQty * price;
                    actions.push({ type: 'buy', resource: res.key, qty: buyQty, price });
                }
            }
        }

        if (difficulty === 'HARD' && aiState.security < 80 && aiState.money > 300) {
            const invest = Math.min(300, Math.floor(aiState.money * 0.15));
            aiState.money -= invest;
            aiState.security = Math.min(100, aiState.security + Math.floor(invest / 30));
        } else if (aiState.security < 50 && aiState.money > 200) {
            const invest = Math.min(200, Math.floor(aiState.money * 0.1));
            aiState.money -= invest;
            aiState.security = Math.min(100, aiState.security + Math.floor(invest / 30));
        }

        return actions;
    }

                            <label className="block text-sm font-medium text-gray-300 mb-2">{t('yourCountryLabel')}</label>
                            <div className="grid grid-cols-3 gap-3">
                                {Object.entries(gd.SPECIALIZATIONS).map(([key, spec]) => (
                                    <button
                                        key={key}
                                        onClick={() => setPlayerSpec(key)}
                                        className={`p-3 rounded-xl border-2 transition-all text-center ${
                                            playerSpec === key
                                                ? 'border-blue-500 bg-blue-500/10'
                                                : 'border-gray-600 bg-gray-700/30 hover:border-gray-500'
                                        }`}
                                    >
                                        <div className="text-2xl mb-1">{spec.icon}</div>
                                        <div className="font-semibold text-sm" style={{ color: spec.color }}>{spec.name}</div>
                                        <div className="text-xs text-gray-400 mt-1">{spec.desc}</div>
                                        <div className="text-xs text-gray-500 mt-1">
                                            🌾{spec.production.food} 🏭{spec.production.industry} 💻{spec.production.tech}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* AI Specialization */}
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">{t('aiCountryLabel')}</label>
                            <div className="grid grid-cols-3 gap-3">
                                {Object.entries(gd.SPECIALIZATIONS).map(([key, spec]) => (
                                    <button
                                        key={key}
                                        onClick={() => setAiSpec(key)}
                                        className={`p-3 rounded-xl border-2 transition-all text-center ${
                                            aiSpec === key
                                                ? 'border-red-500 bg-red-500/10'
                                                : 'border-gray-600 bg-gray-700/30 hover:border-gray-500'
                                        }`}
                                    >
                                        <div className="text-2xl mb-1">{spec.icon}</div>
                                        <div className="font-semibold text-sm" style={{ color: spec.color }}>{spec.name}</div>
                                        <div className="text-xs text-gray-400 mt-1">{spec.desc}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Rules toggle */}
                        <div>
                            <button onClick={() => setShowRulesPanel(!showRulesPanel)} className="flex items-center gap-2 text-sm text-amber-400 hover:text-amber-300 transition-colors">
                                📖 {showRulesPanel ? t('hideRules') : t('showRules')}
                            </button>
                            {showRulesPanel && (
                                <div className="mt-3 bg-gray-700/40 rounded-lg p-4 text-sm text-gray-300 space-y-2 animate-fade-in-up">
                                    <p>{t('ruleGoal').replace('{max}', MAX_TURNS)}</p>
                                    <p>{t('ruleScore')}</p>
                                    <p>{t('ruleTurn')}</p>
                                    <p>{t('ruleSecurity')}</p>
                                    <p>{t('ruleEvent')}</p>
                                    <p>{t('ruleSanction')}</p>
                                </div>
                            )}
                        </div>

                        {/* Start Button */}
                        <button
                            onClick={() => onStart(difficulty, playerSpec, aiSpec)}
                            className="w-full py-4 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white font-bold text-lg rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-amber-500/20"
                        >
                            {t('startGame')}
                        </button>

                        {/* Trial Play Button */}
                        {showTrialOption && onTrialStart && (
                            <button
                                onClick={() => onTrialStart(difficulty, playerSpec, aiSpec)}
                                className="w-full py-3 bg-gray-700/60 hover:bg-gray-600/60 text-gray-300 hover:text-white font-medium rounded-xl transition-all border border-gray-600 hover:border-gray-500"
                            >
                                {t('trialModeBtn')}
                            </button>
                        )}

                        {/* Personal Best Score */}
                        {bestScore && (
                            <div className="bg-amber-900/20 border border-amber-500/30 rounded-xl p-4 text-center">
                                <div className="text-sm text-amber-400/80 mb-1">{t('yourScoreLabel')}</div>
                                <div className="text-2xl font-bold text-amber-400">{(bestScore.player_score || 0).toLocaleString()}</div>
                            </div>
                        )}
                    </div>

                    {/* Leaderboard below setup form */}
                    <div className="mt-6">
                        <TabbedLeaderboard t={t} />
                    </div>
                </div>
            </div>
        );
    }

    // =====================================================================
    //  GameScreen Component (main gameplay)
    // =====================================================================
    function GameScreen({ config, playerName, onGameEnd, isTrialMode, t }) {
        const { difficulty, playerSpec, aiSpec } = config;
        const playerProd = SPEC_DATA[playerSpec].production;
        const aiProd = SPEC_DATA[aiSpec].production;

        const gd = useMemo(() => getGameData(t), [t]);

        const [turn, setTurn] = useState(1);
        const [phase, setPhase] = useState('production');
        const [playerState, setPlayerState] = useState({
            money: 1500,
            security: 100,
            inventory: { food: 10, industry: 5, tech: 2 },
        });
        const [aiState, setAiState] = useState({
            money: 1500 + DIFF_DATA[difficulty].bonusMoney,
            security: 100,
            inventory: { food: 10, industry: 5, tech: 2 },
        });
        const [prices, setPrices] = useState(() => generatePrices(RESOURCE_KEYS, null));
        const [currentEvent, setCurrentEvent] = useState(null);
        const [log, setLog] = useState([]);
        const [showTip, setShowTip] = useState(null);
        const [stats, setStats] = useState({
            trades: 0, good_trades: 0, bad_trades: 0,
            security_invests: 0, sanctions_used: 0, tips_read: 0,
            bankrupt_reason: null,
        });
        const [gameOver, setGameOver] = useState(false);
        const [tradeInput, setTradeInput] = useState({ resource: 'food', qty: 1 });
        const [selectedFeedback, setSelectedFeedback] = useState([]);
        const [leaderboard, setLeaderboard] = useState([]);
        const [submitting, setSubmitting] = useState(false);
        const [submitted, setSubmitted] = useState(false);

        const logRef = useRef(null);
        const playerRef = useRef(playerState);
        playerRef.current = playerState;

        const addLog = useCallback((msg, type = 'info') => {
            setLog(prev => [...prev, { msg, type, turn }]);
        }, [turn]);

        useEffect(() => {
            if (logRef.current) {
                logRef.current.scrollTop = logRef.current.scrollHeight;
            }
        }, [log]);

        // Check bankrupt
        useEffect(() => {
            if (gameOver) return;
            if (playerState.money <= 0) {
                setStats(s => ({ ...s, bankrupt_reason: 'money' }));
                endGame('bankrupt');
            } else if (playerState.security <= 0) {
                setStats(s => ({ ...s, bankrupt_reason: 'security' }));
                endGame('bankrupt');
            }
        }, [playerState.money, playerState.security, gameOver]);

        // Production
        const doProduction = useCallback(() => {
            setPlayerState(prev => ({
                ...prev,
                inventory: {
                    food: prev.inventory.food + playerProd.food,
                    industry: prev.inventory.industry + playerProd.industry,
                    tech: prev.inventory.tech + playerProd.tech,
                },
            }));
            setAiState(prev => ({
                ...prev,
                inventory: {
                    food: prev.inventory.food + aiProd.food,
                    industry: prev.inventory.industry + aiProd.industry,
                    tech: prev.inventory.tech + aiProd.tech,
                },
            }));
            addLog(t('logProduction').replace('{turn}', turn).replace('{food}', playerProd.food).replace('{industry}', playerProd.industry).replace('{tech}', playerProd.tech), 'production');
        }, [turn, playerProd, aiProd, addLog, t]);

        // Event
        const doEvent = useCallback(() => {
            if (Math.random() < 0.6) {
                const evtBase = EVENT_DATA[Math.floor(Math.random() * EVENT_DATA.length)];
                // Build translated event
                const evtIdx = EVENT_DATA.indexOf(evtBase);
                const evt = gd.EVENTS[evtIdx];
                setCurrentEvent(evt);
                setPlayerState(prev => ({
                    ...prev,
                    security: Math.max(0, Math.min(100, prev.security + evt.securityImpact)),
                }));
                setAiState(prev => ({
                    ...prev,
                    security: Math.max(0, Math.min(100, prev.security + evt.securityImpact)),
                }));
                addLog(t('logEvent').replace('{name}', evt.name).replace('{desc}', evt.description), 'event');
                return evt;
            } else {
                setCurrentEvent(null);
                return null;
            }
        }, [addLog, t, gd]);

        // Market
        const doMarket = useCallback((evt) => {
            const newPrices = generatePrices(RESOURCE_KEYS, evt);
            setPrices(newPrices);
            return newPrices;
        }, []);

        // Start turn sequence
        useEffect(() => {
            if (phase === 'production' && !gameOver) {
                doProduction();
                const evt = doEvent();
                const newPrices = doMarket(evt);

                const aiActions = aiTurn({ ...aiState, inventory: { ...aiState.inventory } }, newPrices, difficulty);
                if (aiActions.length > 0) {
                    setAiState(prev => {
                        let money = prev.money;
                        let inv = { ...prev.inventory };
                        for (const act of aiActions) {
                            if (act.type === 'buy') {
                                inv[act.resource] += act.qty;
                                money -= act.qty * act.price;
                            } else if (act.type === 'sell') {
                                inv[act.resource] -= act.qty;
                                money += act.qty * act.price;
                            }
                        }
                        return { ...prev, money, inventory: inv };
                    });
                }

                setPhase('action');
            }
        }, [turn, gameOver]);

        // Buy resource
        const handleBuy = (resKey, qty) => {
            const current = playerRef.current;
            const price = prices[resKey];
            const cost = price * qty;
            if (cost > current.money) {
                addLog(t('logInsufficientFunds').replace('{need}', cost).replace('{have}', current.money), 'error');
                return;
            }
            setPlayerState(prev => {
                if (cost > prev.money) return prev;
                return {
                    ...prev,
                    money: prev.money - cost,
                    inventory: { ...prev.inventory, [resKey]: prev.inventory[resKey] + qty },
                };
            });
            playerRef.current = {
                ...current,
                money: current.money - cost,
                inventory: { ...current.inventory, [resKey]: current.inventory[resKey] + qty },
            };
            const isGood = price < RESOURCE_KEYS[Object.keys(RESOURCE_KEYS).find(k => RESOURCE_KEYS[k].key === resKey)].basePrice;
            setStats(s => ({
                ...s,
                trades: s.trades + 1,
                good_trades: s.good_trades + (isGood ? 1 : 0),
                bad_trades: s.bad_trades + (isGood ? 0 : 1),
            }));
            addLog(t('logBuy').replace('{qty}', qty).replace('{res}', resKey).replace('{price}', price).replace('{cost}', cost), 'trade');
        };

        // Sell resource
        const handleSell = (resKey, qty) => {
            const current = playerRef.current;
            if (current.inventory[resKey] < qty) {
                addLog(t('logInsufficientStock').replace('{have}', current.inventory[resKey]).replace('{res}', resKey), 'error');
                return;
            }
            const price = prices[resKey];
            const income = price * qty;
            setPlayerState(prev => {
                if (prev.inventory[resKey] < qty) return prev;
                return {
                    ...prev,
                    money: prev.money + income,
                    inventory: { ...prev.inventory, [resKey]: prev.inventory[resKey] - qty },
                };
            });
            playerRef.current = {
                ...current,
                money: current.money + income,
                inventory: { ...current.inventory, [resKey]: current.inventory[resKey] - qty },
            };
            const resType = Object.keys(RESOURCE_KEYS).find(k => RESOURCE_KEYS[k].key === resKey);
            const isGood = price > RESOURCE_KEYS[resType].basePrice;
            setStats(s => ({
                ...s,
                trades: s.trades + 1,
                good_trades: s.good_trades + (isGood ? 1 : 0),
                bad_trades: s.bad_trades + (isGood ? 0 : 1),
            }));
            addLog(t('logSell').replace('{qty}', qty).replace('{res}', resKey).replace('{price}', price).replace('{income}', income), 'trade');
        };

        // Invest in security
        const handleInvestSecurity = (amount) => {
            const invest = Math.min(amount, playerState.money);
            if (invest <= 0) {
                addLog(t('logNoFundsForSecurity'), 'error');
                return;
            }
            const gain = Math.floor(invest / 25);
            setPlayerState(prev => ({
                ...prev,
                money: prev.money - invest,
                security: Math.min(100, prev.security + gain),
            }));
            setStats(s => ({ ...s, security_invests: s.security_invests + 1 }));
            addLog(t('logInvestSecurity').replace('{amount}', invest).replace('{gain}', gain), 'security');
        };

        // Sanction
        const handleSanction = () => {
            if (playerState.money < 200) {
                addLog(t('logSanctionMin'), 'error');
                return;
            }
            const cost = 200;
            const damage = Math.floor(Math.random() * 300) + 100;
            const selfDamage = Math.floor(Math.random() * 100) + 50;
            setPlayerState(prev => ({
                ...prev,
                money: prev.money - cost - selfDamage,
                security: Math.max(0, prev.security - 5),
            }));
            setAiState(prev => ({
                ...prev,
                money: Math.max(0, prev.money - damage),
                security: Math.max(0, prev.security - 10),
            }));
            setStats(s => ({ ...s, sanctions_used: s.sanctions_used + 1 }));
            addLog(t('logSanction').replace('{damage}', damage).replace('{selfDamage}', selfDamage + cost), 'sanction');
        };

        // Read knowledge tip
        const handleReadTip = () => {
            const tips = gd.KNOWLEDGE_TIPS;
            const unread = tips.filter(tp => !log.some(l => l.msg.includes(tp.title)));
            if (unread.length === 0) {
                const tip = tips[Math.floor(Math.random() * tips.length)];
                setShowTip(tip);
            } else {
                const tip = unread[Math.floor(Math.random() * unread.length)];
                setShowTip(tip);
            }
            setStats(s => ({ ...s, tips_read: s.tips_read + 1 }));
        };

        // End turn
        const handleEndTurn = () => {
            if (turn >= MAX_TURNS) {
                endGame(calcScore(playerState) > calcScore(aiState) ? 'win' : 'lose');
            } else {
                setTurn(t => t + 1);
                setPhase('production');
                setCurrentEvent(null);
            }
        };

        // End game
        const endGame = useCallback((result) => {
            setGameOver(true);
            const playerScore = calcScore(playerState);
            const aiScore = calcScore(aiState);
            const finalResult = result || (playerScore > aiScore ? 'win' : 'lose');

            if (finalResult === 'win') addLog(t('logGameEndWin'), 'end');
            else if (finalResult === 'bankrupt') addLog(t('logGameEndBankrupt'), 'end');
            else addLog(t('logGameEndLose'), 'end');

            if (!isTrialMode) {
                submitGameScore(finalResult, playerScore, aiScore);
            }

            TradeGameBridge.getLeaderboard(difficulty).then(data => {
                setLeaderboard(data || []);
            }).catch(err => console.error('Failed to load leaderboard:', err));
        }, [playerState, aiState, difficulty, isTrialMode, stats, turn, config, t]);

        // Submit score
        const submitGameScore = async (result, playerScore, aiScore) => {
            if (submitted || submitting) return;
            setSubmitting(true);
            try {
                const payload = {
                    difficulty: difficulty,
                    player_spec: playerSpec,
                    ai_spec: aiSpec,
                    result: result,
                    player_score: playerScore,
                    ai_score: aiScore,
                    turns_played: Math.min(turn, MAX_TURNS),
                    final_money: playerState.money,
                    final_security: playerState.security,
                    final_inventory: { ...playerState.inventory },
                    stats: { ...stats },
                    feedback_tags: selectedFeedback,
                };
                await TradeGameBridge.submitScore(payload);
                setSubmitted(true);
                addLog(t('logScoreSubmitted'), 'success');
            } catch (err) {
                console.error('Score submit error:', err);
                addLog(t('logScoreSubmitFail') + (err.message || t('unknownError')), 'error');
            }
            setSubmitting(false);
        };

        const playerScore = calcScore(playerState);
        const aiScore = calcScore(aiState);
        const turnProgress = (turn / MAX_TURNS) * 100;

        // ---- Game Over Screen ----
        if (gameOver) {
            const result = stats.bankrupt_reason ? 'bankrupt' : (playerScore > aiScore ? 'win' : 'lose');
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-2xl w-full animate-fade-in-up space-y-6">
                        {/* Result Header */}
                        <div className="text-center">
                            <div className="text-6xl mb-4">
                                {result === 'win' ? '🏆' : result === 'bankrupt' ? '💀' : '📉'}
                            </div>
                            <h1 className={`text-3xl font-bold ${result === 'win' ? 'text-yellow-400' : result === 'bankrupt' ? 'text-red-400' : 'text-gray-400'}`}>
                                {result === 'win' ? t('resultWinTitle') : result === 'bankrupt' ? t('resultBankruptTitle') : t('resultLoseTitle')}
                            </h1>
                            <p className="text-gray-400 mt-2">
                                {result === 'win'
                                    ? t('resultWinDesc')
                                    : result === 'bankrupt'
                                    ? (stats.bankrupt_reason === 'money' ? t('resultBankruptMoney') : t('resultBankruptSecurity'))
                                    : t('resultLoseDesc')}
                            </p>
                        </div>

                        {/* Score comparison */}
                        <div className="bg-gray-800/60 rounded-2xl p-6 border border-gray-700">
                            <h2 className="text-lg font-bold text-white mb-4">{t('finalSettlement')}</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-4 text-center">
                                    <div className="text-sm text-blue-400 mb-1">👤 {playerName}</div>
                                    <div className="text-3xl font-bold text-white">{playerScore.toLocaleString()}</div>
                                    <div className="text-xs text-gray-400 mt-1">
                                        💰${playerState.money} | 🛡️{playerState.security} | 🌾{playerState.inventory.food} 🏭{playerState.inventory.industry} 💻{playerState.inventory.tech}
                                    </div>
                                </div>
                                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center">
                                    <div className="text-sm text-red-400 mb-1">🤖 AI ({gd.AI_DIFFICULTIES[difficulty].name})</div>
                                    <div className="text-3xl font-bold text-white">{aiScore.toLocaleString()}</div>
                                    <div className="text-xs text-gray-400 mt-1">
                                        💰${aiState.money} | 🛡️{aiState.security} | 🌾{aiState.inventory.food} 🏭{aiState.inventory.industry} 💻{aiState.inventory.tech}
                                    </div>
                                </div>
                            </div>

                            {/* Stats */}
                            <div className="grid grid-cols-3 gap-3 mt-4">
                                <div className="bg-gray-700/40 rounded-lg p-3 text-center">
                                    <div className="text-xs text-gray-400">{t('statTrades')}</div>
                                    <div className="text-lg font-bold text-white">{stats.trades}</div>
                                </div>
                                <div className="bg-gray-700/40 rounded-lg p-3 text-center">
                                    <div className="text-xs text-gray-400">{t('statGoodBad')}</div>
                                    <div className="text-lg font-bold text-white">{stats.good_trades} / {stats.bad_trades}</div>
                                </div>
                                <div className="bg-gray-700/40 rounded-lg p-3 text-center">
                                    <div className="text-xs text-gray-400">{t('statTipsRead')}</div>
                                    <div className="text-lg font-bold text-white">{stats.tips_read}</div>
                                </div>
                            </div>
                        </div>

                        {/* Feedback Tags */}
                        {!isTrialMode && !submitted && (
                            <div className="bg-gray-800/60 rounded-2xl p-6 border border-gray-700">
                                <h2 className="text-lg font-bold text-white mb-3">{t('feedbackTitle')}</h2>
                                <p className="text-sm text-gray-400 mb-3">{t('feedbackDesc')}</p>
                                <div className="flex flex-wrap gap-2">
                                    {gd.FEEDBACK_TAGS.map(tag => (
                                        <button
                                            key={tag}
                                            onClick={() => {
                                                setSelectedFeedback(prev =>
                                                    prev.includes(tag) ? prev.filter(ft => ft !== tag) : [...prev, tag]
                                                );
                                            }}
                                            className={`px-3 py-1.5 rounded-full text-sm transition-all ${
                                                selectedFeedback.includes(tag)
                                                    ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50'
                                                    : 'bg-gray-700/40 text-gray-400 border border-gray-600 hover:border-gray-500'
                                            }`}
                                        >
                                            {tag}
                                        </button>
                                    ))}
                                </div>
                                <button
                                    onClick={() => submitGameScore(result, playerScore, aiScore)}
                                    disabled={submitting}
                                    className="mt-4 px-6 py-2 bg-green-600 hover:bg-green-500 disabled:bg-gray-600 text-white rounded-lg text-sm font-medium transition-colors"
                                >
                                    {submitting ? t('submitting') : t('submitScoreBtn')}
                                </button>
                            </div>
                        )}

                        {submitted && (
                            <div className="bg-green-900/20 border border-green-500/30 rounded-xl p-4 text-center text-green-400">
                                {t('scoreSubmittedMsg')}
                            </div>
                        )}

                        {isTrialMode && (
                            <div className="bg-amber-900/20 border border-amber-500/30 rounded-xl p-4 text-center text-amber-400">
                                {t('trialNoRecord')}
                            </div>
                        )}

                        {/* Leaderboard */}
                        <EnhancedLeaderboard leaderboard={leaderboard} t={t} />

                        {/* Action Buttons */}
                        <div className="flex gap-3 justify-center">
                            <button
                                onClick={() => onGameEnd('restart')}
                                className="px-6 py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-xl font-medium transition-colors"
                            >
                                {t('restartBtn')}
                            </button>
                            {(isTrialMode || TradeGameBridge.isTeacher()) && (
                                <button
                                    onClick={() => onGameEnd('back')}
                                    className="px-6 py-3 bg-gray-600 hover:bg-gray-500 text-white rounded-xl font-medium transition-colors"
                                >
                                    {TradeGameBridge.isTeacher() ? t('backToDashboard') : t('backBtn')}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ---- Active Game Screen ----
        return (
            <div className="min-h-screen p-4 max-w-6xl mx-auto">
                {/* Top Bar */}
                <div className="flex items-center justify-between mb-4">
                    <div>
                        <h1 className="text-xl font-bold text-white">🌍 {t('gameTitle')}</h1>
                        {isTrialMode && <span className="text-xs text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded">{t('trialModeLabel')}</span>}
                    </div>
                    <div className="flex items-center gap-4 text-sm">
                        <span className="text-gray-400">{t('turnLabel')} <span className="text-white font-bold">{turn}</span> / {MAX_TURNS}</span>
                        <div className="w-32">
                            <div className="progress-bar">
                                <div className="progress-fill bg-amber-500" style={{ width: `${turnProgress}%` }}></div>
                            </div>
                        </div>
                        <button onClick={handleReadTip} className="text-yellow-400 hover:text-yellow-300 transition-colors text-lg" title={t('tipBtnTitle')}>
                            💡
                        </button>
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    {/* Left Column: Player + AI status */}
                    <div className="space-y-4">
                        {/* Player Status */}
                        <div className="bg-gray-800/60 rounded-xl p-4 border border-blue-500/30">
                            <div className="flex items-center justify-between mb-3">
                                <h2 className="text-sm font-bold text-blue-400">👤 {playerName}</h2>
                                <span className="text-xs text-gray-400">{gd.SPECIALIZATIONS[playerSpec].name} {gd.SPECIALIZATIONS[playerSpec].icon}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-2 text-sm">
                                <div className="bg-gray-700/40 rounded-lg p-2">

    // =====================================================================
    //  Enhanced Leaderboard Component with visual effects
    // =====================================================================
    function LeaderboardList({ leaderboard, t }) {
        if (!leaderboard || leaderboard.length === 0) {
            return <div className="text-center text-gray-500 py-8">暫無排名數據</div>;
        }

        const getRankStyle = (i) => {
            if (i === 0) return 'leaderboard-rank-1';
            if (i === 1) return 'leaderboard-rank-2';
            if (i === 2) return 'leaderboard-rank-3';
            if (i < 10) return 'leaderboard-rank-top10';
            return '';
        };

        const getRankIcon = (i) => {
            if (i === 0) return '👑';
            if (i === 1) return '⭐';
            if (i === 2) return '🥉';
            return `#${i + 1}`;
        };

        return (
            <div className="space-y-2 max-h-[500px] overflow-y-auto">
                {leaderboard.slice(0, 20).map((entry, i) => (
                    <div key={i} className={`flex items-center justify-between rounded-xl px-4 py-3 transition-all ${getRankStyle(i)}`}
                        style={{ animationDelay: `${i * 0.05}s` }}
                    >
                        <div className="flex items-center gap-3">
                            <span className={`text-xl font-bold min-w-[40px] text-center ${
                                i === 0 ? 'text-yellow-400 text-2xl leaderboard-icon-glow-gold'
                                : i === 1 ? 'text-gray-200 text-xl leaderboard-icon-glow-silver'
                                : i === 2 ? 'text-amber-600 text-xl'
                                : 'text-gray-500'
                            }`}>
                                {getRankIcon(i)}
                            </span>
                            <div>
                                <span className={`font-semibold ${i < 3 ? 'text-white text-base' : 'text-gray-200 text-sm'}`}>
                                    {entry.student_name || '???'}
                                </span>
                                {entry.class_name && (
                                    <span className="text-xs text-gray-500 ml-2">{entry.class_name}</span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className={`text-xs px-2 py-0.5 rounded ${
                                entry.result === 'win' ? 'bg-green-900/40 text-green-400'
                                : entry.result === 'bankrupt' ? 'bg-red-900/40 text-red-400'
                                : 'bg-gray-700 text-gray-400'
                            }`}>
                                {entry.result === 'win' ? t('resultWin') : entry.result === 'bankrupt' ? t('resultBankrupt') : t('resultLose')}
                            </span>
                            <span className={`font-bold ${i === 0 ? 'text-yellow-400 text-lg' : i < 3 ? 'text-amber-400 text-base' : 'text-amber-400/80 text-sm'}`}>
                                {(entry.player_score || 0).toLocaleString()}
                            </span>
                        </div>
                    </div>
                ))}
            </div>
        );
    }

    /** 三難度分頁排行榜（用於設定畫面和已遊玩畫面） */

        const TABS = [
            { key: 'EASY', label: t('diffEasyName'), icon: '🟢' },

            { key: 'HARD', label: t('diffHardName'), icon: '🔴' },
        ];

        useEffect(() => {

                TradeGameBridge.getLeaderboard('EASY', 20),
                TradeGameBridge.getLeaderboard('NORMAL', 20),

    // =====================================================================
    //  TeacherDashboard Component
    // =====================================================================
    function TeacherDashboard({ onTrialPlay, onOfficialPlay, t }) {
        const [scores, setScores] = useState([]);
        const [loading, setLoading] = useState(true);
        const [classFilter, setClassFilter] = useState('');
        const [classes, setClasses] = useState([]);
        const [editModal, setEditModal] = useState(null);
        const [editValue, setEditValue] = useState('');
        const [deleteConfirm, setDeleteConfirm] = useState(null);
        const [activeTab, setActiveTab] = useState('scores');

        const gd = useMemo(() => getGameData(t), [t]);

        const loadScores = useCallback(async () => {
            setLoading(true);
            try {
                const data = await TradeGameBridge.getAllScores(classFilter || undefined);
                setScores(data?.scores || []);
                setClasses(data?.classes || []);
            } catch (err) {
                console.error('Failed to load scores:', err);
            }
            setLoading(false);
        }, [classFilter]);

        useEffect(() => {
            loadScores();
        }, [loadScores]);

        const totalPlays = scores.length;
        const wins = scores.filter(s => s.result === 'win').length;
        const winRate = totalPlays > 0 ? ((wins / totalPlays) * 100).toFixed(1) : '0.0';
        const avgScore = totalPlays > 0 ? Math.round(scores.reduce((sum, s) => sum + (s.player_score || 0), 0) / totalPlays) : 0;

        const handleEdit = async () => {
            if (!editModal) return;
            const newScore = parseInt(editValue);
            if (isNaN(newScore)) return;
            try {
                await TradeGameBridge.updateScore(editModal.id, { player_score: newScore });
                setEditModal(null);
                loadScores();
            } catch (err) {
                alert(t('updateFailed') + (err.message || t('unknownError')));
            }
        };

        const handleDelete = async () => {
            if (!deleteConfirm) return;
            try {
                await TradeGameBridge.deleteScore(deleteConfirm.id);
                setDeleteConfirm(null);
                loadScores();
            } catch (err) {
                alert(t('deleteFailed') + (err.message || t('unknownError')));
            }
        };

        return (
            <div className="min-h-screen p-4 max-w-6xl mx-auto animate-fade-in-up">
                <div className="flex items-center justify-between mb-6">
                    <div>
                        <h1 className="text-2xl font-bold text-white">{t('teacherTitle')}</h1>
                        <p className="text-sm text-gray-400 mt-1">{t('teacherSubtitle')}</p>
                    </div>
                    <div className="flex gap-3">
                        <button
                            onClick={() => window.open(TradeGameBridge.getExportUrl(classFilter || undefined), '_blank')}
                            className="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-1"
                        >
                            {t('exportCsv')}
                        </button>
                        <button
                            onClick={onOfficialPlay}
                            className="px-4 py-2 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-1 shadow-lg shadow-amber-500/20"
                        >
                            {t('officialPlayShort')}
                        </button>
                        <button
                            onClick={onTrialPlay}
                            className="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-1"
                        >
                            {t('trialPlayShort')}
                        </button>
                        <a
                            href="/static/game_center.html"
                            className="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg text-sm font-medium transition-colors"
                        >
                            {t('backShort')}
                        </a>
                    </div>
                </div>

                <div className="grid grid-cols-4 gap-4 mb-6">
                    <div className="bg-gray-800/60 rounded-xl p-4 border border-gray-700 text-center">
                        <div className="text-2xl font-bold text-white">{totalPlays}</div>
                        <div className="text-xs text-gray-400 mt-1">{t('totalPlays')}</div>
                    </div>
                    <div className="bg-gray-800/60 rounded-xl p-4 border border-gray-700 text-center">
                        <div className="text-2xl font-bold text-green-400">{wins}</div>
                        <div className="text-xs text-gray-400 mt-1">{t('totalWins')}</div>
                    </div>
                    <div className="bg-gray-800/60 rounded-xl p-4 border border-gray-700 text-center">
                        <div className="text-2xl font-bold text-blue-400">{winRate}%</div>
                        <div className="text-xs text-gray-400 mt-1">{t('winRateLabel')}</div>
                    </div>
                    <div className="bg-gray-800/60 rounded-xl p-4 border border-gray-700 text-center">
                        <div className="text-2xl font-bold text-amber-400">{avgScore.toLocaleString()}</div>
                        <div className="text-xs text-gray-400 mt-1">{t('avgScoreLabel')}</div>
                    </div>
                </div>

                <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-3">
                        <label className="text-sm text-gray-400">{t('classFilterLabel')}</label>
                        <select
                            value={classFilter}
                            onChange={e => setClassFilter(e.target.value)}
                            className="px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm"
                        >
                            <option value="">{t('allClasses')}</option>
                            {classes.map(c => (
                                <option key={c} value={c}>{c}</option>
                            ))}
                        </select>
                        <button onClick={() => { loadScores(); loadLeaderboard(); }} className="px-3 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg text-sm transition-colors">
                            {t('refreshBtn')}
                        </button>
                    </div>
                    <div className="flex bg-gray-800 rounded-lg border border-gray-700 p-0.5">
                        <button
                            onClick={() => setActiveTab('scores')}
                            className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                                activeTab === 'scores'
                                    ? 'bg-gray-600 text-white'
                                    : 'text-gray-400 hover:text-white'
                            }`}
                        >
                            {t('tabScores')}
                        </button>
                        <button
                            onClick={() => setActiveTab('leaderboard')}
                            className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                                activeTab === 'leaderboard'
                                    ? 'bg-gray-600 text-white'
                                    : 'text-gray-400 hover:text-white'
                            }`}
                        >
                            {t('tabLeaderboard')}
                        </button>
                    </div>
                </div>

                {activeTab === 'leaderboard' ? (
                    <TabbedLeaderboard t={t} />
                ) : (
                <div className="bg-gray-800/60 rounded-xl border border-gray-700 overflow-hidden">
                    {loading ? (
                        <div className="flex items-center justify-center py-12">
                            <div className="trade-spinner"></div>
                        </div>
                    ) : scores.length === 0 ? (
                        <div className="text-center py-12 text-gray-500">
                            {t('noRecords')}
                        </div>
                    ) : (
                        <div className="overflow-x-auto">
                            <table className="score-table">
                                <thead>
                                    <tr>
                                        <th>{t('thIndex')}</th>
                                        <th>{t('thStudentName')}</th>
                                        <th>{t('thClass')}</th>
                                        <th>{t('thDifficulty')}</th>
                                        <th>{t('thCountry')}</th>
                                        <th>{t('thResult')}</th>
                                        <th>{t('thScore')}</th>
                                        <th>{t('thAiScore')}</th>
                                        <th>{t('thTurns')}</th>
                                        <th>{t('thActions')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {scores.map((score, idx) => (
                                        <tr key={score.id || idx}>
                                            <td className="text-gray-500">{idx + 1}</td>
                                            <td className="text-white font-medium">{score.student_name || '—'}</td>
                                            <td className="text-gray-400">{score.class_name || '—'}</td>
                                            <td>
                                                <span className="text-xs px-2 py-0.5 rounded" style={{
                                                    backgroundColor: (gd.AI_DIFFICULTIES[score.difficulty]?.color || '#334155') + '20',
                                                    color: gd.AI_DIFFICULTIES[score.difficulty]?.color || '#94a3b8'
                                                }}>
                                                    {gd.AI_DIFFICULTIES[score.difficulty]?.name || score.difficulty}
                                                </span>
                                            </td>
                                            <td className="text-gray-400 text-xs">
                                                {gd.SPECIALIZATIONS[score.player_spec]?.icon || '—'} vs {gd.SPECIALIZATIONS[score.ai_spec]?.icon || '—'}
                                            </td>
                                            <td>
                                                <span className={`text-xs px-2 py-0.5 rounded ${
                                                    score.result === 'win' ? 'bg-green-900/40 text-green-400'
                                                    : score.result === 'bankrupt' ? 'bg-red-900/40 text-red-400'
                                                    : 'bg-gray-700 text-gray-400'
                                                }`}>
                                                    {score.result === 'win' ? t('resultWin') : score.result === 'bankrupt' ? t('resultBankrupt') : t('resultLose')}
                                                </span>
                                            </td>
                                            <td className="text-amber-400 font-bold">{(score.player_score || 0).toLocaleString()}</td>
                                            <td className="text-gray-400">{(score.ai_score || 0).toLocaleString()}</td>
                                            <td className="text-gray-400">{score.turns_played || '—'}</td>
                                            <td>
                                                <div className="flex gap-1">
                                                    <button
                                                        onClick={() => { setEditModal(score); setEditValue(String(score.player_score || 0)); }}
                                                        className="px-2 py-1 bg-blue-600/40 hover:bg-blue-600 text-blue-400 hover:text-white rounded text-xs transition-colors"
                                                        title={t('editScoreTooltip')}
                                                    >
                                                        ✏️
                                                    </button>
                                                    <button
                                                        onClick={() => setDeleteConfirm(score)}
                                                        className="px-2 py-1 bg-red-600/40 hover:bg-red-600 text-red-400 hover:text-white rounded text-xs transition-colors"
                                                        title={t('deleteRecordTooltip')}
                                                    >
                                                        🗑️
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
                )}

                {editModal && (
                    <div className="modal-overlay" onClick={() => setEditModal(null)}>
                        <div className="bg-gray-800 rounded-2xl p-6 border border-gray-600 max-w-sm w-full mx-4 animate-fade-in-up" onClick={e => e.stopPropagation()}>
                            <h3 className="text-lg font-bold text-white mb-4">{t('editScoreTitle')}</h3>
                            <p className="text-sm text-gray-400 mb-3">
                                {t('editStudentLabel')}<span className="text-white">{editModal.student_name}</span>
                            </p>
                            <label className="block text-sm text-gray-400 mb-1">{t('editScoreLabel')}</label>
                            <input
                                type="number"
                                value={editValue}
                                onChange={e => setEditValue(e.target.value)}
                                className="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white mb-4"
                            />
                            <div className="flex gap-3 justify-end">
                                <button onClick={() => setEditModal(null)} className="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg text-sm transition-colors">
                                    {t('cancelBtn')}
                                </button>
                                <button onClick={handleEdit} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition-colors">
                                    {t('confirmEditBtn')}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {deleteConfirm && (
                    <div className="modal-overlay" onClick={() => setDeleteConfirm(null)}>
                        <div className="bg-gray-800 rounded-2xl p-6 border border-red-500/30 max-w-sm w-full mx-4 animate-fade-in-up" onClick={e => e.stopPropagation()}>
                            <h3 className="text-lg font-bold text-red-400 mb-4">{t('deleteConfirmTitle')}</h3>
                            <p className="text-sm text-gray-300 mb-1">
                                {t('deleteConfirmMsg').replace('{name}', deleteConfirm.student_name)}
                            </p>
                            <p className="text-xs text-gray-500 mb-4">{t('deleteConfirmNote')}</p>
                            <div className="flex gap-3 justify-end">
                                <button onClick={() => setDeleteConfirm(null)} className="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg text-sm transition-colors">
                                    {t('cancelBtn')}
                                </button>
                                <button onClick={handleDelete} className="px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg text-sm font-medium transition-colors">
                                    {t('confirmDeleteBtn')}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    // =====================================================================
    //  App Component (Root)
    // =====================================================================
    function App() {
        const { lang, t, toggleLang } = useLanguage();
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [ready, setReady] = useState(false);
        const [gamePhase, setGamePhase] = useState('init');
        const [trialMode, setTrialMode] = useState(false);
        const [existingScore, setExistingScore] = useState(null);
        const [gameConfig, setGameConfig] = useState(null);
        const [accessDenied, setAccessDenied] = useState(false);

        useEffect(() => {
            (async () => {
                try {
                    const ok = await TradeGameBridge.init();
                    if (!ok) return;

                    // Check class access (teachers bypass)
                    if (!TradeGameBridge.isTeacher()) {
                        try {
                            const accessResult = await TradeGameBridge.checkAccess();
                            if (!accessResult.allowed) {
                                setAccessDenied(true);
                                setReady(true);
                                setLoading(false);
                                return;
                            }
                        } catch (e) {
                            // If access check fails with 403, deny access
                            if (e.message && e.message.includes('中三')) {
                                setAccessDenied(true);
                                setReady(true);
                                setLoading(false);
                                return;
                            }
                        }
                    }

                    if (!TradeGameBridge.isTeacher()) {
                        const checkResult = await TradeGameBridge.checkPlayed();
                        if (checkResult.played) {
                            setExistingScore(checkResult.score);
                            // Still show best score but allow replaying
                            setGamePhase('has_record');
                            setReady(true);
                            setLoading(false);
                            return;
                        }
                    }

                    setGamePhase(TradeGameBridge.isTeacher() ? 'dashboard' : 'setup');
                    setReady(true);
                } catch (err) {
                    setError(err.message || t('initFailed'));
                }
                setLoading(false);
            })();
        }, []);

        const handleStartGame = (difficulty, playerSpec, aiSpec) => {
            setGameConfig({ difficulty, playerSpec, aiSpec });
            setGamePhase('playing');
        };

        const handleGameEnd = (action) => {
            if (action === 'restart') {
                setGameConfig(null);
                setGamePhase('setup');
            } else if (action === 'back' || action === 'dashboard') {
                setTrialMode(false);
                setGameConfig(null);
                if (TradeGameBridge.isTeacher()) {
                    setGamePhase('dashboard');
                } else {
                    setGamePhase(existingScore ? 'has_record' : 'setup');
                }
            }
        };

        const handlePlayAgain = () => {
            setTrialMode(false);
            setGameConfig(null);
            setGamePhase('setup');
        };

        const handleTrialPlay = () => {
            setTrialMode(true);
            setGamePhase('setup');
        };

        const handleTrialStart = (difficulty, playerSpec, aiSpec) => {
            setTrialMode(true);
            setGameConfig({ difficulty, playerSpec, aiSpec });
            setGamePhase('playing');
        };

        // Language toggle button (visible on all screens)
        const langToggle = (
            <button onClick={toggleLang} className="fixed top-4 right-4 z-50 px-3 py-1.5 bg-gray-700/80 hover:bg-gray-600 text-white rounded-lg text-sm font-medium transition-colors border border-gray-600 backdrop-blur-sm flex items-center gap-1.5" title={lang === 'zh' ? 'Switch to English' : '切換中文'}>
                🌐 {lang === 'zh' ? 'EN' : '中文'}
            </button>
        );

        if (loading) {
            return (
                <div className="min-h-screen flex items-center justify-center">
                    {langToggle}
                    <div className="text-center">
                        <div className="trade-spinner mx-auto mb-4"></div>
                        <p className="text-gray-400">{t('loading')}</p>
                    </div>
                </div>
            );
        }

        if (error) {
            return (
                <div className="min-h-screen flex items-center justify-center">
                    {langToggle}
                    <div className="text-center">
                        <div className="text-4xl mb-4">⚠️</div>
                        <p className="text-red-400 mb-2">{t('initFailed')}</p>
                        <p className="text-sm text-gray-500">{error}</p>
                        <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-sm">
                            {t('retryBtn')}
                        </button>
                    </div>
                </div>
            );
        }

        if (accessDenied) {
            return (
                <div>
                    {langToggle}
                    <AccessDeniedScreen t={t} />
                </div>
            );
        }

        if (gamePhase === 'has_record') {
            return (
                <div>
                    {langToggle}
                    <AlreadyPlayedScreen scoreData={existingScore} onPlayAgain={handlePlayAgain} onTrialPlay={handleTrialPlay} t={t} />
                </div>
            );
        }

        if (gamePhase === 'dashboard') {
            return (
                <div>
                    {langToggle}
                    <TeacherDashboard onTrialPlay={handleTrialPlay} onOfficialPlay={handlePlayAgain} t={t} />
                </div>
            );
        }

        if (gamePhase === 'setup') {
            return (
                <div>
                    {langToggle}
                    {trialMode && (
                        <div className="fixed top-0 left-0 right-0 bg-amber-600/90 text-white text-center py-2 text-sm z-40">
                            {t('trialBanner')} &nbsp;
                            <button onClick={() => {
                                setTrialMode(false);
                                if (TradeGameBridge.isTeacher()) {
                                    setGamePhase('dashboard');
                                } else {
                                    setGamePhase(existingScore ? 'has_record' : 'setup');
                                }
                            }} className="underline hover:no-underline ml-2">
                                {TradeGameBridge.isTeacher() ? t('returnDashboard') : t('exitTrial')}
                            </button>
                        </div>
                    )}
                    <div className={trialMode ? 'pt-10' : ''}>
                        <SetupScreen
                            playerName={TradeGameBridge.user?.name || t('defaultPlayer')}
                            onStart={handleStartGame}
                            showTrialOption={!trialMode && !TradeGameBridge.isTeacher()}
                            onTrialStart={handleTrialStart}
                            bestScore={existingScore}
                            t={t}
                        />
                    </div>
                </div>
            );
        }

        if (gamePhase === 'playing' && gameConfig) {
            return (
                <div>
                    {langToggle}
                    {trialMode && (
                        <div className="fixed top-0 left-0 right-0 bg-amber-600/90 text-white text-center py-2 text-sm z-40">
                            {t('trialBanner')}
                        </div>
                    )}
                    <div className={trialMode ? 'pt-10' : ''}>
                        <GameScreen
                            config={gameConfig}
                            playerName={TradeGameBridge.user?.name || t('defaultPlayer')}
                            onGameEnd={handleGameEnd}
                            isTrialMode={trialMode}
                            t={t}
                        />
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen flex items-center justify-center">
                {langToggle}
                <div className="trade-spinner"></div>
            </div>
        );
    }

    // =====================================================================
    //  Mount React App
    // =====================================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>
