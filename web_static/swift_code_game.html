        // ============================================================
        // Section 14: Drag & Drop Mode
        // ============================================================
        function DragDropMode({ level, onComplete, onBack }) {
            const challenges = level.challengeIds.map(id => DND_CHALLENGES.find(c => c.id === id)).filter(Boolean);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [slotContents, setSlotContents] = useState({});
            const [hintsUsed, setHintsUsed] = useState(0);
            const [finished, setFinished] = useState(false);
            const [dragState, setDragState] = useState({ isDragging: false, block: null, pos: { x: 0, y: 0 }, offset: { x: 0, y: 0 }, activeSlot: null });
            const [checked, setChecked] = useState(false);
            const [checkResult, setCheckResult] = useState(null);
            const [challengeFinished, setChallengeFinished] = useState(false);
            const slotRefs = useRef({});

            const challenge = challenges[currentIdx];
            if (!challenge && !finished) return null;

            // Reset when changing challenge
            useEffect(() => {
                setSlotContents({});
                setChecked(false);
                setCheckResult(null);
                setChallengeFinished(false);
                slotRefs.current = {};
            }, [currentIdx]);

            // Available blocks (not yet placed)
            const placedBlockIds = new Set(Object.values(slotContents).map(b => b?.id).filter(Boolean));
            const availableBlocks = challenge ? challenge.blocks.filter(b => !placedBlockIds.has(b.id)) : [];

            // Touch/Mouse drag handlers
            const handleDragStart = useCallback((block, e) => {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const rect = e.currentTarget.getBoundingClientRect();
                document.body.classList.add('drag-active');
                setDragState({
                    isDragging: true, block,
                    pos: { x: touch.clientX, y: touch.clientY },
                    offset: { x: touch.clientX - rect.left, y: touch.clientY - rect.top },
                    activeSlot: null,
                });
            }, []);

            const handleDragMove = useCallback((e) => {
                if (!dragState.isDragging) return;
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const pos = { x: touch.clientX, y: touch.clientY };

                let activeSlot = null;
                for (const [slotId, el] of Object.entries(slotRefs.current)) {
                    if (!el) continue;
                    const rect = el.getBoundingClientRect();
                    if (pos.x >= rect.left && pos.x <= rect.right && pos.y >= rect.top && pos.y <= rect.bottom) {
                        // Check type compatibility
                        const slot = challenge.slots.find(s => s.id === slotId);
                        if (slot && slot.acceptTypes.includes(dragState.block.type)) {
                            activeSlot = slotId;
                        }
                        break;
                    }
                }
                setDragState(prev => ({ ...prev, pos, activeSlot }));
            }, [dragState.isDragging, dragState.block, challenge]);

            const handleDragEnd = useCallback(() => {
                if (!dragState.isDragging) return;
                document.body.classList.remove('drag-active');
                if (dragState.activeSlot && dragState.block) {
                    setSlotContents(prev => ({ ...prev, [dragState.activeSlot]: dragState.block }));
                    setChecked(false);
                    setCheckResult(null);
                }
                setDragState({ isDragging: false, block: null, pos: { x: 0, y: 0 }, offset: { x: 0, y: 0 }, activeSlot: null });
            }, [dragState]);

            // Global event listeners
            useEffect(() => {
                const onMove = (e) => handleDragMove(e);
                const onEnd = () => handleDragEnd();
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
                return () => {
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onEnd);
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                };
            }, [handleDragMove, handleDragEnd]);

            // Remove block from slot
            const removeFromSlot = (slotId) => {
                setSlotContents(prev => {
                    const next = { ...prev };
                    delete next[slotId];
                    return next;
                });
                setChecked(false);
                setCheckResult(null);
            };

            // Check answer
            const handleCheck = () => {
                const allCorrect = challenge.slots.every(slot => {
                    const placed = slotContents[slot.id];
                    if (!placed) return false;
                    return placed.correctSlot === slot.id;
                });
                setChecked(true);
                setCheckResult(allCorrect);
                if (allCorrect) {
                    setChallengeFinished(true);
                }
            };

            // Hint
            const handleHint = () => {
                setHintsUsed(h => h + 1);
                // Find first empty or wrong slot
                for (const slot of challenge.slots) {
                    const placed = slotContents[slot.id];
                    if (!placed || placed.correctSlot !== slot.id) {
                        const correctBlock = challenge.blocks.find(b => b.correctSlot === slot.id);
                        if (correctBlock) {
                            setSlotContents(prev => ({ ...prev, [slot.id]: correctBlock }));
                            break;
                        }
                    }
                }
            };

            // Next challenge or finish
            const handleNext = () => {
                if (currentIdx < challenges.length - 1) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    setFinished(true);
                }
            };

            // Build live preview tree from slot contents
            const buildLiveTree = () => {
                if (!challenge) return null;
                // For simple challenges (no container slots), just show placed views
                const hasContainerSlots = challenge.slots.some(s => s.acceptTypes.includes('container'));

                if (!hasContainerSlots) {
                    // Simple: wrap in VStack
                    const children = challenge.slots
                        .map(slot => {
                            const block = slotContents[slot.id];
                            if (!block) return null;
                            // Try to find matching target child
                            return findTargetNodeForBlock(challenge.targetUI, block);
                        })
                        .filter(Boolean);
                    if (children.length === 0) return null;
                    if (children.length === 1) return children[0];
                    return { type: 'VStack', children };
                }

                // Complex: reconstruct from challenge 7 structure
                return reconstructTree(challenge, slotContents);
            };

            const findTargetNodeForBlock = (targetUI, block) => {
                // Simple heuristic: parse block code to create UI node
                const code = block.code;
                if (code.startsWith('Text(')) {
                    const match = code.match(/Text\("([^"]*)"\)/);
                    const content = match ? match[1] : '?';
                    const modifiers = [];
                    if (code.includes('.font(.title)')) modifiers.push({ type: 'font', value: '.title' });
                    if (code.includes('.font(.caption)')) modifiers.push({ type: 'font', value: '.caption' });
                    if (code.includes('.foregroundColor(.teal)')) modifiers.push({ type: 'foregroundColor', value: '.teal' });
                    if (code.includes('.foregroundColor(.blue)')) modifiers.push({ type: 'foregroundColor', value: '.blue' });
                    if (code.includes('.bold()')) modifiers.push({ type: 'bold' });
                    return { type: 'Text', props: { content }, modifiers };
                }
                if (code.startsWith('Image(')) {
                    const match = code.match(/systemName:\s*"([^"]*)"/);
                    const name = match ? match[1] : 'questionmark';
                    return { type: 'Image', props: { systemName: name }, modifiers: [] };
                }
                return null;
            };

            const reconstructTree = (challenge, slots) => {
                // For challenge 7 (and similar complex ones), build tree from slot structure
                const containerSlots = challenge.slots.filter(s => s.acceptTypes.includes('container'));
                const viewSlots = challenge.slots.filter(s => s.acceptTypes.includes('view'));

                // Check if we have the outer container
                const outerContainer = slots['s0'];
                if (!outerContainer) {
                    // Just show whatever views we have
                    const views = viewSlots.map(s => slots[s.id]).filter(Boolean).map(b => findTargetNodeForBlock(null, b)).filter(Boolean);
                    return views.length > 0 ? (views.length === 1 ? views[0] : { type: 'VStack', children: views }) : null;
                }

                const outerType = outerContainer.code.includes('VStack') ? 'VStack' : 'HStack';

                // Build children based on challenge structure
                if (challenge.id === 7) {
                    // Special handling for whack-a-mole
                    const row1Container = slots['s1'];
                    const row2Container = slots['s4'];
                    const children = [];

                    if (row1Container) {
                        const row1Type = row1Container.code.includes('HStack') ? 'HStack' : 'VStack';
                        const row1Children = ['s2', 's3'].map(sid => slots[sid]).filter(Boolean).map(b => findTargetNodeForBlock(null, b)).filter(Boolean);
                        if (row1Children.length > 0) children.push({ type: row1Type, children: row1Children });
                    }
                    if (row2Container) {
                        const row2Type = row2Container.code.includes('HStack') ? 'HStack' : 'VStack';
                        const row2Children = ['s5', 's6', 's7'].map(sid => slots[sid]).filter(Boolean).map(b => findTargetNodeForBlock(null, b)).filter(Boolean);
                        if (row2Children.length > 0) children.push({ type: row2Type, children: row2Children });
                    }
                    const nameBlock = slots['s8'];
                    if (nameBlock) {
                        const nameNode = findTargetNodeForBlock(null, nameBlock);
                        if (nameNode) children.push(nameNode);
                    }
                    return children.length > 0 ? { type: outerType, children } : null;
                }

                if (challenge.id === 6) {
                    const children = [];
                    const s1Block = slots['s1'];
                    if (s1Block) {
                        const node = findTargetNodeForBlock(null, s1Block);
                        if (node) children.push(node);
                    }
                    const innerContainer = slots['s2'];
                    if (innerContainer) {
                        const innerType = innerContainer.code.includes('HStack') ? 'HStack' : 'VStack';
                        const innerChildren = ['s3', 's4'].map(sid => slots[sid]).filter(Boolean).map(b => findTargetNodeForBlock(null, b)).filter(Boolean);
                        if (innerChildren.length > 0) children.push({ type: innerType, children: innerChildren });
                    }
                    return children.length > 0 ? { type: outerType, children } : null;
                }

                if (challenge.id === 4) {
                    const containerBlock = slots['s0'];
                    const cType = containerBlock.code.includes('HStack') ? 'HStack' : 'VStack';
                    const viewChildren = ['s1', 's2'].map(sid => slots[sid]).filter(Boolean).map(b => findTargetNodeForBlock(null, b)).filter(Boolean);
                    return viewChildren.length > 0 ? { type: cType, children: viewChildren } : null;
                }

                return null;
            };

            // Stars calculation
            const calcStars = () => {
                if (hintsUsed === 0) return 3;
                if (hintsUsed === 1) return 2;
                return 1;
            };

            // Finished screen
            if (finished) {
                const stars = calcStars();
                return (
                    <div className="slide-up" style={{ padding: '32px 16px', maxWidth: '500px', margin: '0 auto', textAlign: 'center' }}>
                        <div style={{ fontSize: '64px', marginBottom: '16px' }}>
                            {level.id === 7 ? '🏆' : '🎉'}
                        </div>
                        <h2 style={{ fontSize: '24px', fontWeight: 'bold', margin: '0 0 8px', color: '#f1f5f9' }}>
                            {level.id === 7 ? '🎊 恭喜通關！' : '關卡完成！'}
                        </h2>
                        <p style={{ fontSize: '16px', color: '#94a3b8', marginBottom: '24px' }}>
                            {level.title} - {hintsUsed === 0 ? '完美通關，沒有使用提示！' : `使用了 ${hintsUsed} 次提示`}
                        </p>
                        <div style={{ marginBottom: '32px' }}>
                            <Stars count={stars} max={3} size={40} animated={true} />
                        </div>
                        <button
                            onClick={() => onComplete(stars)}
                            style={{
                                padding: '14px 40px', fontSize: '18px', fontWeight: 'bold',
                                background: '#3b82f6', color: '#fff', border: 'none',
                                borderRadius: '12px', cursor: 'pointer',
                            }}
                        >
                            繼續 →
                        </button>
                    </div>
                );
            }

            const allSlotsFilled = challenge.slots.every(s => slotContents[s.id]);
            const liveTree = buildLiveTree();

            return (
                <div className="no-select" style={{ padding: '16px', maxWidth: '700px', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                        <button onClick={onBack} style={{
                            background: '#1e293b', border: '1px solid #334155', borderRadius: '10px',
                            color: '#94a3b8', padding: '8px 16px', fontSize: '14px', cursor: 'pointer',
                            minHeight: '44px',
                        }}>
                            ← 返回
                        </button>
                        <div style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: '14px', fontWeight: '600', color: '#f1f5f9' }}>{level.icon} {challenge.title}</div>
                            <div style={{ fontSize: '12px', color: '#64748b' }}>
                                挑戰 {currentIdx + 1} / {challenges.length}
                            </div>
                        </div>
                        <button onClick={handleHint} style={{
                            background: '#1e293b', border: '1px solid #334155', borderRadius: '10px',
                            color: '#fbbf24', padding: '8px 16px', fontSize: '14px', cursor: 'pointer',
                            minHeight: '44px',
                        }}>
                            💡 提示
                        </button>
                    </div>

                    {/* Description */}
                    <p style={{ fontSize: '15px', color: '#94a3b8', marginBottom: '16px', lineHeight: 1.5 }}>
                        {challenge.description}
                    </p>

                    {/* Target + Live Preview side by side on larger screens */}
                    <div style={{ display: 'flex', gap: '12px', marginBottom: '20px', flexWrap: 'wrap', justifyContent: 'center' }}>
                        <div style={{ flex: '1 1 200px', minWidth: '200px' }}>
                            <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '6px', textAlign: 'center' }}>🎯 目標畫面</div>
                            <DeviceFrame title="目標">
                                <SwiftUIPreview uiTree={challenge.targetUI} />
                            </DeviceFrame>
                        </div>
                        <div style={{ flex: '1 1 200px', minWidth: '200px' }}>
                            <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '6px', textAlign: 'center' }}>🔄 你的畫面</div>
                            <DeviceFrame title="即時預覽">
                                {liveTree ? (
                                    <SwiftUIPreview uiTree={liveTree} />
                                ) : (
                                    <div style={{ color: '#C7C7CC', fontSize: '14px' }}>拖入積木開始拼裝...</div>
                                )}
                            </DeviceFrame>
                        </div>
                    </div>

                    {/* Code Slots */}
                    <div style={{
                        background: '#1e293b', borderRadius: '14px', padding: '16px',
                        marginBottom: '16px', border: '1px solid #334155',
                    }}>
                        <div style={{ fontSize: '13px', color: '#64748b', marginBottom: '10px' }}>📝 程式碼結構</div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                            {challenge.slots.map((slot) => {
                                const placed = slotContents[slot.id];
                                const isActive = dragState.activeSlot === slot.id;
                                const isWrong = checked && placed && placed.correctSlot !== slot.id;

                                return (
                                    <div
                                        key={slot.id}
                                        ref={el => slotRefs.current[slot.id] = el}
                                        className={`${isActive ? 'drop-pulse' : ''} ${isWrong ? 'shake' : ''}`}
                                        onClick={() => placed && removeFromSlot(slot.id)}
                                        style={{
                                            minHeight: '52px', borderRadius: '10px',
                                            border: `2px dashed ${isActive ? '#60a5fa' : isWrong ? '#FF3B30' : placed ? '#475569' : '#334155'}`,
                                            background: isActive ? 'rgba(96, 165, 250, 0.1)' : placed ? '#0f172a' : 'rgba(15, 23, 42, 0.5)',
                                            padding: '10px 14px',
                                            display: 'flex', alignItems: 'center',
                                            transition: 'border-color 0.2s, background 0.2s',
                                            cursor: placed ? 'pointer' : 'default',
                                        }}
                                    >
                                        {placed ? (
                                            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                <HighlightedCode code={placed.code} fontSize="13px" />
                                                <span style={{ fontSize: '12px', color: '#64748b', marginLeft: '8px', flexShrink: 0 }}>✕</span>
                                            </div>
                                        ) : (
                                            <span style={{ color: '#475569', fontSize: '14px' }}>
                                                {slot.label}
                                            </span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Block Palette */}
                    <div style={{ marginBottom: '16px' }}>
                        <div style={{ fontSize: '13px', color: '#64748b', marginBottom: '8px' }}>🧱 可用積木（長按拖拽）</div>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                            {availableBlocks.map((block) => (
                                <div
                                    key={block.id}
                                    onTouchStart={(e) => handleDragStart(block, e)}
                                    onMouseDown={(e) => handleDragStart(block, e)}
                                    style={{
                                        padding: '10px 14px', background: '#1e293b',
                                        border: `2px solid ${block.type === 'container' ? '#60a5fa' : block.type === 'modifier' ? '#B281EB' : '#475569'}`,
                                        borderRadius: '10px', cursor: 'grab',
                                        touchAction: 'none', minWidth: '44px', minHeight: '44px',
                                        opacity: dragState.isDragging && dragState.block?.id === block.id ? 0.4 : 1,
                                    }}
                                >
                                    <HighlightedCode code={block.code} fontSize="13px" />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Check / Next button */}
                    <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                        {!challengeFinished ? (
                            <>
                                <button
                                    onClick={() => { setSlotContents({}); setChecked(false); setCheckResult(null); }}
                                    style={{
                                        padding: '12px 24px', fontSize: '16px',
                                        background: '#334155', color: '#94a3b8', border: 'none',
                                        borderRadius: '10px', cursor: 'pointer', minHeight: '44px',
                                    }}
                                >
                                    🔄 重置
                                </button>
                                <button
                                    onClick={handleCheck}
                                    disabled={!allSlotsFilled}
                                    style={{
                                        padding: '12px 32px', fontSize: '16px', fontWeight: 'bold',
                                        background: allSlotsFilled ? '#3b82f6' : '#334155',
                                        color: allSlotsFilled ? '#fff' : '#64748b',
                                        border: 'none', borderRadius: '10px',
                                        cursor: allSlotsFilled ? 'pointer' : 'not-allowed',
                                        minHeight: '44px',
                                    }}
                                >
                                    ✓ 檢查答案
                                </button>
                            </>
                        ) : (
                            <button
                                onClick={handleNext}
                                style={{
                                    padding: '14px 40px', fontSize: '18px', fontWeight: 'bold',
                                    background: '#34C759', color: '#fff', border: 'none',
                                    borderRadius: '12px', cursor: 'pointer',
                                }}
                            >
                                {currentIdx < challenges.length - 1 ? '下一題 →' : '完成關卡 🎉'}
                            </button>
                        )}
                    </div>

                    {/* Check result feedback */}
                    {checked && !challengeFinished && (
                        <div className="fade-in" style={{
                            marginTop: '12px', padding: '12px 16px',
                            background: 'rgba(255, 59, 48, 0.1)',
                            border: '1px solid rgba(255, 59, 48, 0.3)',
                            borderRadius: '10px', textAlign: 'center',
                        }}>
                            <span style={{ fontSize: '14px', color: '#FF6B6B' }}>
                                ❌ 還不太對，試試看其他組合！紅色框的是放錯的。
                            </span>
                        </div>
                    )}
                    {challengeFinished && (
                        <div className="fade-in" style={{
                            marginTop: '12px', padding: '12px 16px',
                            background: 'rgba(52, 199, 89, 0.1)',
                            border: '1px solid rgba(52, 199, 89, 0.3)',
                            borderRadius: '10px', textAlign: 'center',
                        }}>
                            <span style={{ fontSize: '14px', color: '#34C759' }}>
                                ✅ 完美！程式碼和目標畫面一模一樣！
                            </span>
                        </div>
                    )}

                    {/* Drag Ghost */}
                    {dragState.isDragging && dragState.block && (
                        <div style={{
                            position: 'fixed',
                            left: dragState.pos.x - dragState.offset.x,
                            top: dragState.pos.y - dragState.offset.y,
                            zIndex: 10000, pointerEvents: 'none',
                            transform: 'rotate(2deg) scale(1.05)',
                            opacity: 0.9, padding: '10px 14px',
                            background: '#2563EB', border: '2px solid #60A5FA',
                            borderRadius: '10px',
                            boxShadow: '0 12px 40px rgba(37, 99, 235, 0.4)',
                        }}>
                            <HighlightedCode code={dragState.block.code} fontSize="13px" />
                        </div>
                    )}
                </div>
            );
        }

        // ============================================================
        // Section 14b: Build Animation (Layer-by-Layer)
        // ============================================================
        // Prebuilt example trees for the explore mode
        const EXPLORE_EXAMPLES = [
            {
                id: 1, title: '基本文字', icon: '📝',
                tree: { type: 'Text', props: { content: 'Hello World' }, modifiers: [{ type: 'font', value: '.title' }, { type: 'foregroundColor', value: '.blue' }] },
            },
            {
                id: 2, title: '垂直排版', icon: '📐',
                tree: {
                    type: 'VStack', children: [
                        { type: 'Text', props: { content: '標題' }, modifiers: [{ type: 'font', value: '.title' }, { type: 'bold' }] },
                        { type: 'Image', props: { systemName: 'star.fill' }, modifiers: [{ type: 'foregroundColor', value: '.yellow' }] },
                        { type: 'Text', props: { content: '副標題' }, modifiers: [{ type: 'font', value: '.caption' }, { type: 'foregroundColor', value: '.gray' }] },
                    ]
                },
            },
            {
                id: 3, title: '水平排版 + 修飾', icon: '🎨',
                tree: {
                    type: 'HStack', children: [
                        { type: 'Image', props: { systemName: 'teddybear.fill' }, modifiers: [] },
                        { type: 'VStack', children: [
                            { type: 'Text', props: { content: '小熊' }, modifiers: [{ type: 'font', value: '.headline' }, { type: 'bold' }] },
                            { type: 'Text', props: { content: '可愛的玩具' }, modifiers: [{ type: 'font', value: '.caption' }, { type: 'foregroundColor', value: '.gray' }] },
                        ]},
                    ]
                },
            },
            {
                id: 4, title: '按鈕互動', icon: '👆',
                tree: {
                    type: 'VStack', children: [
                        { type: 'Text', props: { content: 'Score: 0' }, modifiers: [{ type: 'font', value: '.title2' }] },
                        { type: 'Button', props: { title: '開始遊戲' }, modifiers: [{ type: 'foregroundColor', value: '.white' }, { type: 'background', value: '.blue' }] },
                    ]
                },
            },
        ];

        function BuildAnimationMode({ onBack }) {
            const [exampleIdx, setExampleIdx] = useState(0);
            const example = EXPLORE_EXAMPLES[exampleIdx];
            const steps = useMemo(() => flattenBuildSteps(example.tree), [exampleIdx]);
            const [stepIdx, setStepIdx] = useState(-1);
            const [isPlaying, setIsPlaying] = useState(false);
            const timerRef = useRef(null);

            // Auto-play
            useEffect(() => {
                if (isPlaying) {
                    timerRef.current = setInterval(() => {
                        setStepIdx(prev => {
                            if (prev >= steps.length - 1) { setIsPlaying(false); return prev; }
                            return prev + 1;
                        });
                    }, 1200);
                }
                return () => clearInterval(timerRef.current);
            }, [isPlaying, steps.length]);

            // Reset on example change
            useEffect(() => { setStepIdx(-1); setIsPlaying(false); }, [exampleIdx]);

            const partialTree = stepIdx >= 0 ? buildPartialTree(example.tree, steps, stepIdx) : null;
            const currentStep = stepIdx >= 0 && stepIdx < steps.length ? steps[stepIdx] : null;
            const codeStr = partialTree ? uiTreeToCode(partialTree) : '';

            return (
                <div className="fade-in" style={{ padding: '16px', maxWidth: '700px', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
                        <button onClick={onBack} style={{
                            background: '#1e293b', border: '1px solid #334155', borderRadius: '10px',
                            color: '#94a3b8', padding: '8px 16px', fontSize: '14px', cursor: 'pointer', minHeight: '44px',
                        }}>← 返回</button>
                        <div style={{ fontSize: '16px', fontWeight: 'bold', color: '#f1f5f9' }}>🎬 逐層構建</div>
                        <div style={{ width: '80px' }}></div>
                    </div>

                    {/* Example selector */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexWrap: 'wrap' }}>
                        {EXPLORE_EXAMPLES.map((ex, i) => (
                            <button key={ex.id} onClick={() => setExampleIdx(i)} style={{
                                padding: '8px 14px', borderRadius: '10px', fontSize: '13px', cursor: 'pointer',
                                background: exampleIdx === i ? '#3b82f6' : '#1e293b',
                                color: exampleIdx === i ? '#fff' : '#94a3b8',
                                border: `1px solid ${exampleIdx === i ? '#3b82f6' : '#334155'}`,
                                minHeight: '44px',
                            }}>
                                {ex.icon} {ex.title}
                            </button>
                        ))}
                    </div>

                    {/* Main content: preview + code */}
                    <div style={{ display: 'flex', gap: '16px', marginBottom: '20px', flexWrap: 'wrap', justifyContent: 'center' }}>
                        <div style={{ flex: '1 1 240px', minWidth: '240px' }}>
                            <DeviceFrame title="逐步預覽">
                                {partialTree ? (
                                    <div className="step-fade-in" key={stepIdx}>
                                        <SwiftUIPreview uiTree={partialTree} />
                                    </div>
                                ) : (
                                    <div style={{ color: '#C7C7CC', fontSize: '14px', textAlign: 'center' }}>
                                        點擊 ▶ 開始
                                    </div>
                                )}
                            </DeviceFrame>
                        </div>
                        <div style={{ flex: '1 1 260px', minWidth: '260px' }}>
                            {/* Generated code */}
                            <div style={{ marginBottom: '12px' }}>
                                <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '6px' }}>📄 目前程式碼</div>
                                {codeStr ? (
                                    <HighlightedCode code={codeStr} fontSize="13px" />
                                ) : (
                                    <div style={{ background: '#1E1E1E', borderRadius: '10px', padding: '16px', color: '#64748b', fontSize: '13px', fontFamily: 'monospace' }}>
                                        // 等待開始...
                                    </div>
                                )}
                            </div>
                            {/* Structure tree */}
                            {partialTree && <ViewTree uiTree={partialTree} />}
                        </div>
                    </div>

                    {/* Current step description */}
                    <div style={{
                        background: '#1e293b', borderRadius: '12px', padding: '14px 16px',
                        marginBottom: '16px', border: '1px solid #334155',
                        minHeight: '48px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}>
                        {currentStep ? (
                            <span style={{ fontSize: '15px', color: '#f1f5f9' }}>
                                <span style={{ color: '#fbbf24', marginRight: '8px' }}>Step {stepIdx + 1}/{steps.length}</span>
                                {currentStep.description}
                            </span>
                        ) : (
                            <span style={{ fontSize: '14px', color: '#64748b' }}>
                                {stepIdx >= steps.length - 1 ? '✅ 構建完成！' : '點擊下方按鈕開始逐步構建'}
                            </span>
                        )}
                    </div>

                    {/* Step dots */}
                    <div style={{ display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '16px', flexWrap: 'wrap' }}>
                        {steps.map((_, i) => (
                            <div key={i}
                                className={`step-dot ${i === stepIdx ? 'active' : i < stepIdx ? 'done' : ''}`}
                                onClick={() => { setStepIdx(i); setIsPlaying(false); }}
                            />
                        ))}
                    </div>

                    {/* Controls */}
                    <div style={{ display: 'flex', gap: '12px', justifyContent: 'center' }}>
                        <button onClick={() => { setStepIdx(-1); setIsPlaying(false); }} style={{
                            padding: '10px 20px', fontSize: '14px', background: '#334155', color: '#94a3b8',
                            border: 'none', borderRadius: '10px', cursor: 'pointer', minHeight: '44px',
                        }}>⏮ 重置</button>
                        <button onClick={() => setStepIdx(prev => Math.max(-1, prev - 1))} disabled={stepIdx <= -1} style={{
                            padding: '10px 20px', fontSize: '14px',
                            background: stepIdx <= -1 ? '#1e293b' : '#334155',
                            color: stepIdx <= -1 ? '#475569' : '#94a3b8',
                            border: 'none', borderRadius: '10px', cursor: stepIdx <= -1 ? 'not-allowed' : 'pointer', minHeight: '44px',
                        }}>◀ 上一步</button>
                        <button onClick={() => {
                            if (isPlaying) { setIsPlaying(false); }
                            else { if (stepIdx >= steps.length - 1) setStepIdx(-1); setIsPlaying(true); }
                        }} style={{
                            padding: '10px 28px', fontSize: '16px', fontWeight: 'bold',
                            background: isPlaying ? '#f59e0b' : '#3b82f6', color: '#fff',
                            border: 'none', borderRadius: '10px', cursor: 'pointer', minHeight: '44px',
                        }}>{isPlaying ? '⏸ 暫停' : '▶ 播放'}</button>
                        <button onClick={() => setStepIdx(prev => Math.min(steps.length - 1, prev + 1))} disabled={stepIdx >= steps.length - 1} style={{
                            padding: '10px 20px', fontSize: '14px',
                            background: stepIdx >= steps.length - 1 ? '#1e293b' : '#334155',
                            color: stepIdx >= steps.length - 1 ? '#475569' : '#94a3b8',
                            border: 'none', borderRadius: '10px', cursor: stepIdx >= steps.length - 1 ? 'not-allowed' : 'pointer', minHeight: '44px',
                        }}>下一步 ▶</button>
                    </div>
                </div>
            );
        }

        // ============================================================
        // Section 14c: Sandbox Mode (Free Play)
        // ============================================================
        const SANDBOX_BLOCKS = [
            { id: 'sb-text-hi', code: 'Text("哈囉")', type: 'view', treeNode: { type: 'Text', props: { content: '哈囉' }, modifiers: [] } },
            { id: 'sb-text-score', code: 'Text("Score: 0")', type: 'view', treeNode: { type: 'Text', props: { content: 'Score: 0' }, modifiers: [] } },
            { id: 'sb-img-star', code: 'Image(systemName: "star.fill")', type: 'view', treeNode: { type: 'Image', props: { systemName: 'star.fill' }, modifiers: [] } },
            { id: 'sb-img-bear', code: 'Image(systemName: "teddybear.fill")', type: 'view', treeNode: { type: 'Image', props: { systemName: 'teddybear.fill' }, modifiers: [] } },
            { id: 'sb-img-heart', code: 'Image(systemName: "heart.fill")', type: 'view', treeNode: { type: 'Image', props: { systemName: 'heart.fill' }, modifiers: [] } },
            { id: 'sb-img-flame', code: 'Image(systemName: "flame")', type: 'view', treeNode: { type: 'Image', props: { systemName: 'flame' }, modifiers: [] } },
            { id: 'sb-btn', code: 'Button("點擊")', type: 'view', treeNode: { type: 'Button', props: { title: '點擊' }, modifiers: [] } },
        ];
        const SANDBOX_CONTAINERS = [
            { id: 'sb-vstack', code: 'VStack { }', type: 'container', containerType: 'VStack' },
            { id: 'sb-hstack', code: 'HStack { }', type: 'container', containerType: 'HStack' },
        ];
        const SANDBOX_MODIFIERS = [
            { id: 'sb-mod-title', code: '.font(.title)', mod: { type: 'font', value: '.title' } },
            { id: 'sb-mod-caption', code: '.font(.caption)', mod: { type: 'font', value: '.caption' } },
            { id: 'sb-mod-bold', code: '.bold()', mod: { type: 'bold' } },
            { id: 'sb-mod-red', code: '.foregroundColor(.red)', mod: { type: 'foregroundColor', value: '.red' } },
            { id: 'sb-mod-blue', code: '.foregroundColor(.blue)', mod: { type: 'foregroundColor', value: '.blue' } },
            { id: 'sb-mod-green', code: '.foregroundColor(.green)', mod: { type: 'foregroundColor', value: '.green' } },
            { id: 'sb-mod-orange', code: '.foregroundColor(.orange)', mod: { type: 'foregroundColor', value: '.orange' } },
            { id: 'sb-mod-pad', code: '.padding(8)', mod: { type: 'padding', value: 8 } },
            { id: 'sb-mod-bgblue', code: '.background(.blue)', mod: { type: 'background', value: '.blue' } },
        ];

        function SandboxMode({ onBack }) {
            // Sandbox state: a list of placed items in order
            // Each item: { id, treeNode } for views, or { id, containerType, children: [] } for containers
            const [items, setItems] = useState([]);
            const [selectedIdx, setSelectedIdx] = useState(null); // index of selected item for modifier attachment
            const [highlightPath, setHighlightPath] = useState(null);
            const idCounter = useRef(0);

            const addView = (block) => {
                idCounter.current++;
                const node = JSON.parse(JSON.stringify(block.treeNode));
                setItems(prev => [...prev, { uid: `v${idCounter.current}`, node }]);
            };

            const addContainer = (container) => {
                idCounter.current++;
                setItems(prev => [...prev, {
                    uid: `c${idCounter.current}`,
                    isContainer: true,
                    containerType: container.containerType,
                    children: [],
                }]);
            };

            const addModifier = (mod) => {
                if (selectedIdx === null) return;
                setItems(prev => {
                    const next = [...prev];
                    const item = { ...next[selectedIdx] };
                    if (item.isContainer) return next; // can't modify containers
                    item.node = { ...item.node, modifiers: [...(item.node.modifiers || []), { ...mod.mod }] };
                    next[selectedIdx] = item;
                    return next;
                });
            };

            const removeItem = (idx) => {
                setItems(prev => prev.filter((_, i) => i !== idx));
                if (selectedIdx === idx) setSelectedIdx(null);
                else if (selectedIdx > idx) setSelectedIdx(selectedIdx - 1);
            };

            const moveToContainer = (viewIdx, containerIdx) => {
                setItems(prev => {
                    const next = [...prev];
                    const view = next[viewIdx];
                    if (!view || view.isContainer) return next;
                    const container = { ...next[containerIdx] };
                    if (!container.isContainer) return next;
                    container.children = [...container.children, view];
                    next[containerIdx] = container;
                    return next.filter((_, i) => i !== viewIdx);
                });
                setSelectedIdx(null);
            };

            // Build the tree for preview
            const buildSandboxTree = () => {
                const nodes = items.map(item => {
                    if (item.isContainer) {
                        return {
                            type: item.containerType,
                            children: item.children.map(c => c.node),
                            modifiers: [],
                        };
                    }
                    return item.node;
                });
                if (nodes.length === 0) return null;
                if (nodes.length === 1) return nodes[0];
                return { type: 'VStack', children: nodes, modifiers: [] };
            };

            const sandboxTree = buildSandboxTree();
            const codeStr = sandboxTree ? uiTreeToCode(sandboxTree) : '';

            return (
                <div className="fade-in" style={{ padding: '16px', maxWidth: '800px', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px' }}>
                        <button onClick={onBack} style={{
                            background: '#1e293b', border: '1px solid #334155', borderRadius: '10px',
                            color: '#94a3b8', padding: '8px 16px', fontSize: '14px', cursor: 'pointer', minHeight: '44px',
                        }}>← 返回</button>
                        <div style={{ fontSize: '16px', fontWeight: 'bold', color: '#f1f5f9' }}>🎨 自由沙盒</div>
                        <button onClick={() => { setItems([]); setSelectedIdx(null); }} style={{
                            background: '#334155', border: 'none', borderRadius: '10px',
                            color: '#94a3b8', padding: '8px 16px', fontSize: '14px', cursor: 'pointer', minHeight: '44px',
                        }}>🔄 清空</button>
                    </div>

                    <p style={{ fontSize: '14px', color: '#64748b', marginBottom: '16px', lineHeight: 1.5 }}>
                        自由拼裝元件，即時看到效果。點擊已放置的元件可選中它，再點修飾器即可套用。
                    </p>

                    {/* Block palettes */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' }}>
                        <div style={{ fontSize: '12px', color: '#64748b', width: '100%', marginBottom: '2px' }}>📦 容器</div>
                        {SANDBOX_CONTAINERS.map(c => (
                            <div key={c.id} className="sandbox-block" onClick={() => addContainer(c)}
                                style={{ borderColor: '#60a5fa' }}>
                                <HighlightedCode code={c.code} fontSize="12px" />
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' }}>
                        <div style={{ fontSize: '12px', color: '#64748b', width: '100%', marginBottom: '2px' }}>🧱 元件</div>
                        {SANDBOX_BLOCKS.map(b => (
                            <div key={b.id} className="sandbox-block" onClick={() => addView(b)}>
                                <HighlightedCode code={b.code} fontSize="12px" />
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
                        <div style={{ fontSize: '12px', color: '#64748b', width: '100%', marginBottom: '2px' }}>🎨 修飾器 {selectedIdx !== null ? <span style={{ color: '#fbbf24' }}>（套用到選中元件）</span> : <span style={{ color: '#475569' }}>（先選中元件）</span>}</div>
                        {SANDBOX_MODIFIERS.map(m => (
                            <div key={m.id} className="sandbox-block" onClick={() => addModifier(m)}
                                style={{ borderColor: '#B281EB', opacity: selectedIdx !== null ? 1 : 0.4, cursor: selectedIdx !== null ? 'pointer' : 'not-allowed' }}>
                                <HighlightedCode code={m.code} fontSize="12px" />
                            </div>
                        ))}
                    </div>

                    {/* Main: placed items + preview + code */}
                    <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                        {/* Left: placed items list */}
                        <div style={{ flex: '1 1 200px', minWidth: '200px' }}>
                            <div style={{ fontSize: '12px', color: '#64748b', marginBottom: '8px' }}>🗂️ 已放置元件（點擊選中/刪除）</div>
                            <div style={{
                                background: '#0f172a', borderRadius: '10px', border: '1px solid #334155',
                                padding: '10px', minHeight: '120px',
                            }}>
                                {items.length === 0 ? (
                                    <div style={{ color: '#475569', fontSize: '13px', textAlign: 'center', padding: '20px' }}>
                                        點擊上方元件開始添加
                                    </div>
                                ) : (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                        {items.map((item, idx) => (
                                            <div key={item.uid} style={{
                                                display: 'flex', alignItems: 'center', gap: '6px',
                                                padding: '6px 10px', borderRadius: '8px',
                                                background: selectedIdx === idx ? 'rgba(96,165,250,0.15)' : '#1e293b',
                                                border: `1px solid ${selectedIdx === idx ? '#60a5fa' : '#334155'}`,
                                                cursor: 'pointer',
                                            }}>
                                                <div style={{ flex: 1 }} onClick={() => setSelectedIdx(selectedIdx === idx ? null : idx)}>
                                                    <span style={{ fontSize: '12px', color: '#5DD8FF', fontFamily: 'monospace' }}>
                                                        {item.isContainer ? `${item.containerType} { ${item.children.length} 個子元件 }` : uiTreeToCode(item.node)}
                                                    </span>
                                                </div>
                                                {item.isContainer && selectedIdx !== null && selectedIdx !== idx && !items[selectedIdx]?.isContainer && (
                                                    <button onClick={(e) => { e.stopPropagation(); moveToContainer(selectedIdx, idx); }}
                                                        style={{ fontSize: '11px', color: '#34C759', background: 'rgba(52,199,89,0.15)', border: '1px solid rgba(52,199,89,0.3)', borderRadius: '6px', padding: '2px 8px', cursor: 'pointer' }}>
                                                        放入
                                                    </button>
                                                )}
                                                <button onClick={(e) => { e.stopPropagation(); removeItem(idx); }}
                                                    style={{ fontSize: '14px', color: '#64748b', background: 'none', border: 'none', cursor: 'pointer', padding: '2px 4px' }}>✕</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Right: preview + code + tree */}
                        <div style={{ flex: '1 1 280px', minWidth: '280px' }}>
                            <div style={{ marginBottom: '12px' }}>
                                <DeviceFrame title="即時預覽">
                                    {sandboxTree ? (
                                        <SwiftUIPreview uiTree={sandboxTree} highlightPath={highlightPath} onHoverPath={setHighlightPath} />
                                    ) : (
                                        <div style={{ color: '#C7C7CC', fontSize: '14px', textAlign: 'center' }}>添加元件看效果...</div>
                                    )}
                                </DeviceFrame>
                            </div>
                            {sandboxTree && (
                                <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                                    <div style={{ flex: '1 1 140px' }}>
                                        <ViewTree uiTree={sandboxTree} highlightPath={highlightPath} onHoverPath={setHighlightPath} />
                                    </div>
                                    <div style={{ flex: '1 1 160px' }}>
                                        <div style={{ fontSize: '11px', color: '#64748b', marginBottom: '6px' }}>📄 程式碼</div>
                                        <HighlightedCode code={codeStr} fontSize="12px" />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // Section 15: Completion Screen
        // ============================================================
        function CompletionScreen({ totalStars, onRestart }) {
            return (
                <div className="slide-up" style={{ padding: '48px 24px', maxWidth: '500px', margin: '0 auto', textAlign: 'center' }}>
                    <div style={{ fontSize: '80px', marginBottom: '16px' }}>🏆</div>
                    <h1 style={{ fontSize: '32px', fontWeight: 'bold', margin: '0 0 12px', color: '#f1f5f9' }}>
                        恭喜你！全部通關！
                    </h1>
                    <p style={{ fontSize: '18px', color: '#94a3b8', marginBottom: '24px', lineHeight: 1.6 }}>
                        你已經學會了 SwiftUI 的基本元件、排版、修飾器和按鈕，
                        並且成功組裝了打地鼠遊戲的畫面佈局！
                    </p>
                    <div style={{
                        display: 'inline-flex', alignItems: 'center', gap: '8px',
                        background: '#1e293b', padding: '12px 24px', borderRadius: '20px',
                        marginBottom: '32px',
                    }}>
                        <span style={{ fontSize: '28px' }}>⭐</span>
                        <span style={{ fontSize: '24px', fontWeight: 'bold', color: '#fbbf24' }}>{totalStars}</span>
                        <span style={{ fontSize: '16px', color: '#94a3b8' }}>/ {LEVELS.length * 3}</span>
                    </div>
                    <div style={{ marginBottom: '32px' }}>
                        <p style={{ fontSize: '16px', color: '#64748b' }}>
                            📌 現在你可以打開 Xcode，動手寫出真正的打地鼠 App！
                        </p>
                    </div>
                    <button
                        onClick={onRestart}
                        style={{
                            padding: '14px 40px', fontSize: '18px', fontWeight: 'bold',
                            background: '#3b82f6', color: '#fff', border: 'none',
                            borderRadius: '12px', cursor: 'pointer',
                        }}
                    >
                        🔄 再玩一次
                    </button>
                </div>
            );
        }

        // ============================================================
        // Section 16: Main App Component
        // ============================================================
        function App() {
            const [gamePhase, setGamePhase] = useState('loading');
            const [currentLevel, setCurrentLevel] = useState(null);
            const [playerName, setPlayerName] = useState('');
            const [progress, setProgress] = useState(() => {
                try {
                    const saved = localStorage.getItem('swift_code_game_progress');
                    return saved ? JSON.parse(saved) : { levels: {}, totalStars: 0 };
                } catch { return { levels: {}, totalStars: 0 }; }
            });

            // Save progress
            useEffect(() => {
                localStorage.setItem('swift_code_game_progress', JSON.stringify(progress));
            }, [progress]);

            // Calculate total stars
            const totalStars = useMemo(() => {
                return Object.values(progress.levels || {}).reduce((sum, l) => sum + (l.stars || 0), 0);
            }, [progress]);

            // Auth init
            useEffect(() => {
                (async () => {
                    try {
                        const ok = await SwiftGameBridge.init();
                        if (ok && SwiftGameBridge.user) {
                            setPlayerName(SwiftGameBridge.user.name);
                        }
                    } catch {}
                    setGamePhase('levelSelect');
                })();
            }, []);

            const handleSelectLevel = (level) => {
                setCurrentLevel(level);
                setGamePhase(level.phase);
            };

            const handleLevelComplete = (stars) => {
                const levelId = currentLevel.id;
                setProgress(prev => {
                    const prevStars = prev.levels?.[levelId]?.stars || 0;
                    const newStars = Math.max(prevStars, stars);
                    return {
                        ...prev,
                        levels: {
                            ...prev.levels,
                            [levelId]: { stars: newStars, completed: true },
                        },
                    };
                });

                // Check if all levels completed
                const allCompleted = LEVELS.every(l => {
                    if (l.id === currentLevel.id) return true;
                    return progress.levels?.[l.id]?.completed;
                });

                if (allCompleted && currentLevel.id === 7) {
                    setGamePhase('complete');
                } else {
                    setGamePhase('levelSelect');
                }
                setCurrentLevel(null);
            };

            const handleBack = () => {
                setGamePhase('levelSelect');
                setCurrentLevel(null);
            };

            // Loading
            if (gamePhase === 'loading') {
                return (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
                        <div className="game-spinner" style={{ marginBottom: '16px' }}></div>
                        <div style={{ color: '#94a3b8' }}>載入中...</div>
                    </div>
                );
            }

            // Level select
            if (gamePhase === 'levelSelect') {
                return (
                    <LevelSelectScreen
                        progress={progress}
                        totalStars={totalStars}
                        onSelectLevel={handleSelectLevel}
                        onExplore={() => setGamePhase('explore')}
                        onSandbox={() => setGamePhase('sandbox')}
                        playerName={playerName}
                    />
                );
            }

            // Quiz mode
            if (gamePhase === 'quiz' && currentLevel) {
                return (
                    <QuizMode
                        level={currentLevel}
                        onComplete={handleLevelComplete}
                        onBack={handleBack}
                    />
                );
            }

            // Drag & Drop mode
            if (gamePhase === 'dragDrop' && currentLevel) {
                return (
                    <DragDropMode
                        level={currentLevel}
                        onComplete={handleLevelComplete}
                        onBack={handleBack}
                    />
                );
            }

            // Build Animation (Explore) mode
            if (gamePhase === 'explore') {
                return <BuildAnimationMode onBack={handleBack} />;
            }

            // Sandbox mode
            if (gamePhase === 'sandbox') {
                return <SandboxMode onBack={handleBack} />;
            }

            // Completion
            if (gamePhase === 'complete') {
                return (
                    <CompletionScreen
                        totalStars={totalStars}
                        onRestart={() => { setGamePhase('levelSelect'); }}
                    />
                );
            }

            return null;
        }

        // ============================================================
        // Section 17: Mount App
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
