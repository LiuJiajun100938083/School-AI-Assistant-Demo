<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="ct.pageTitle">教學控制台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/static/js/shared/theme.js"></script>
    <link rel="stylesheet" href="/static/css/classroom_teacher.css">
    <link rel="stylesheet" href="/static/css/lesson_runtime.css">
</head>
<body>

<!-- ===== SVG Icon Sprite Sheet ===== -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </symbol>
    <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
    </symbol>
    <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
    </symbol>
    <symbol id="icon-more" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
    </symbol>
    <symbol id="icon-pen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </symbol>
    <symbol id="icon-highlighter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 11-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/>
    </symbol>
    <symbol id="icon-eraser" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.9-9.9c1-1 2.5-1 3.4 0l5.3 5.3c1 1 1 2.5 0 3.4L12 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/>
    </symbol>
    <symbol id="icon-type" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
    </symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
    </symbol>
    <symbol id="icon-redo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </symbol>
    <symbol id="icon-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </symbol>
    <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
    </symbol>
    <symbol id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
    </symbol>
    <symbol id="icon-square" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
    </symbol>
    <symbol id="icon-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
    </symbol>
    <symbol id="icon-gamepad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/>
    </symbol>
    <symbol id="icon-help-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </symbol>
    <symbol id="icon-bar-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>
    </symbol>
    <symbol id="icon-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </symbol>
    <symbol id="icon-hand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 11V6a2 2 0 0 0-4 0v1"/><path d="M14 10V4a2 2 0 0 0-4 0v2"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
    </symbol>
    <symbol id="icon-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
    </symbol>
    <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </symbol>
</svg>

<div class="app">

    <!-- ===== TOP BAR ===== -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="topbar-btn" id="backToListBtn" data-i18n-title="ct.backToList" title="返回課堂列表">
                <svg class="icon"><use href="#icon-arrow-left"/></svg>
            </button>
            <div class="topbar-divider"></div>
            <span class="topbar-title" id="topbarTitle" data-i18n="ct.classroom">課堂</span>
            <span class="room-status draft" id="roomStatus" data-i18n="ct.statusDraft">草稿</span>
        </div>

        <div class="topbar-center">
            <button class="topbar-btn" id="prevBtn" data-i18n-title="ct.prevPage" title="上一頁">
                <svg class="icon"><use href="#icon-chevron-left"/></svg>
            </button>
            <span class="page-indicator">
                <span data-i18n="ct.pagePrefix">第</span> <span id="currentPage">-</span> / <span id="totalPages">-</span> <span data-i18n="ct.pageSuffix">張</span>
            </span>
            <span class="slide-type-pill" id="slideTypePill"></span>
            <button class="topbar-btn" id="nextBtn" data-i18n-title="ct.nextPage" title="下一頁">
                <svg class="icon"><use href="#icon-chevron-right"/></svg>
            </button>
        </div>

        <div class="topbar-right">
            <button class="cta-btn" id="pushBtn" data-i18n-title="ct.pushToStudents" title="推送給學生">
                <svg class="icon"><use href="#icon-send"/></svg>
                <span data-i18n="ct.pushToStudents">推送給學生</span>
            </button>
            <div class="topbar-divider"></div>
            <div class="dropdown-wrapper" id="dropdownWrapper">
                <button class="topbar-btn" id="moreBtn" data-i18n-title="ct.moreActions" title="更多操作">
                    <svg class="icon"><use href="#icon-more"/></svg>
                </button>
                <div class="dropdown-menu" id="moreMenu">
                    <!-- 課案操作 -->
                    <button class="dropdown-item" id="selectLessonItem" onclick="promptStartLesson()">
                        <svg class="icon"><use href="#icon-list"/></svg>
                        <span class="dropdown-item-content">
                            <span class="dropdown-item-label" data-i18n="ct.selectLesson">選擇課案</span>
                            <span class="dropdown-item-desc" data-i18n="ct.selectLessonDesc">開始一節新課案</span>
                        </span>
                    </button>
                    <button class="dropdown-item" id="endLessonItem" onclick="endLesson()" style="display:none;">
                        <svg class="icon"><use href="#icon-square"/></svg>
                        <span class="dropdown-item-content">
                            <span class="dropdown-item-label" data-i18n="ct.endLesson">結束本節課案</span>
                            <span class="dropdown-item-desc" data-i18n="ct.endLessonDesc">停止當前課案，可選下一節</span>
                        </span>
                    </button>
                    <div class="dropdown-divider" id="lessonDivider"></div>
                    <!-- 課堂狀態 -->
                    <button class="dropdown-item" id="pauseBtn" style="display:none;">
                        <svg class="icon"><use href="#icon-pause"/></svg>
                        <span class="dropdown-item-content">
                            <span class="dropdown-item-label" data-i18n="ct.pauseClass">暫停課堂</span>
                            <span class="dropdown-item-desc" data-i18n="ct.pauseClassDesc">學生暫時無法操作</span>
                        </span>
                    </button>
                    <button class="dropdown-item" id="resumeBtn" style="display:none;">
                        <svg class="icon"><use href="#icon-play"/></svg>
                        <span class="dropdown-item-content">
                            <span class="dropdown-item-label" data-i18n="ct.resumeClass">繼續課堂</span>
                            <span class="dropdown-item-desc" data-i18n="ct.resumeClassDesc">恢復課堂互動</span>
                        </span>
                    </button>
                    <div class="dropdown-divider" id="statusDivider"></div>
                    <!-- 下課 -->
                    <button class="dropdown-item danger" id="endClassBtn">
                        <svg class="icon"><use href="#icon-square"/></svg>
                        <span class="dropdown-item-content">
                            <span class="dropdown-item-label" data-i18n="ct.endClass">下課</span>
                            <span class="dropdown-item-desc" data-i18n="ct.endClassDesc">結束課堂，學生將被移出</span>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== MAIN AREA ===== -->
    <div class="main">

        <!-- LEFT RAIL -->
        <aside class="left-rail">
            <div class="upload-section">
                <button class="upload-btn" id="uploadBtn">
                    <svg class="icon"><use href="#icon-upload"/></svg>
                    <span data-i18n="ct.uploadSlides">上傳課件</span>
                </button>
                <input type="file" id="pptFile" accept=".pptx" style="display:none;">
            </div>
            <div class="slide-rail" id="thumbnailsContainer"></div>
        </aside>

        <!-- STAGE -->
        <main class="stage">
            <!-- Canvas area -->
            <div class="canvas-wrapper" id="canvasArea" style="display: none;">
                <img id="pptImage" class="ppt-image">
                <canvas id="fabricCanvas"></canvas>
            </div>
            <!-- Placeholder -->
            <div class="canvas-placeholder" id="canvasPlaceholder" data-i18n="ct.placeholderSelectOrUpload">
                請選擇課案或上傳課件
            </div>

            <!-- FLOATING ANNOTATION BAR -->
            <div class="annotation-bar" id="annotationBar">
                <!-- Tools group: icon + label -->
                <div class="anno-group">
                    <button class="tool-btn" id="penBtn" data-i18n-title="ct.toolPen" title="畫筆">
                        <svg class="icon"><use href="#icon-pen"/></svg>
                        <span class="anno-label" data-i18n="ct.toolPen">畫筆</span>
                    </button>
                    <button class="tool-btn" id="highlighterBtn" data-i18n-title="ct.toolHighlighter" title="螢光筆">
                        <svg class="icon"><use href="#icon-highlighter"/></svg>
                        <span class="anno-label" data-i18n="ct.toolHighlighterShort">螢光</span>
                    </button>
                    <button class="tool-btn" id="eraserBtn" data-i18n-title="ct.toolEraser" title="橡皮擦">
                        <svg class="icon"><use href="#icon-eraser"/></svg>
                        <span class="anno-label" data-i18n="ct.toolEraserShort">橡皮</span>
                    </button>
                    <button class="tool-btn" id="textBtn" data-i18n-title="ct.toolText" title="文字">
                        <svg class="icon"><use href="#icon-type"/></svg>
                        <span class="anno-label" data-i18n="ct.toolText">文字</span>
                    </button>
                </div>
                <div class="anno-sep"></div>
                <!-- Style group: icon-only -->
                <div class="anno-group">
                    <div class="color-picker-group">
                        <div class="color-swatch active" data-color="#000000" style="background:#000000;" data-i18n-title="ct.colorBlack" title="黑色"></div>
                        <div class="color-swatch" data-color="#ff3b30" style="background:#ff3b30;" data-i18n-title="ct.colorRed" title="紅色"></div>
                        <div class="color-swatch" data-color="#0071e3" style="background:#0071e3;" data-i18n-title="ct.colorBlue" title="藍色"></div>
                        <div class="color-swatch" data-color="#34c759" style="background:#34c759;" data-i18n-title="ct.colorGreen" title="綠色"></div>
                        <div class="color-swatch" data-color="#ff9500" style="background:#ff9500;" data-i18n-title="ct.colorOrange" title="橙色"></div>
                        <div class="color-swatch" data-color="#a855f7" style="background:#a855f7;" data-i18n-title="ct.colorPurple" title="紫色"></div>
                    </div>
                    <div class="width-control">
                        <input type="range" id="lineWidthSlider" min="1" max="10" value="2" data-i18n-title="ct.lineWidth" title="筆寬">
                    </div>
                </div>
                <div class="anno-sep"></div>
                <!-- Edit group: icon-only -->
                <div class="anno-group">
                    <button class="anno-action-btn" id="undoBtn" data-i18n-title="ct.undo" title="撤銷">
                        <svg class="icon"><use href="#icon-undo"/></svg>
                    </button>
                    <button class="anno-action-btn" id="redoBtn" data-i18n-title="ct.redo" title="重做">
                        <svg class="icon"><use href="#icon-redo"/></svg>
                    </button>
                    <button class="anno-action-btn" id="clearBtn" data-i18n-title="ct.clearAnnotations" title="清除標註">
                        <svg class="icon"><use href="#icon-trash"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- RIGHT PANEL -->
        <aside class="right-panel">
            <!-- A. Status Summary -->
            <div class="panel-section panel-status">
                <div class="status-line">
                    <span class="status-dim" data-i18n="ct.room">課室</span>
                    <span class="status-val" id="roomId">-</span>
                </div>
                <div class="status-line">
                    <span class="status-dim" data-i18n="ct.teacher">講師</span>
                    <span class="status-val" id="teacherName">-</span>
                </div>
                <div class="status-line">
                    <span class="status-dim" data-i18n="ct.online">在線</span>
                    <span class="online-dot"></span>
                    <span class="status-val"><span id="studentCount">0</span> <span data-i18n="ct.personUnit">人</span></span>
                </div>
            </div>

            <!-- B. Slide Operations -->
            <div class="panel-section panel-actions">
                <div class="panel-section-title" data-i18n="ct.actions">操作</div>
                <div class="slide-status-text" id="slideStatusText" data-i18n="ct.classNotStarted">課堂尚未開始</div>
                <div class="lesson-info-text" id="lessonInfo"></div>

                <!-- Draft: Start class CTA -->
                <button class="ctrl-btn primary full-width" id="startClassBtn">
                    <svg class="icon"><use href="#icon-play"/></svg> <span data-i18n="ct.startClass">開始上課</span>
                </button>

                <!-- No active lesson: Select lesson -->
                <div id="lessonStartBar">
                    <button class="ctrl-btn outline full-width" id="startLessonBtn" onclick="promptStartLesson()">
                        <svg class="icon"><use href="#icon-list"/></svg> <span data-i18n="ct.selectLesson">選擇課案</span>
                    </button>
                </div>

                <!-- Active lesson: Slide control buttons -->
                <div id="lessonControlBar" style="display:none;" class="lesson-action-group">
                    <button class="ctrl-btn primary full-width" id="lessonActivateBtn" onclick="lessonSlideAction('activate')" data-i18n="ct.push">推送</button>
                    <button class="ctrl-btn outline full-width" id="openResponsesBtn" onclick="lessonSlideAction('open_responses')" data-i18n="ct.openResponses">開放回應</button>
                    <button class="ctrl-btn outline full-width" id="closeResponsesBtn" onclick="lessonSlideAction('close_responses')" data-i18n="ct.closeResponses">關閉回應</button>
                    <button class="ctrl-btn outline full-width" id="quizRevealBtn" onclick="lessonSlideAction('quiz_reveal')" style="display:none;" data-i18n="ct.revealAnswer">揭示答案</button>
                    <button class="ctrl-btn outline full-width" id="quizNextBtn" onclick="lessonSlideAction('quiz_next')" style="display:none;" data-i18n="ct.nextQuestion">下一題</button>
                    <button class="ctrl-btn outline full-width" id="showResultsBtn" onclick="lessonSlideAction('show_results')" style="display:none;" data-i18n="ct.showResults">顯示結果</button>
                    <button class="ctrl-btn outline full-width" id="interactiveLockBtn" onclick="lessonSlideAction('interactive_lock')" style="display:none;" data-i18n="ct.lockStudents">🔒 鎖定學生</button>
                    <button class="ctrl-btn outline full-width" id="interactiveUnlockBtn" onclick="lessonSlideAction('interactive_unlock')" style="display:none;" data-i18n="ct.unlockStudents">🔓 解鎖學生</button>
                </div>
            </div>

            <!-- D. Online Students -->
            <div class="panel-section panel-students">
                <div class="panel-section-title" data-i18n="ct.students">學生</div>
                <div class="students-container" id="studentsList">
                    <div class="empty-state" data-i18n="ct.noStudents">尚無學生連線</div>
                </div>
            </div>
        </aside>

    </div>
</div>

<!-- ===== Confirm Modal ===== -->
<div class="modal" id="confirmModal">
    <div class="modal-content">
        <div class="modal-title" id="confirmTitle" data-i18n="ct.confirmAction">確認操作</div>
        <div class="modal-body" id="confirmBody" data-i18n="ct.confirmActionBody">確認執行此操作嗎？</div>
        <div class="modal-buttons">
            <button class="modal-btn" id="confirmCancel" data-i18n="ct.cancel">取消</button>
            <button class="modal-btn primary" id="confirmOk" data-i18n="ct.confirm">確認</button>
        </div>
    </div>
</div>

<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/shared/i18n.js"></script>
<script src="/static/js/shared/i18n/common.js"></script>
<script src="/static/js/shared/i18n/classroom.js"></script>
<script src="/static/js/shared/annotation_utils.js"></script>
<script src="/static/js/shared/lesson_slide_renderers.js"></script>
<script src="/static/js/shared/interactive_renderers.js"></script>
<link rel="stylesheet" href="/static/css/interactive_activity.css">
<script src="/static/js/classroom_teacher.js"></script>
</body>
</html>
