<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师课堂 - 课件演示系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="/static/css/classroom_teacher.css">
</head>
<body>
    <div class="container">
        <!-- TOP TOOLBAR -->
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="tool-btn" id="penBtn" title="画笔">
                    <span>🖊</span> 画笔
                </button>
                <button class="tool-btn" id="highlighterBtn" title="荧光笔">
                    <span>🖍</span> 荧光笔
                </button>
                <button class="tool-btn" id="eraserBtn" title="橡皮擦">
                    <span>🧹</span> 橡皮擦
                </button>
                <button class="tool-btn" id="textBtn" title="文字">
                    <span>📝</span> 文字
                </button>
                <button class="tool-btn" id="clearBtn" title="清除">
                    <span>✕</span> 清除
                </button>

                <div class="separator"></div>

                <div class="color-picker-group">
                    <div class="color-swatch active" data-color="#000000" style="background: #000000;"></div>
                    <div class="color-swatch" data-color="#ff3b30" style="background: #ff3b30;"></div>
                    <div class="color-swatch" data-color="#0071e3" style="background: #0071e3;"></div>
                    <div class="color-swatch" data-color="#34c759" style="background: #34c759;"></div>
                    <div class="color-swatch" data-color="#ff9500" style="background: #ff9500;"></div>
                    <div class="color-swatch" data-color="#a855f7" style="background: #a855f7;"></div>
                </div>

                <div class="separator"></div>

                <div class="slider-group">
                    <label>笔宽:</label>
                    <input type="range" id="lineWidthSlider" min="1" max="10" value="2">
                </div>
            </div>

            <div class="toolbar-center">
                <button class="tool-btn" id="undoBtn" title="撤销">↶ 撤销</button>
                <button class="tool-btn" id="redoBtn" title="重做">↷ 重做</button>
            </div>

            <div class="toolbar-right">
                <button class="push-btn" id="pushBtn" title="推送给学生">📤 推送给学生</button>

                <div class="separator"></div>

                <div class="page-nav">
                    <button class="tool-btn" id="prevBtn" title="上一页">◄ 上一页</button>
                    <div class="page-display">
                        <span id="currentPage">-</span> / <span id="totalPages">-</span>
                    </div>
                    <button class="tool-btn" id="nextBtn" title="下一页">下一页 ►</button>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- LEFT SIDEBAR -->
            <div class="left-sidebar">
                <div class="upload-section">
                    <button class="upload-btn" id="uploadBtn">📤 上传课件</button>
                    <input type="file" id="pptFile" accept=".pptx">
                </div>
                <div class="thumbnails-container" id="thumbnailsContainer"></div>
            </div>

            <!-- CENTER CANVAS -->
            <div class="center-canvas">
                <div class="canvas-wrapper">
                    <img id="pptImage" class="ppt-image" style="display: none;">
                    <canvas id="fabricCanvas" style="display: none;"></canvas>
                    <div class="canvas-placeholder" id="canvasPlaceholder">
                        上传课件后开始
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDEBAR -->
            <div class="right-sidebar">
                <!-- Room Info -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">课室信息</div>
                    <div class="room-info">
                        <div class="room-info-item">
                            <span>课室号:</span>
                            <span id="roomId">-</span>
                        </div>
                        <div class="room-info-item">
                            <span>讲师:</span>
                            <span id="teacherName">-</span>
                        </div>
                        <div class="room-info-item">
                            <span>状态:</span>
                            <span class="room-status draft" id="roomStatus">草稿</span>
                        </div>
                        <div class="room-info-item">
                            <span>学生人数:</span>
                            <span id="studentCount">0</span>
                        </div>
                    </div>
                </div>

                <!-- Room Controls -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">课室控制</div>
                    <div class="room-controls">
                        <button class="control-btn primary" id="startClassBtn">🟢 开始上课</button>
                        <button class="control-btn" id="pauseBtn" style="display: none;">⏸ 暂停</button>
                        <button class="control-btn" id="resumeBtn" style="display: none;">▶ 继续</button>
                        <button class="control-btn" id="endClassBtn">🔴 结束</button>
                    </div>
                </div>

                <!-- Student List -->
                <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
                    <div class="sidebar-section-title">在线学生</div>
                    <div class="students-container" id="studentsList">
                        <div style="color: #999; font-size: 12px; text-align: center; padding: 20px;">
                            暂无学生连接
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title" id="confirmTitle">确认操作</div>
            <div class="modal-body" id="confirmBody">确认执行此操作吗？</div>
            <div class="modal-buttons">
                <button class="modal-btn" id="confirmCancel">取消</button>
                <button class="modal-btn primary" id="confirmOk">确认</button>
            </div>
        </div>
    </div>

    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/ui.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/classroom_teacher.js"></script>
</body>
</html>
