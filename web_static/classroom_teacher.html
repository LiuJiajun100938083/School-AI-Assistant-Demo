<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師課堂 - 課件演示系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="/static/css/classroom_teacher.css">
</head>
<body>
    <div class="container">
        <!-- TOP TOOLBAR -->
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="tool-btn back-btn" id="backToListBtn" title="返回課堂列表">
                    <span>←</span> 返回
                </button>

                <div class="separator"></div>

                <button class="tool-btn" id="penBtn" title="畫筆">
                    <span>🖊</span> 畫筆
                </button>
                <button class="tool-btn" id="highlighterBtn" title="螢光筆">
                    <span>🖍</span> 螢光筆
                </button>
                <button class="tool-btn" id="eraserBtn" title="橡皮擦">
                    <span>🧹</span> 橡皮擦
                </button>
                <button class="tool-btn" id="textBtn" title="文字">
                    <span>📝</span> 文字
                </button>
                <button class="tool-btn" id="clearBtn" title="清除">
                    <span>✕</span> 清除
                </button>

                <div class="separator"></div>

                <div class="color-picker-group">
                    <div class="color-swatch active" data-color="#000000" style="background: #000000;"></div>
                    <div class="color-swatch" data-color="#ff3b30" style="background: #ff3b30;"></div>
                    <div class="color-swatch" data-color="#0071e3" style="background: #0071e3;"></div>
                    <div class="color-swatch" data-color="#34c759" style="background: #34c759;"></div>
                    <div class="color-swatch" data-color="#ff9500" style="background: #ff9500;"></div>
                    <div class="color-swatch" data-color="#a855f7" style="background: #a855f7;"></div>
                </div>

                <div class="separator"></div>

                <div class="slider-group">
                    <label>筆寬:</label>
                    <input type="range" id="lineWidthSlider" min="1" max="10" value="2">
                </div>
            </div>

            <div class="toolbar-center">
                <button class="tool-btn" id="undoBtn" title="撤銷">↶ 撤銷</button>
                <button class="tool-btn" id="redoBtn" title="重做">↷ 重做</button>
            </div>

            <div class="toolbar-right">
                <button class="push-btn" id="pushBtn" title="推送給學生">📤 推送給學生</button>

                <div class="separator"></div>

                <div class="page-nav">
                    <button class="tool-btn" id="prevBtn" title="上一頁">◄ 上一頁</button>
                    <div class="page-display">
                        <span id="currentPage">-</span> / <span id="totalPages">-</span>
                    </div>
                    <button class="tool-btn" id="nextBtn" title="下一頁">下一頁 ►</button>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- LEFT SIDEBAR -->
            <div class="left-sidebar">
                <div class="upload-section">
                    <button class="upload-btn" id="uploadBtn">📤 上傳課件</button>
                    <input type="file" id="pptFile" accept=".pptx">
                </div>
                <div class="thumbnails-container" id="thumbnailsContainer"></div>
            </div>

            <!-- CENTER CANVAS -->
            <div class="center-canvas">
                <div class="canvas-wrapper" id="canvasArea" style="display: none;">
                    <img id="pptImage" class="ppt-image">
                    <canvas id="fabricCanvas"></canvas>
                </div>
                <div class="canvas-placeholder" id="canvasPlaceholder">
                    上傳課件後開始
                </div>
            </div>

            <!-- RIGHT SIDEBAR -->
            <div class="right-sidebar">
                <!-- Room Info -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">課室資訊</div>
                    <div class="room-info">
                        <div class="room-info-item">
                            <span>課室號:</span>
                            <span id="roomId">-</span>
                        </div>
                        <div class="room-info-item">
                            <span>講師:</span>
                            <span id="teacherName">-</span>
                        </div>
                        <div class="room-info-item">
                            <span>狀態:</span>
                            <span class="room-status draft" id="roomStatus">草稿</span>
                        </div>
                        <div class="room-info-item">
                            <span>學生人數:</span>
                            <span id="studentCount">0</span>
                        </div>
                    </div>
                </div>

                <!-- Room Controls -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">課室控制</div>
                    <div class="room-controls">
                        <button class="control-btn primary" id="startClassBtn">🟢 開始上課</button>
                        <button class="control-btn" id="pauseBtn" style="display: none;">⏸ 暫停</button>
                        <button class="control-btn" id="resumeBtn" style="display: none;">▶ 繼續</button>
                        <button class="control-btn" id="endClassBtn">🔴 結束</button>
                    </div>
                </div>

                <!-- Lesson Plan Controls -->
                <div class="sidebar-section">
                    <div class="sidebar-section-title">課案控制</div>
                    <div id="lessonControlBar" style="display:none;" class="lesson-controls">
                        <div id="lessonInfo" style="font-size:12px;color:#6E6E73;margin-bottom:8px;"></div>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;">
                            <button class="control-btn" onclick="lessonNavigate('prev')" title="上一張">Prev</button>
                            <button class="control-btn" onclick="lessonNavigate('next')" title="下一張">Next</button>
                            <button class="control-btn" onclick="lessonSlideAction('activate')" title="激活">Activate</button>
                            <button class="control-btn" onclick="lessonSlideAction('open_responses')" title="開放回應">Open</button>
                            <button class="control-btn" onclick="lessonSlideAction('close_responses')" title="關閉回應">Close</button>
                            <button class="control-btn" onclick="lessonSlideAction('complete')" title="完成">Complete</button>
                            <button class="control-btn" onclick="endLesson()" style="color:#FF3B30;">End</button>
                        </div>
                    </div>
                    <div id="lessonStartBar" class="lesson-controls">
                        <button class="control-btn primary" id="startLessonBtn" onclick="promptStartLesson()">Start Lesson</button>
                    </div>
                </div>

                <!-- Student List -->
                <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column;">
                    <div class="sidebar-section-title">在線學生</div>
                    <div class="students-container" id="studentsList">
                        <div style="color: #999; font-size: 12px; text-align: center; padding: 20px;">
                            暫無學生連接
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title" id="confirmTitle">確認操作</div>
            <div class="modal-body" id="confirmBody">確認執行此操作嗎？</div>
            <div class="modal-buttons">
                <button class="modal-btn" id="confirmCancel">取消</button>
                <button class="modal-btn primary" id="confirmOk">確認</button>
            </div>
        </div>
    </div>

    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/ui.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/classroom_teacher.js"></script>
</body>
</html>
