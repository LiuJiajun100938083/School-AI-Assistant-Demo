<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能錯題本</title>
    <link rel="stylesheet" href="/static/css/mistake_book.css">
    <!-- KaTeX 數學公式渲染 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- Chart.js 圖表（知識圖譜用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div id="app" class="mb-page">

    <!-- 頂部導航 -->
    <header class="mb-header">
        <div class="mb-header__title">
            <a href="/">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <span>AI 智能錯題本</span>
        </div>
        <div class="mb-header__actions">
            <button class="mb-btn mb-btn--sm mb-btn--outline" onclick="location.href='/'">
                返回主頁
            </button>
        </div>
    </header>

    <!-- 內容容器（桌面端居中限寬，頭部和底部 tab 保持全寬） -->
    <div class="mb-content-wrap">
        <!-- 科目篩選 -->
        <div class="mb-subject-bar" id="subjectBar">
            <button class="mb-subject-chip mb-subject-chip--active" data-subject="all">全部</button>
            <button class="mb-subject-chip" data-subject="chinese">中文</button>
            <button class="mb-subject-chip" data-subject="math">數學</button>
            <button class="mb-subject-chip" data-subject="english">英文</button>
        </div>

        <!-- 主內容區 -->
        <main id="mainContent"></main>
    </div>

    <!-- 底部標籤欄 -->
    <nav class="mb-tab-bar" id="tabBar">
        <div class="mb-tab-bar__item mb-tab-bar__item--active" data-tab="home">
            <span class="mb-tab-bar__icon">📋</span>錯題
        </div>
        <div class="mb-tab-bar__item" data-tab="review">
            <span class="mb-tab-bar__icon">🔄</span>複習
        </div>
        <div class="mb-tab-bar__item" data-tab="practice">
            <span class="mb-tab-bar__icon">✏️</span>練習
        </div>
        <div class="mb-tab-bar__item" data-tab="analysis">
            <span class="mb-tab-bar__icon">📊</span>分析
        </div>
    </nav>

    <!-- 上傳面板（覆蓋層） -->
    <div class="mb-upload-panel" id="uploadPanel">
        <div class="mb-upload-panel__content" id="uploadContent"></div>
    </div>

    <!-- 詳情面板（覆蓋層） -->
    <div class="mb-detail-panel" id="detailPanel"></div>
</div>

<script src="/static/js/mistake_book.js"></script>
</body>
</html>
