<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能錯題本</title>
    <link rel="stylesheet" href="/static/css/mistake_book.css">
    <!-- KaTeX 數學公式渲染 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- Markdown + XSS 防護 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <!-- Chart.js 圖表（知識圖譜用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <!-- JSXGraph（圓類幾何渲染） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <script src="/static/js/shared/jsxgraph_renderer.js"></script>
</head>
<body>

<div id="app" class="mb-page">

    <!-- 頂部導航 -->
    <header class="mb-header">
        <div class="mb-header__title">
            <a href="/">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <span id="headerTitle">錯題本</span>
        </div>
        <div class="mb-header__actions" id="headerActions"></div>
    </header>

    <!-- 內容區 -->
    <div class="mb-content-wrap">
        <main id="mainContent"></main>
    </div>

    <!-- 底部標籤欄（3 Tab） -->
    <nav class="mb-tab-bar" id="tabBar">
        <div class="mb-tab-bar__item mb-tab-bar__item--active" data-tab="home">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </span>
            <span class="mb-tab-bar__label">錯題本</span>
        </div>
        <div class="mb-tab-bar__item" data-tab="learn">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </span>
            <span class="mb-tab-bar__label">學習</span>
            <span class="mb-tab-bar__badge" id="learnBadge" style="display:none"></span>
        </div>
        <div class="mb-tab-bar__item" data-tab="profile">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </span>
            <span class="mb-tab-bar__label">我的</span>
        </div>
    </nav>

    <!-- 上傳面板（覆蓋層） -->
    <div class="mb-upload-panel" id="uploadPanel">
        <div class="mb-upload-panel__content" id="uploadContent"></div>
    </div>

    <!-- 詳情面板（覆蓋層） -->
    <div class="mb-detail-panel" id="detailPanel"></div>
</div>

<script src="/static/js/mistake_book.js"></script>
</body>
</html>
