<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智能錯題本</title>
    <link rel="stylesheet" href="/static/css/mistake_book.css">
    <!-- KaTeX 數學公式渲染 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- Chart.js 圖表（知識圖譜用） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div id="app" class="mb-page">

    <!-- 頂部導航（科目切換內嵌） -->
    <header class="mb-header">
        <div class="mb-header__title">
            <a href="/">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <span>錯題本</span>
        </div>
        <div class="mb-header__actions">
            <div class="mb-subject-bar" id="subjectBar">
                <button class="mb-subject-chip mb-subject-chip--active" data-subject="all">全部</button>
                <button class="mb-subject-chip" data-subject="chinese">中文</button>
                <button class="mb-subject-chip" data-subject="math">數學</button>
                <button class="mb-subject-chip" data-subject="english">英文</button>
            </div>
        </div>
    </header>

    <!-- 內容區 -->
    <div class="mb-content-wrap">
        <main id="mainContent"></main>
    </div>

    <!-- 底部標籤欄（SVG 圖標） -->
    <nav class="mb-tab-bar" id="tabBar">
        <div class="mb-tab-bar__item mb-tab-bar__item--active" data-tab="home">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </span>
            <span class="mb-tab-bar__label">錯題</span>
        </div>
        <div class="mb-tab-bar__item" data-tab="review">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 1 21 5 17 9"></polyline>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                    <polyline points="7 23 3 19 7 15"></polyline>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                </svg>
            </span>
            <span class="mb-tab-bar__label">複習</span>
        </div>
        <div class="mb-tab-bar__item" data-tab="practice">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </span>
            <span class="mb-tab-bar__label">練習</span>
        </div>
        <div class="mb-tab-bar__item" data-tab="analysis">
            <span class="mb-tab-bar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </span>
            <span class="mb-tab-bar__label">分析</span>
        </div>
    </nav>

    <!-- 上傳面板（覆蓋層） -->
    <div class="mb-upload-panel" id="uploadPanel">
        <div class="mb-upload-panel__content" id="uploadContent"></div>
    </div>

    <!-- 詳情面板（覆蓋層） -->
    <div class="mb-detail-panel" id="detailPanel"></div>
</div>

<script src="/static/js/mistake_book.js"></script>
</body>
</html>
