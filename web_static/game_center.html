<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲中心 - AI學習夥伴</title>
    <link rel="stylesheet" href="/static/css/game_center.css">
    <link rel="stylesheet" href="/static/css/spinner.css">
    <!-- GSAP 動畫引擎（啟動畫面） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
    <!-- 启动画面 -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-icon">🎮</div>
            <div class="splash-title">遊戲中心</div>
            <div class="splash-subtitle">寓教於樂，輕鬆學習</div>
            <div class="splash-loader">
                <div class="domino-spinner domino-spinner--light"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <!-- 過渡遮罩層 -->
    <div class="glass-panel" id="glassPanel"></div>

    <!-- 主容器 -->
    <div class="game-center-container">
        <!-- 顶部导航 -->
        <header class="gc-header">
            <div class="gc-header-left">
                <button class="gc-back-btn" id="backBtn">
                    <span class="back-icon">←</span>
                    <span class="back-text">返回</span>
                </button>
                <div class="gc-logo">
                    <span class="logo-icon">🎮</span>
                    <span class="logo-text">遊戲中心</span>
                </div>
            </div>
            <div class="gc-header-center">
                <div class="gc-search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="gameSearch" placeholder="搜尋遊戲..." autocomplete="off">
                </div>
            </div>
            <div class="gc-header-right">
                <div class="gc-teacher-actions" id="teacherActions" style="display:none;">
                    <a href="/my_games" class="gc-action-btn">📋 我的遊戲</a>
                    <a href="/game_upload" class="gc-action-btn gc-action-primary">+ 上傳</a>
                </div>
                <div class="gc-user-info" id="userInfo">
                    <div class="gc-user-avatar" id="userAvatar">👤</div>
                    <span class="gc-user-name" id="userName">訪客</span>
                </div>
            </div>
        </header>

        <!-- 科目筛选栏 -->
        <nav class="gc-subject-nav">
            <div class="subject-tabs" id="subjectTabs">
                <!-- 动态生成科目标签 -->
            </div>
        </nav>

        <!-- 游戏内容区 -->
        <main class="gc-main">
            <div class="gc-games-container" id="gamesContainer">
                <!-- 动态生成各科目游戏区块 -->
            </div>

            <!-- 空状态 -->
            <div class="gc-empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">🎯</div>
                <div class="empty-title">未找到遊戲</div>
                <div class="empty-desc">嘗試其他搜尋關鍵字或選擇不同科目</div>
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="gc-footer">
            <div class="footer-content">
                <span>🎓 培僑中學 AI學習夥伴</span>
                <span class="footer-divider">|</span>
                <span>遊戲中心 v2.0</span>
            </div>
        </footer>
    </div>

    <!-- 分享二维码弹窗 -->
    <div class="gc-share-overlay" id="gcShareModal" style="display:none;">
        <div class="gc-share-modal">
            <div class="gc-share-header">
                <span class="gc-share-title" id="gcShareTitle">分享遊戲</span>
                <button class="gc-share-close" onclick="GameShareHelper.close()">&times;</button>
            </div>
            <div class="gc-share-body">
                <p class="gc-share-desc">選擇有效期後生成二維碼，學生掃碼即可直接玩遊戲（無需登入）</p>

                <div class="gc-share-durations" id="gcShareDurations">
                    <button class="gc-dur-btn" data-duration="30m">30 分鐘</button>
                    <button class="gc-dur-btn active" data-duration="1h">1 小時</button>
                    <button class="gc-dur-btn" data-duration="1d">1 天</button>
                    <button class="gc-dur-btn" data-duration="1w">1 週</button>
                </div>

                <button class="gc-share-gen-btn" id="gcShareGenBtn" onclick="GameShareHelper.generate()">
                    生成二維碼
                </button>

                <div class="gc-share-result" id="gcShareResult">
                    <div class="gc-qr-box" id="gcShareQr"></div>
                    <div class="gc-share-url-row">
                        <input type="text" class="gc-share-url" id="gcShareUrl" readonly>
                        <button class="gc-copy-btn" onclick="GameShareHelper.copyUrl()">複製</button>
                    </div>
                    <div class="gc-share-expires" id="gcShareExpires"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/ui.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/game_center.js"></script>
</body>
</html>
