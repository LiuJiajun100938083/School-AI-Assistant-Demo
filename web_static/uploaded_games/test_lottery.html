<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 幸運學號大轉盤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .number-display {
            font-size: 120px;
            font-weight: bold;
            color: #764ba2;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            text-shadow: 3px 3px 0 #eee;
            transition: transform 0.1s;
        }

        .number-display.spinning {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }

        .settings {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-group label {
            font-size: 0.9em;
            color: #555;
        }

        .setting-group input {
            width: 70px;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            text-align: center;
        }

        .setting-group input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-msg {
            margin-top: 25px;
            font-size: 1.2em;
            min-height: 30px;
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .history h3 {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .history-item {
            background: #f5f5f5;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .messages {
            font-size: 1.1em;
            color: #333;
            font-weight: 500;
        }

        .emoji-burst {
            position: fixed;
            font-size: 3em;
            pointer-events: none;
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(2) rotate(360deg); opacity: 0; }
        }

        .lucky-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 0 #fff;
            animation: pop 0.5s ease-out;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 幸運學號大轉盤</h1>
        <p class="subtitle">誰是今天的幸運兒？命運的齒輪開始轉動！</p>

        <div class="number-display" id="numberDisplay">?</div>

        <div class="settings">
            <div class="setting-group">
                <label>從</label>
                <input type="number" id="minNum" value="1" min="1">
                <label>號</label>
            </div>
            <div class="setting-group">
                <label>到</label>
                <input type="number" id="maxNum" value="40" min="1">
                <label>號</label>
            </div>
        </div>

        <button class="btn" id="spinBtn" onclick="spin()">🎲 開始抽籤！</button>

        <div class="result-msg">
            <p class="messages" id="message"></p>
        </div>

        <div class="history" id="historySection" style="display: none;">
            <h3>📜 歷史記錄（今日已中獎）</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        const funnyMessages = [
            "恭喜 {n} 號同學！老師的目光已經鎖定你了 👀",
            "{n} 號！命運選中了你，無處可逃！🏃‍♂️",
            "叮咚！{n} 號同學，你的外賣到了...啊不是，是你被抽中了！📦",
            "{n} 號同學請準備！記住，老師永遠愛你 ❤️",
            "哇！{n} 號！今天的幸運星就是你！⭐ (幸運？)",
            "{n} 號同學，恭喜獲得回答問題的珍貴機會！🎁",
            "咻～{n} 號命中！請不要裝死 💀",
            "{n} 號！上天選中了你！（其實是隨機數）🎯",
            "叮！{n} 號同學您已成功簽收這道題 📝",
            "{n} 號！不要懷疑，就是你！快站起來！🚀",
            "恭喜 {n} 號成為今日MVP（Most Valuable Presenter）🏆",
            "{n} 號同學，老師相信你一定行的...吧？🤔",
            "轟！{n} 號同學被命運的炮彈擊中！💥",
            "{n} 號！別看了，說的就是你！👆",
            "幸運女神親吻了 {n} 號同學...的額頭 💋"
        ];

        const emojis = ['🎉', '🎊', '🌟', '✨', '💫', '🔥', '💥', '🎯', '🏆', '👏'];
        let history = [];
        let isSpinning = false;

        function getRandomMessage(num) {
            const msg = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            return msg.replace('{n}', num);
        }

        function createEmojiBurst() {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-burst';
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + 'vw';
                    emoji.style.top = Math.random() * 100 + 'vh';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 1000);
                }, i * 100);
            }
        }

        function showLuckyMsg(num) {
            const msg = document.createElement('div');
            msg.className = 'lucky-msg';
            msg.textContent = `🎉 ${num} 號 🎉`;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        function spin() {
            if (isSpinning) return;

            const min = parseInt(document.getElementById('minNum').value) || 1;
            const max = parseInt(document.getElementById('maxNum').value) || 40;

            if (min > max) {
                document.getElementById('message').textContent = '😅 最小值不能大於最大值啦！';
                return;
            }

            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            const display = document.getElementById('numberDisplay');
            const messageEl = document.getElementById('message');

            btn.disabled = true;
            btn.textContent = '🎰 轉動中...';
            display.classList.add('spinning');
            messageEl.textContent = '命運的齒輪正在轉動...';

            let count = 0;
            const totalSpins = 20 + Math.floor(Math.random() * 10);
            const spinInterval = setInterval(() => {
                display.textContent = Math.floor(Math.random() * (max - min + 1)) + min;
                count++;

                if (count >= totalSpins) {
                    clearInterval(spinInterval);

                    // 最終結果
                    const finalNum = Math.floor(Math.random() * (max - min + 1)) + min;
                    display.textContent = finalNum;
                    display.classList.remove('spinning');

                    // 特效
                    createEmojiBurst();
                    showLuckyMsg(finalNum);

                    // 訊息
                    messageEl.textContent = getRandomMessage(finalNum);

                    // 記錄歷史
                    if (!history.includes(finalNum)) {
                        history.push(finalNum);
                        updateHistory();
                    }

                    // 重置按鈕
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = '🎲 再抽一次！';
                        isSpinning = false;
                    }, 500);
                }
            }, 80);
        }

        function updateHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (history.length > 0) {
                section.style.display = 'block';
                list.innerHTML = history
                    .sort((a, b) => a - b)
                    .map(n => `<span class="history-item">${n} 號</span>`)
                    .join('');
            }
        }

        // 按空格鍵也可以抽籤
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isSpinning) {
                e.preventDefault();
                spin();
            }
        });
    </script>
</body>
</html>
