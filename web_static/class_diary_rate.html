<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課堂評級</title>
    <link rel="stylesheet" href="/static/css/class_diary_rate.css">
</head>
<body>

<!-- 未登入 → 跳轉登入頁（帶回跳）；有 refresh_token 的話由 JS 自動續期 -->
<script>
    if (!localStorage.getItem('auth_token') && !localStorage.getItem('token') && !localStorage.getItem('refresh_token')) {
        window.location.replace('/login?redirect=' + encodeURIComponent(window.location.pathname));
    }
</script>

<!-- 無權限遮罩（學生角色） -->
<div class="no-permission" id="noPermission" style="display:none;">
    <div>
        <div class="block-icon">🔒</div>
        <h2>僅限教師使用</h2>
        <p>課堂評級表單僅供教師及管理員填寫。<br>如有疑問，請聯繫管理員。</p>
    </div>
</div>

<!-- Page Header -->
<div class="page-header">
    <h1>📝 課堂評級</h1>
    <div class="subtitle" id="headerInfo">載入中...</div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent">

    <!-- Period & Subject Card -->
    <div class="card">
        <div class="card-title"><span class="icon">🕐</span> 課堂信息</div>

        <div class="form-group">
            <label class="form-label">班級 <span class="required">*</span></label>
            <select class="form-select" id="classSelect">
                <option value="">選擇班級</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">節數類型</label>
            <div class="period-toggle">
                <button class="period-btn active" data-count="1" onclick="setPeriodCount(1)">一節課</button>
                <button class="period-btn" data-count="2" onclick="setPeriodCount(2)">兩節課</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">節數 <span class="required">*</span></label>
            <div class="period-selects">
                <select class="form-select" id="periodStart">
                    <option value="">選擇節數</option>
                    <option value="0">早會</option>
                    <option value="1">第一節</option>
                    <option value="2">第二節</option>
                    <option value="3">第三節</option>
                    <option value="4">第四節</option>
                    <option value="5">第五節</option>
                    <option value="6">第六節</option>
                    <option value="7">第七節</option>
                    <option value="8">第八節</option>
                    <option value="9">第九節</option>
                </select>
                <span class="separator" id="periodSeparator" style="display:none;">→</span>
                <select class="form-select" id="periodEnd" style="display:none;">
                    <option value="">結束節數</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">科目 <span class="required">*</span></label>
            <select class="form-select" id="subject">
                <option value="">請選擇科目</option>
                <option value="中文">中文</option>
                <option value="英文">英文</option>
                <option value="數學">數學</option>
                <option value="公民與社會發展">公民與社會發展</option>
                <option value="歷史">歷史</option>
                <option value="中史">中史</option>
                <option value="地理">地理</option>
                <option value="經濟">經濟</option>
                <option value="物理">物理</option>
                <option value="化學">化學</option>
                <option value="生物">生物</option>
                <option value="ICT">ICT</option>
                <option value="B1">B1</option>
                <option value="B2">B2</option>
            </select>
        </div>
    </div>

    <!-- Rating Card -->
    <div class="card">
        <div class="card-title"><span class="icon">⭐</span> 課堂評級</div>

        <div class="star-rating-group">
            <div class="star-rating">
                <div class="rating-label">紀律 <span class="required">*</span></div>
                <div class="stars" id="disciplineStars" data-field="discipline">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div class="star-value" id="disciplineValue">未評分</div>
            </div>

            <div class="star-rating">
                <div class="rating-label">整潔 <span class="required">*</span></div>
                <div class="stars" id="cleanlinessStars" data-field="cleanliness">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div class="star-value" id="cleanlinessValue">未評分</div>
            </div>
        </div>
    </div>

    <!-- Attendance Card (collapsible) -->
    <div class="card">
        <div class="card-title" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleCardSection('attendanceBody')">
            <span><span class="icon">📋</span> 考勤記錄</span>
            <span class="card-toggle-arrow" id="attendanceArrow" style="font-size:0.9rem; transition:transform 0.2s;">▶</span>
        </div>
        <div id="attendanceBody" style="display:none;">

        <div class="form-group">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                <label class="form-label" style="margin-bottom:0;">缺席學生</label>
                <select class="form-select" id="absentClassSelect" style="width:auto; min-width:80px; padding:4px 8px; font-size:0.85rem;">
                    <option value="">本班</option>
                </select>
            </div>
            <div class="picker-wrap" id="wrap-absentStudents">
                <button type="button" class="picker-toggle" onclick="togglePicker('absentStudents')">
                    <span class="picker-toggle-text">點擊選擇學生</span>
                    <span class="picker-toggle-arrow">▾</span>
                </button>
                <div class="student-picker collapsed" id="picker-absentStudents"></div>
            </div>
            <textarea class="form-textarea" id="absentStudents" placeholder="已選學生會顯示在此，也可手動輸入" rows="2"></textarea>
        </div>

        <div class="form-group">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                <label class="form-label" style="margin-bottom:0;">遲到學生</label>
                <select class="form-select" id="lateClassSelect" style="width:auto; min-width:80px; padding:4px 8px; font-size:0.85rem;">
                    <option value="">本班</option>
                </select>
            </div>
            <div class="picker-wrap" id="wrap-lateStudents">
                <button type="button" class="picker-toggle" onclick="togglePicker('lateStudents')">
                    <span class="picker-toggle-text">點擊選擇學生</span>
                    <span class="picker-toggle-arrow">▾</span>
                </button>
                <div class="student-picker collapsed" id="picker-lateStudents"></div>
            </div>
            <textarea class="form-textarea" id="lateStudents" placeholder="已選學生會顯示在此，也可手動輸入" rows="2"></textarea>
        </div>
        </div><!-- /attendanceBody -->
    </div>

    <!-- Commendation & Violations Card (collapsible) — Reason-First Flow -->
    <div class="card">
        <div class="card-title" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleCardSection('commendBody')">
            <span><span class="icon">📝</span> 嘉許與違規</span>
            <span class="card-toggle-arrow" id="commendArrow" style="font-size:0.9rem; transition:transform 0.2s;">▶</span>
        </div>
        <div id="commendBody" style="display:none;">

        <!-- Tab Bar -->
        <div class="behavior-tabs">
            <button type="button" class="behavior-tab active" data-category="praise" onclick="switchBehaviorTab('praise')">
                表揚 <span class="tab-badge" id="badge-praise" style="display:none;">0</span>
            </button>
            <button type="button" class="behavior-tab" data-category="classroom" onclick="switchBehaviorTab('classroom')">
                課堂違規 <span class="tab-badge" id="badge-classroom" style="display:none;">0</span>
            </button>
            <button type="button" class="behavior-tab" data-category="appearance" onclick="switchBehaviorTab('appearance')">
                儀表 <span class="tab-badge" id="badge-appearance" style="display:none;">0</span>
            </button>
            <button type="button" class="behavior-tab" data-category="medical" onclick="switchBehaviorTab('medical')">
                醫務室 <span class="tab-badge" id="badge-medical" style="display:none;">0</span>
            </button>
        </div>

        <!-- Hint Banner -->
        <div class="behavior-hint" id="behaviorHint">
            <span class="hint-icon">👆</span>
            <span class="hint-text">請先選擇原因，再點選學生姓名</span>
        </div>

        <!-- Reason Chips -->
        <div class="reason-chips" id="reasonChips"></div>

        <!-- Student Picker (hidden until reason selected) -->
        <div class="behavior-student-section collapsed" id="behaviorStudentSection">
            <div class="selected-reason-bar" id="selectedReasonBar">
                <span>已選原因：<strong id="selectedReasonText"></strong></span>
                <button type="button" class="btn-cancel-reason" onclick="cancelReasonSelection()">取消</button>
            </div>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
                <label class="form-label" style="margin-bottom:0;">選擇學生</label>
                <select class="form-select" id="behaviorClassSelect" style="width:auto; min-width:80px; padding:4px 8px; font-size:0.85rem;">
                    <option value="">本班</option>
                </select>
            </div>
            <div class="student-picker" id="behaviorStudentPicker"></div>
        </div>

        <!-- Summary -->
        <div class="behavior-summary" id="behaviorSummary" style="display:none;"></div>

        <!-- Hidden textareas for form submission -->
        <textarea id="commendedStudents" style="display:none;"></textarea>
        <textarea id="appearanceIssues" style="display:none;"></textarea>
        <textarea id="ruleViolations" style="display:none;"></textarea>
        <textarea id="medicalRoomStudents" style="display:none;"></textarea>

        </div><!-- /commendBody -->
    </div>

    <!-- Signature Card -->
    <div class="card">
        <div class="card-title"><span class="icon">✍️</span> 教師簽名 <span class="required">*</span></div>
        <div class="signature-area">
            <div class="signature-canvas-wrap" id="signatureWrap">
                <canvas id="signatureCanvas"></canvas>
                <div class="signature-placeholder" id="sigPlaceholder">請在此處手寫簽名</div>
            </div>
            <div class="signature-actions">
                <button class="btn-clear-sig" onclick="clearSignature()">清除簽名</button>
            </div>
        </div>
    </div>

    <!-- Existing Records -->
    <div class="existing-records" id="existingRecords" style="display:none;">
        <div class="section-title">📄 今日已提交記錄</div>
        <div id="recordsList"></div>
    </div>

</div>

<!-- Submit Button (Fixed at bottom) -->
<div class="submit-section">
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">提交評級</button>
</div>

<!-- Success Toast -->
<div class="toast" id="successToast">
    <div class="toast-icon">✅</div>
    <div class="toast-msg">提交成功！</div>
    <div class="toast-sub">評級記錄已保存</div>
    <div class="toast-actions">
        <button class="btn-toast primary" onclick="continueRating()">繼續填寫下一節</button>
        <button class="btn-toast secondary" onclick="closeToast()">完成</button>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/class_diary_rate.js"></script>
</body>
</html>
