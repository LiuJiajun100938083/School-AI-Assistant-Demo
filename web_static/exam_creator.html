<!DOCTYPE html>
<html lang="zh-TW" style="color-scheme: light only;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 考卷出題</title>
    <link rel="stylesheet" href="/static/css/exam_creator.css">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- Markdown + Sanitizer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <!-- JSXGraph（圓類幾何渲染） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.9.2/distrib/jsxgraphcore.js"></script>
    <script src="/static/js/shared/jsxgraph_renderer.js"></script>
</head>
<body>

<div class="app-shell">
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="/" class="topbar-back" title="返回首頁">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="topbar-divider"></div>
            <h1 class="topbar-title">AI 考卷出題</h1>
        </div>
        <div class="topbar-actions">
            <span class="user-badge" id="userBadge"></span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="app-body">
        <!-- Left: Config Panel -->
        <aside class="config-panel" id="configPanel">
            <!-- Mode Toggle -->
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-btn active" data-mode="generate" onclick="ExamCreator.switchMode('generate')">AI 出題</button>
                <button class="mode-btn" data-mode="similar" onclick="ExamCreator.switchMode('similar')">相似題生成</button>
            </div>

            <!-- ========== Generate Mode Config ========== -->
            <div id="generateConfig">
            <h2 class="panel-title">出題設定</h2>

            <!-- Subject -->
            <div class="form-group">
                <label>科目</label>
                <select id="subjectSelect">
                    <option value="math">數學</option>
                </select>
            </div>

            <!-- Knowledge Points -->
            <div class="form-group">
                <label>知識點 <small class="text-muted" id="pointsCount">(載入中...)</small></label>
                <div class="points-list" id="pointsList">
                    <div class="loading-text">載入知識點...</div>
                </div>
            </div>

            <!-- Question Count -->
            <div class="form-group">
                <label>題目數量</label>
                <div class="range-group">
                    <input type="range" id="questionCount" min="1" max="5" value="5">
                    <span class="range-value" id="questionCountVal">5</span>
                </div>
            </div>

            <!-- Difficulty -->
            <div class="form-group">
                <label>難度</label>
                <div class="difficulty-selector">
                    <button class="diff-btn" data-diff="1">1</button>
                    <button class="diff-btn" data-diff="2">2</button>
                    <button class="diff-btn active" data-diff="3">3</button>
                    <button class="diff-btn" data-diff="4">4</button>
                    <button class="diff-btn" data-diff="5">5</button>
                </div>
            </div>

            <!-- Question Types -->
            <div class="form-group">
                <label>題型</label>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" value="multiple_choice"> 選擇題</label>
                    <label class="checkbox-label"><input type="checkbox" value="short_answer" checked> 簡答題</label>
                    <label class="checkbox-label"><input type="checkbox" value="long_answer"> 解答題</label>
                    <label class="checkbox-label"><input type="checkbox" value="fill_blank"> 填空題</label>
                </div>
            </div>

            <!-- Total Marks -->
            <div class="form-group">
                <label>總分 <small class="text-muted">(選填)</small></label>
                <input type="number" id="totalMarks" placeholder="自動分配" min="1" max="500">
            </div>

            <!-- Exam Context -->
            <div class="form-group">
                <label>考試場景 <small class="text-muted">(選填)</small></label>
                <input type="text" id="examContext" placeholder="如：期中考試、單元測驗" maxlength="200">
            </div>

            <!-- Geometry Description (Math only) -->
            <div class="form-group" id="mathGeometryGroup" style="display:none;">
                <label>幾何圖形描述 <small class="text-muted">(選填，數學專用)</small></label>
                <textarea id="geometryDesc" rows="3" placeholder="輸入題目或幾何描述，如：圓O半徑5，弦AB長8，求弦心距" maxlength="500"></textarea>
                <button class="btn-generate-geo" id="generateGeoBtn" onclick="ExamCreator.generateGeometry()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    預覽幾何圖形
                </button>
                <div id="geoPreview" style="display:none;">
                    <div id="geoPreviewBoard" style="width:280px;height:240px;margin:8px auto;"></div>
                </div>
            </div>

            <!-- Generate Button -->
            <button class="btn-generate" id="generateBtn" onclick="ExamCreator.generate()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                AI 生成試卷
            </button>

            <!-- History Button -->
            <button class="btn-history" id="historyBtn" onclick="ExamCreator.showHistory()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
                出題歷史
            </button>
            </div><!-- /generateConfig -->

            <!-- ========== Similar Mode Config (hidden by default) ========== -->
            <div id="similarConfig" style="display:none;">
                <h2 class="panel-title">相似題生成</h2>

                <!-- Subject -->
                <div class="form-group">
                    <label>科目</label>
                    <select id="similarSubject">
                        <option value="math">數學</option>
                        <option value="physics">物理</option>
                    </select>
                </div>

                <!-- Input Method Toggle -->
                <div class="form-group">
                    <label>輸入方式</label>
                    <div class="input-method-toggle">
                        <button class="method-btn active" data-method="text" onclick="ExamCreator.switchInputMethod('text')">文字輸入</button>
                        <button class="method-btn" data-method="image" onclick="ExamCreator.switchInputMethod('image')">圖片上傳</button>
                    </div>
                </div>

                <!-- Text Input -->
                <div class="form-group" id="similarTextInput">
                    <label>原題內容 <small class="text-muted">(支援 LaTeX)</small></label>
                    <textarea id="similarQuestionText" rows="6" placeholder="輸入或貼上原始題目文字...&#10;數學公式用 $...$ 或 $$...$$ 包裹"></textarea>
                </div>

                <!-- Image Upload -->
                <div class="form-group" id="similarImageInput" style="display:none;">
                    <label>上傳題目圖片</label>
                    <div class="upload-zone" id="uploadZone">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>拖曳圖片至此處或 <span class="upload-link">點擊上傳</span></p>
                        <small class="text-muted">支援 JPG, PNG, HEIC（最大 10MB）</small>
                        <input type="file" id="similarImageFile" accept="image/*,.heic,.heif" style="display:none;">
                    </div>
                    <div class="upload-preview" id="uploadPreview" style="display:none;">
                        <img id="previewImg" alt="preview">
                        <button class="btn-remove-preview" onclick="ExamCreator.removeUploadedImage()">✕ 移除</button>
                    </div>
                    <button class="btn-ocr" id="ocrBtn" style="display:none;" onclick="ExamCreator.ocrImage()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        識別題目文字
                    </button>
                    <div class="ocr-loading" id="ocrLoading" style="display:none;">
                        <div class="spinner-small"></div>
                        <span>正在識別...</span>
                    </div>
                </div>

                <!-- Count -->
                <div class="form-group">
                    <label>生成數量</label>
                    <div class="range-group">
                        <input type="range" id="similarCount" min="1" max="5" value="3">
                        <span class="range-value" id="similarCountVal">3</span>
                    </div>
                </div>

                <!-- Generate Button -->
                <button class="btn-generate" id="similarGenerateBtn" onclick="ExamCreator.generateSimilar()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    生成相似題
                </button>

                <!-- History Button -->
                <button class="btn-history" onclick="ExamCreator.showHistory()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
                    出題歷史
                </button>
            </div><!-- /similarConfig -->
        </aside>

        <!-- Right: Results Area -->
        <main class="results-area" id="resultsArea">
            <!-- Empty State (default) -->
            <div class="empty-state" id="emptyState">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                </svg>
                <h3>選擇知識點開始出題</h3>
                <p>在左側配置出題參數，AI 將自動生成符合 DSE 風格的試卷</p>
            </div>

            <!-- Generating State (kept for direct polling fallback) -->
            <div class="generating-state" id="generatingState" style="display:none;">
                <div class="spinner"></div>
                <h3>AI 正在逐題出題...</h3>
                <p>正在生成 <span id="genCount"></span> 道題目，每題獨立生成以確保品質</p>
                <div class="progress-container" style="margin:16px auto;max-width:320px;">
                    <div style="background:#e2e8f0;border-radius:8px;height:8px;overflow:hidden;">
                        <div id="progressBarFill" style="background:#3b82f6;height:100%;width:0%;transition:width 0.5s ease;border-radius:8px;"></div>
                    </div>
                    <p id="progressText" style="margin-top:8px;font-size:15px;font-weight:500;color:#475569;">
                        準備中...
                    </p>
                </div>
                <p class="text-muted">每題約 10-20 秒</p>
            </div>

            <!-- Error State -->
            <div class="error-state" id="errorState" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <h3>生成失敗</h3>
                <p id="errorMessage"></p>
                <button class="btn-retry" onclick="ExamCreator.retry()">重新嘗試</button>
            </div>

            <!-- Questions List (kept for legacy/direct view) -->
            <div class="questions-container" id="questionsContainer" style="display:none;">
                <div class="questions-header">
                    <h2>生成結果</h2>
                    <div class="questions-actions">
                        <span class="total-marks-badge" id="totalMarksBadge"></span>
                        <button class="btn-print" onclick="ExamCreator.printExam()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            打印試卷
                        </button>
                    </div>
                </div>
                <div class="questions-list" id="questionsList"></div>
            </div>

            <!-- History View -->
            <div id="historyView" style="display:none;">
                <div class="history-header">
                    <h2>出題歷史</h2>
                </div>
                <div id="historyList"></div>
                <div id="historyEmpty" class="empty-state" style="display:none;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                        <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/>
                    </svg>
                    <h3>還沒有出過題目</h3>
                    <p>點擊左側「AI 生成試卷」開始第一份試卷</p>
                </div>
            </div>

            <!-- Detail View -->
            <div id="detailView" style="display:none;">
                <div class="detail-header">
                    <button class="btn-back" onclick="ExamCreator.showHistory()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        返回歷史
                    </button>
                    <div class="questions-actions">
                        <span class="total-marks-badge" id="detailMarksBadge"></span>
                        <button class="btn-print" onclick="ExamCreator.printExam()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            打印試卷
                        </button>
                    </div>
                </div>
                <div class="questions-list" id="detailQuestionsList"></div>
            </div>
        </main>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>編輯題目</h3>
            <button class="modal-close" onclick="ExamCreator.closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>題目</label>
                <textarea id="editQuestion" rows="5"></textarea>
            </div>
            <div class="form-group">
                <label>答案</label>
                <textarea id="editAnswer" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>評分準則</label>
                <textarea id="editMarking" rows="3"></textarea>
            </div>
            <div class="form-group inline-group">
                <div>
                    <label>配分</label>
                    <input type="number" id="editPoints" min="1" max="100">
                </div>
                <div>
                    <label>題型</label>
                    <select id="editType">
                        <option value="short_answer">簡答題</option>
                        <option value="multiple_choice">選擇題</option>
                        <option value="long_answer">解答題</option>
                        <option value="fill_blank">填空題</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="ExamCreator.closeEditModal()">取消</button>
            <button class="btn-primary" onclick="ExamCreator.saveEdit()">保存</button>
        </div>
    </div>
</div>

<!-- Print Template (hidden, shown only in @media print) -->
<div class="print-template" id="printTemplate"></div>

<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/exam_creator.js"></script>
</body>
</html>
