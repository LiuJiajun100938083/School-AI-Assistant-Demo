<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — 培僑中學 學習夥伴</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <link rel="stylesheet" href="/static/css/spinner.css">
    <!-- GSAP 動畫引擎（僅登入頁需要） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<!-- 已登入用戶直接跳轉主頁（最早執行，零閃爍） -->
<script>
    if (localStorage.getItem('auth_token') || localStorage.getItem('token')) {
        window.location.replace('/');
    }
</script>

<!-- 第一幕：系統喚醒 -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="splash-icon">
            <img src="/static/images/ai_hourse.png" alt="AI 學習夥伴" class="splash-mascot">
        </div>
        <div class="splash-title">AI 學習夥伴</div>
        <div class="splash-subtitle">培僑中學</div>
        <div class="splash-loader">
            <div class="domino-spinner domino-spinner--light"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        </div>
    </div>
</div>

<!-- 過渡遮罩層 -->
<div class="glass-panel" id="glassPanel"></div>

<!-- 登入界面：左右分屏 -->
<div id="loginContainer" class="login-container" style="display: none;">

    <!-- ====== 左側品牌面板 ====== -->
    <div class="login-brand-panel">
        <div class="brand-panel-content">
            <img src="/static/images/ai_hourse.png" alt="AI 學習夥伴" class="brand-mascot">
            <div class="brand-welcome">歡迎回來</div>
            <div class="brand-app-name">AI 學習夥伴</div>
            <div class="brand-school">培僑中學AI學習系統</div>
            <div class="brand-quote" id="quotesContainer">
                <div class="quote-wrapper" id="quoteWrapper"></div>
                <div class="quote-indicators" id="quoteIndicators"></div>
            </div>
        </div>
    </div>

    <!-- ====== 右側登入表單 ====== -->
    <div class="login-form-panel">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <img src="/static/images/pkms_logo.png" alt="培僑中學" style="width: 48px; height: auto;">
                </div>
                <div class="login-title">登入帳戶</div>
                <div class="login-subtitle">請輸入您的用戶名和密碼</div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label class="input-label" for="usernameInput">用戶名</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="usernameInput" class="login-input" placeholder="請輸入用戶名"
                               maxlength="20" required autocomplete="username">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="passwordInput">密碼</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="passwordInput" class="login-input" placeholder="請輸入密碼"
                               required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" id="loginButton" class="login-button">
                    <span class="btn-text">登入</span>
                    <span class="btn-icon">→</span>
                </button>
            </form>

            <div id="loginError" class="login-error"></div>
            <div id="loginLoading" class="login-loading">
                <div class="loading-spinner"><span></span></div>
            </div>
        </div>
    </div>

</div>

<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
