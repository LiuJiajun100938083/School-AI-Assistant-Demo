<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title data-i18n="tools.img.title">圖片格式轉換</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/tools.css">
</head>
<body>
    <header class="tools-header">
        <a href="/" class="tools-header__back">← <span data-i18n="tools.back">返回</span></a>
        <span class="tools-header__title" data-i18n="tools.img.title">圖片格式轉換</span>
    </header>

    <main class="tools-page">
        <h1 class="tools-page__title" data-i18n="tools.img.title">圖片格式轉換</h1>
        <p class="tools-page__subtitle" data-i18n="tools.img.subtitle">在瀏覽器本地轉換,圖片不會上傳到伺服器</p>

        <div class="tools-card" style="margin-bottom:20px">
            <label class="tools-drop" id="dropZone">
                <input type="file" id="fileInput" accept="image/*">
                <div style="font-size:32px">🖼</div>
                <div data-i18n="tools.dropHere">把檔案拖到這裡,或點擊選擇</div>
            </label>
        </div>

        <div class="tools-grid">
            <div class="tools-card">
                <div class="tools-card__title" data-i18n="tools.img.original">原始</div>
                <div class="tools-preview" id="origPreview">
                    <div class="tools-preview__empty" data-i18n="tools.img.noSelection">請先選擇一張圖片</div>
                </div>
                <div class="tools-meta-row" id="origMeta"></div>
            </div>

            <div class="tools-card">
                <div class="tools-card__title" data-i18n="tools.img.converted">轉換後</div>
                <div class="tools-field">
                    <label class="tools-field__label" data-i18n="tools.img.target">目標格式</label>
                    <div class="tools-segmented" id="fmtSel">
                        <button data-fmt="image/png" class="active">PNG</button>
                        <button data-fmt="image/jpeg">JPG</button>
                        <button data-fmt="image/webp">WebP</button>
                    </div>
                </div>
                <div class="tools-field" id="qualityWrap" style="display:none">
                    <label class="tools-field__label" data-i18n="tools.img.quality">品質</label>
                    <input type="range" id="quality" class="tools-range" min="0.3" max="1" step="0.05" value="0.92">
                    <div class="tools-field__hint"><span id="qualityLabel">92</span>%</div>
                </div>
                <div class="tools-preview" id="outPreview">
                    <div class="tools-preview__empty">—</div>
                </div>
                <div class="tools-meta-row" id="outMeta"></div>
                <div style="margin-top:16px;display:flex;justify-content:flex-end">
                    <button id="downloadBtn" class="tools-btn tools-btn--primary" disabled data-i18n="tools.download">下載</button>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/shared/i18n.js"></script>
    <script src="/static/js/shared/i18n/common.js"></script>
    <script src="/static/js/shared/i18n/tools.js"></script>
    <script src="/static/js/tools_common.js"></script>
    <script src="/static/js/tools_image_convert.js"></script>
</body>
</html>
