<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cl.pageTitle">課堂列表</title>
    <link rel="stylesheet" href="/static/css/classroom_list.css?v=20260414">
    <link rel="stylesheet" href="/static/css/spinner.css?v=20260419">
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-title" data-i18n="cl.classroom">課堂</div>
            <div class="splash-subtitle" data-i18n="cl.classroomEn">CLASSROOM</div>
            <div class="splash-loader">
                <div class="domino-spinner domino-spinner--light"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container" id="mainContainer" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <button class="back-button" id="backBtn" title="返回">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="header-title" data-i18n="cl.classroom">課堂</h1>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div>
                    <div class="user-name" id="userName">User</div>
                    <span class="user-role" id="userRole" data-i18n="cl.student">學生</span>
                </div>
            </div>
        </div>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="搜尋課堂..." data-i18n-placeholder="cl.searchPlaceholder">
            </div>
            <button class="resource-lib-btn" id="resourceLibBtn" style="display: none;" onclick="window.location.href='/classroom/resource-library'">
                <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px;vertical-align:-3px;margin-right:4px"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
                <span data-i18n="cl.resourceLib">資源庫</span>
            </button>
            <button class="create-btn" id="createBtn" style="display: none;" data-i18n="cl.createClassroom">+ 創建課堂</button>
        </div>

        <!-- Teacher Rooms Section -->
        <div class="rooms-section" id="teacherSection" style="display: none;">
            <div class="section-title" data-i18n="cl.myClassrooms">我的課堂</div>
            <div class="rooms-grid" id="teacherRooms"></div>
        </div>

        <!-- Student Rooms Section -->
        <div class="rooms-section" id="studentSection" style="display: none;">
            <div class="section-title" data-i18n="cl.availableClassrooms">可用課堂</div>
            <div class="rooms-grid" id="studentRooms"></div>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div class="modal-overlay" id="createRoomModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" data-i18n="cl.createNewClassroom">創建新課堂</h2>
                <button class="modal-close" id="closeCreateModal">&times;</button>
            </div>
            <form id="createRoomForm">
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.classroomNameRequired">課堂名稱 *</label>
                    <input type="text" class="form-input" id="roomTitle" placeholder="輸入課堂名稱" data-i18n-placeholder="cl.enterClassroomName" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.classroomDesc">課堂描述</label>
                    <textarea class="form-textarea" id="roomDescription" placeholder="輸入課堂描述（可選）" data-i18n-placeholder="cl.enterClassroomDesc"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.allowedClasses">允許的班級</label>
                    <div class="class-picker" id="classPicker">
                        <div class="class-picker-loading" data-i18n="cl.loadingClasses">載入班級中...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelCreateBtn" data-i18n="cl.cancel">取消</button>
                    <button type="submit" class="btn-submit" id="submitCreateBtn" data-i18n="cl.create">創建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Room Modal -->
    <div class="modal-overlay" id="editRoomModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" data-i18n="cl.editClassroom">編輯課堂</h2>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <form id="editRoomForm">
                <input type="hidden" id="editRoomId">
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.classroomNameRequired">課堂名稱 *</label>
                    <input type="text" class="form-input" id="editRoomTitle" placeholder="輸入課堂名稱" data-i18n-placeholder="cl.enterClassroomName" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.classroomDesc">課堂描述</label>
                    <textarea class="form-textarea" id="editRoomDescription" placeholder="輸入課堂描述（可選）" data-i18n-placeholder="cl.enterClassroomDesc"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="cl.allowedClasses">允許的班級</label>
                    <div class="class-picker" id="editClassPicker">
                        <div class="class-picker-loading" data-i18n="cl.loadingClasses">載入班級中...</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelEditBtn" data-i18n="cl.cancel">取消</button>
                    <button type="submit" class="btn-submit" id="submitEditBtn" data-i18n="cl.save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/shared/utils.js?v=20260414"></script>
    <script src="/static/js/shared/auth.js?v=20260414"></script>
    <script src="/static/js/shared/ui.js?v=20260414"></script>
    <script src="/static/js/shared/api.js?v=20260414"></script>
    <script src="/static/js/shared/i18n.js?v=20260414"></script>
<script src="/static/js/shared/i18n/common.js?v=20260414"></script>
<script src="/static/js/shared/i18n/classroom.js?v=20260414"></script>
    <script src="/static/js/classroom_list.js?v=20260414"></script>
</body>
</html>
