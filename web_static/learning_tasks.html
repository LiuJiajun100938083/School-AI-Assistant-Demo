<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lt.pageTitle">學習任務</title>
    <link rel="stylesheet" href="/static/css/learning_tasks.css?v=20260414">
</head>
<body>
<!-- 未登入 → 跳登入頁，登入後自動返回本連結 -->
<script>
    (function () {
        var hasAuth = localStorage.getItem('auth_token') || localStorage.getItem('token') || localStorage.getItem('refresh_token');
        if (!hasAuth) {
            var returnTo = window.location.pathname + window.location.search + window.location.hash;
            window.location.replace('/login?redirect=' + encodeURIComponent(returnTo));
        }
    })();
</script>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <button class="back-button" data-i18n="lt.back">← 返回</button>
            <h1 class="header-title" data-i18n="lt.headerTitle">學習任務</h1>
        </div>
        <div class="progress-ring-container">
            <svg class="progress-ring-svg" viewBox="0 0 60 60">
                <circle class="progress-ring-background" cx="30" cy="30" r="24" />
                <circle class="progress-ring-fill" id="progressRing" cx="30" cy="30" r="24" />
            </svg>
            <span class="progress-ring-text" id="progressText">0%</span>
        </div>
    </div>

    <!-- Tab Filter -->
    <div class="tab-filter">
        <button class="tab active" data-status="">
            <span data-i18n="lt.tabAll">全部</span>
            <span class="tab-count" id="count-all">0</span>
        </button>
        <button class="tab" data-status="pending">
            <span data-i18n="lt.tabPending">待完成</span>
            <span class="tab-count" id="count-pending">0</span>
        </button>
        <button class="tab" data-status="completed">
            <span data-i18n="lt.tabCompleted">已完成</span>
            <span class="tab-count" id="count-completed">0</span>
        </button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="task-list" id="taskList">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/shared/utils.js?v=20260414"></script>
    <script src="/static/js/shared/auth.js?v=20260414"></script>
    <script src="/static/js/shared/ui.js?v=20260414"></script>
    <script src="/static/js/shared/api.js?v=20260414"></script>
    <script src="/static/js/shared/i18n.js?v=20260414"></script>
    <script src="/static/js/shared/i18n/learning_tasks.js?v=20260414"></script>
    <script src="/static/js/learning_tasks.js?v=20260414"></script>
</body>
</html>
