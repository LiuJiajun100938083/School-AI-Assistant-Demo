<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學校學習中心 - 培僑中學</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/school_learning_center.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>

<div id="app" class="slc-page">

    <!-- ── Header ── -->
    <header class="slc-header">
        <button class="slc-header__back" onclick="window.location.href='/'">← 返回</button>
        <button class="slc-header__menu-btn" onclick="slc.toggleMobileSidebar()">☰</button>
        <div class="slc-header__title">🏫 學校學習中心</div>
        <div class="slc-header__stats" id="headerStats"></div>
        <button class="slc-header__admin-btn" id="slcAdminToggle" style="display:none;" onclick="slc.toggleAdminPanel()" title="管理面板">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </header>

    <!-- ── Main: 側邊欄 + 內容區 ── -->
    <div class="slc-main">

        <!-- 左側邊欄: 科目列表 -->
        <aside class="slc-sidebar">
            <div class="slc-sidebar__header">📚 學科</div>
            <div class="slc-sidebar__list" id="subjectList">
                <div class="slc-loading">
                    <div class="slc-loading__spinner"></div>
                    <div>加載科目...</div>
                </div>
            </div>
        </aside>

        <!-- 右側內容區 -->
        <div class="slc-content">

            <!-- 年級篩選欄 -->
            <div class="slc-grade-bar" id="gradeBar"></div>

            <!-- Tab 導航 -->
            <nav class="slc-tab-nav">
                <button class="slc-tab-btn --active" data-tab="resources">📄 教學資源</button>
                <button class="slc-tab-btn" data-tab="map">🗺️ 知識圖譜</button>
                <button class="slc-tab-btn" data-tab="paths">🛤️ 學習路徑</button>
            </nav>

            <!-- Tab 內容面板 -->
            <div class="slc-tab-panels">

                <!-- Tab: 教學資源 -->
                <section id="tab-resources" class="slc-tab-panel --active">
                    <div class="slc-search-bar">
                        <input class="slc-search-input" id="searchInput" placeholder="搜索資源..." type="text">
                        <button class="slc-search-btn" onclick="slc.doSearch()">🔍 搜索</button>
                    </div>
                    <div class="slc-type-filters">
                        <button class="slc-type-chip" data-type="document" onclick="slc.filterByType('document')">📄 文檔</button>
                        <button class="slc-type-chip" data-type="video_local" onclick="slc.filterByType('video_local')">🎬 本地視頻</button>
                        <button class="slc-type-chip" data-type="video_external" onclick="slc.filterByType('video_external')">🔗 外部視頻</button>
                        <button class="slc-type-chip" data-type="article" onclick="slc.filterByType('article')">📝 文章</button>
                        <button class="slc-type-chip" data-type="image" onclick="slc.filterByType('image')">🖼️ 圖片</button>
                    </div>
                    <div class="slc-resource-grid" id="resourceGrid">
                        <div class="slc-loading">
                            <div class="slc-loading__spinner"></div>
                            <div>加載資源...</div>
                        </div>
                    </div>
                </section>

                <!-- Tab: 知識圖譜 -->
                <section id="tab-map" class="slc-tab-panel">
                    <div class="slc-map-container" id="knowledgeMapContainer">
                        <div class="slc-loading">
                            <div class="slc-loading__spinner"></div>
                            <div>加載知識圖譜...</div>
                        </div>
                    </div>
                </section>

                <!-- Tab: 學習路徑 -->
                <section id="tab-paths" class="slc-tab-panel">
                    <div class="slc-path-list" id="pathList">
                        <div class="slc-loading">
                            <div class="slc-loading__spinner"></div>
                            <div>加載學習路徑...</div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>
</div>

<!-- ── 管理面板（教師/管理員可見） ── -->
<div class="slc-admin-overlay" id="slcAdminOverlay" onclick="slc.toggleAdminPanel()"></div>
<div class="slc-admin-panel" id="slcAdminPanel">
    <div class="slc-admin-panel__header">
        <span>⚙️ 內容管理</span>
        <span class="slc-admin-panel__subject" id="adminSubjectLabel">— 未選科目 —</span>
        <button class="slc-admin-panel__close" onclick="slc.toggleAdminPanel()">✕</button>
    </div>

    <!-- 管理面板 Tab 導航 -->
    <div class="slc-admin-tabs">
        <button class="slc-admin-tab --active" data-admin-tab="upload" onclick="slc.switchAdminTab('upload')">📤 上傳內容</button>
        <button class="slc-admin-tab" data-admin-tab="contents" onclick="slc.switchAdminTab('contents')">📋 內容管理</button>
        <button class="slc-admin-tab" data-admin-tab="nodes" onclick="slc.switchAdminTab('nodes')">🔗 知識圖譜</button>
        <button class="slc-admin-tab" data-admin-tab="paths" onclick="slc.switchAdminTab('paths')">🛤️ 學習路徑</button>
    </div>

    <div class="slc-admin-body">

        <!-- Tab: 上傳內容 -->
        <div class="slc-admin-tab-panel --active" id="adminTab-upload">
            <div class="slc-admin-form">
                <label>標題 <span style="color:#e74c3c">*</span></label>
                <input type="text" id="slcContentTitle" class="slc-admin-input" placeholder="資源標題">

                <label>描述</label>
                <textarea id="slcContentDesc" class="slc-admin-input" rows="2" placeholder="簡短描述"></textarea>

                <label>內容類型 <span style="color:#e74c3c">*</span></label>
                <select id="slcContentType" class="slc-admin-input" onchange="slc.onContentTypeChange()">
                    <option value="document">📄 文檔 (PDF/Word)</option>
                    <option value="video_local">🎬 本地視頻</option>
                    <option value="video_external">🔗 外部視頻連結</option>
                    <option value="article">📝 文章</option>
                    <option value="image">🖼️ 圖片</option>
                </select>

                <label>年級</label>
                <select id="slcContentGrade" class="slc-admin-input">
                    <option value="">通用（所有年級）</option>
                    <option value="中一">中一</option>
                    <option value="中二">中二</option>
                    <option value="中三">中三</option>
                    <option value="中四">中四</option>
                    <option value="中五">中五</option>
                    <option value="中六">中六</option>
                </select>

                <!-- 文件上傳區 -->
                <div id="slcFileDropZone" class="slc-admin-dropzone">
                    <div>📁 拖放文件到此處 或 <span style="color:var(--slc-primary);cursor:pointer;text-decoration:underline;">點擊選擇</span></div>
                    <div id="slcFileName" style="display:none;margin-top:8px;font-size:12px;color:var(--slc-primary);"></div>
                    <input type="file" id="slcFileInput" style="display:none;">
                </div>

                <!-- 外部視頻連結區（默認隱藏） -->
                <div id="slcExternalVideoSection" style="display:none;">
                    <label>視頻連結 <span style="color:#e74c3c">*</span></label>
                    <input type="text" id="slcExternalUrl" class="slc-admin-input" placeholder="https://www.youtube.com/watch?v=...">
                    <label>視頻平台</label>
                    <select id="slcVideoPlatform" class="slc-admin-input">
                        <option value="">自動識別</option>
                        <option value="youtube">YouTube</option>
                        <option value="bilibili">Bilibili</option>
                        <option value="vimeo">Vimeo</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <!-- 文章內容區（默認隱藏） -->
                <div id="slcArticleSection" style="display:none;">
                    <label>文章內容 (Markdown)</label>
                    <textarea id="slcArticleContent" class="slc-admin-input" rows="8" placeholder="支持 Markdown 語法..."></textarea>
                </div>

                <button class="slc-admin-btn --primary" onclick="slc.submitContent()">📤 上傳</button>
            </div>
        </div>

        <!-- Tab: 內容管理 -->
        <div class="slc-admin-tab-panel" id="adminTab-contents">
            <div id="slcContentsList" class="slc-admin-list">
                <div class="slc-loading"><div class="slc-loading__spinner"></div><div>加載中...</div></div>
            </div>
        </div>

        <!-- Tab: 知識圖譜 -->
        <div class="slc-admin-tab-panel" id="adminTab-nodes">
            <!-- 創建知識節點 -->
            <div class="slc-admin-form" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--slc-border);">
                <h4 style="margin:0 0 12px;">➕ 新增知識節點</h4>
                <label>名稱 <span style="color:#e74c3c">*</span></label>
                <input type="text" id="slcNodeTitle" class="slc-admin-input" placeholder="知識點名稱">
                <label>描述</label>
                <textarea id="slcNodeDesc" class="slc-admin-input" rows="2" placeholder="知識點描述"></textarea>
                <label>年級</label>
                <select id="slcNodeGrade" class="slc-admin-input">
                    <option value="">通用</option>
                    <option value="中一">中一</option>
                    <option value="中二">中二</option>
                    <option value="中三">中三</option>
                    <option value="中四">中四</option>
                    <option value="中五">中五</option>
                    <option value="中六">中六</option>
                </select>
                <button class="slc-admin-btn --primary" onclick="slc.submitNode()">➕ 創建節點</button>
            </div>

            <!-- 創建連接 -->
            <div class="slc-admin-form" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--slc-border);">
                <h4 style="margin:0 0 12px;">🔗 連接知識節點</h4>
                <label>來源節點</label>
                <select id="slcEdgeSource" class="slc-admin-input"><option value="">選擇知識點</option></select>
                <label>目標節點</label>
                <select id="slcEdgeTarget" class="slc-admin-input"><option value="">選擇知識點</option></select>
                <label>關係類型</label>
                <input type="text" id="slcEdgeType" class="slc-admin-input" placeholder="prerequisite / related" value="related">
                <button class="slc-admin-btn --primary" onclick="slc.submitEdge()">🔗 建立連接</button>
            </div>

            <!-- 批量導入 -->
            <div class="slc-admin-form">
                <h4 style="margin:0 0 12px;">📦 批量導入知識圖譜</h4>
                <label>年級</label>
                <select id="slcBatchNodeGrade" class="slc-admin-input">
                    <option value="">通用</option>
                    <option value="中一">中一</option>
                    <option value="中二">中二</option>
                    <option value="中三">中三</option>
                    <option value="中四">中四</option>
                    <option value="中五">中五</option>
                    <option value="中六">中六</option>
                </select>
                <label>JSON 數據</label>
                <textarea id="slcBatchNodeJson" class="slc-admin-input" rows="6" placeholder='{"nodes":[{"title":"...","description":"..."}],"edges":[{"source":"...","target":"..."}]}'></textarea>
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
                    <input type="checkbox" id="slcBatchClear">
                    <label for="slcBatchClear" style="font-size:12px;color:var(--slc-text-secondary);margin:0;">清空該科目現有知識圖譜</label>
                </div>
                <button class="slc-admin-btn --primary" onclick="slc.submitBatchNodes()">📦 批量導入</button>
                <div id="slcBatchNodeResult" style="display:none;margin-top:8px;padding:8px;border-radius:6px;font-size:13px;"></div>
            </div>

            <!-- 現有節點列表 -->
            <h4 style="margin:20px 0 12px;">📌 現有知識節點</h4>
            <div id="slcNodesList" class="slc-admin-list">
                <div style="color:var(--slc-text-secondary);font-size:13px;">切換到此 Tab 時自動加載</div>
            </div>
        </div>

        <!-- Tab: 學習路徑 -->
        <div class="slc-admin-tab-panel" id="adminTab-paths">
            <!-- 創建路徑 -->
            <div class="slc-admin-form" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--slc-border);">
                <h4 style="margin:0 0 12px;">➕ 新增學習路徑</h4>
                <label>路徑標題 <span style="color:#e74c3c">*</span></label>
                <input type="text" id="slcPathTitle" class="slc-admin-input" placeholder="學習路徑標題">
                <label>描述</label>
                <textarea id="slcPathDesc" class="slc-admin-input" rows="2" placeholder="路徑描述"></textarea>
                <label>難度</label>
                <select id="slcPathDifficulty" class="slc-admin-input">
                    <option value="beginner">入門</option>
                    <option value="intermediate">進階</option>
                    <option value="advanced">高級</option>
                </select>
                <label>預計時長（小時）</label>
                <input type="number" id="slcPathHours" class="slc-admin-input" value="1" min="0.5" step="0.5">
                <label>年級</label>
                <select id="slcPathGrade" class="slc-admin-input">
                    <option value="">通用</option>
                    <option value="中一">中一</option>
                    <option value="中二">中二</option>
                    <option value="中三">中三</option>
                    <option value="中四">中四</option>
                    <option value="中五">中五</option>
                    <option value="中六">中六</option>
                </select>
                <button class="slc-admin-btn --primary" onclick="slc.submitPath()">➕ 創建路徑</button>
            </div>

            <!-- 批量導入路徑 -->
            <div class="slc-admin-form" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--slc-border);">
                <h4 style="margin:0 0 12px;">📦 批量導入學習路徑</h4>
                <label>年級</label>
                <select id="slcBatchPathGrade" class="slc-admin-input">
                    <option value="">通用</option>
                    <option value="中一">中一</option>
                    <option value="中二">中二</option>
                    <option value="中三">中三</option>
                    <option value="中四">中四</option>
                    <option value="中五">中五</option>
                    <option value="中六">中六</option>
                </select>
                <label>JSON 數據</label>
                <textarea id="slcBatchPathJson" class="slc-admin-input" rows="6" placeholder='[{"title":"...","difficulty":"beginner","steps":[{"title":"...","description":"..."}]}]'></textarea>
                <button class="slc-admin-btn --primary" onclick="slc.submitBatchPaths()">📦 批量導入路徑</button>
                <div id="slcBatchPathResult" style="display:none;margin-top:8px;padding:8px;border-radius:6px;font-size:13px;"></div>
            </div>

            <!-- 現有路徑列表 -->
            <h4 style="margin:20px 0 12px;">🛤️ 現有學習路徑</h4>
            <div id="slcPathsList" class="slc-admin-list">
                <div style="color:var(--slc-text-secondary);font-size:13px;">切換到此 Tab 時自動加載</div>
            </div>
        </div>

    </div>
</div>

<!-- ── 內容查看模態框 ── -->
<div class="slc-modal-overlay" id="contentModal">
    <div class="slc-modal-content">
        <div class="slc-modal-header">
            <span class="slc-modal-header__title" id="modalTitle">資源查看</span>
            <button class="slc-modal-header__close" onclick="slc.closeModal()">✕</button>
        </div>
        <div class="slc-modal-body" id="modalBody"></div>
    </div>
</div>

<!-- ── AI 助教 FAB ── -->
<button class="slc-ai-fab" id="aiFab" title="AI 助教">🤖</button>

<!-- ── AI 聊天窗 ── -->
<div class="slc-ai-window" id="aiWindow">
    <div class="slc-ai-window__header">
        <span>🤖</span>
        <span>AI 學習助教</span>
        <button class="slc-ai-window__close" onclick="slc.toggleAIWindow()">✕</button>
    </div>
    <div class="slc-ai-window__messages" id="aiMessages"></div>
    <div class="slc-ai-window__input">
        <textarea class="slc-ai-window__textarea" id="aiInput" placeholder="輸入問題..." rows="1"></textarea>
        <button class="slc-ai-window__send" id="aiSendBtn">發送</button>
    </div>
</div>

<!-- ── Scripts ── -->
<script src="/static/js/school_learning_center.js" charset="UTF-8"></script>
<script>
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window.slc._init);
} else {
    window.slc._init();
}
</script>

</body>
</html>
