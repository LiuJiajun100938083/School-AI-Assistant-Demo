<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課室日誌 Review</title>
    <link rel="stylesheet" href="/static/css/class_diary_review.css">
</head>
<body>

<!-- 導航欄 -->
<nav class="navbar">
    <div class="navbar-brand">
        <span>📋</span>
        <span>課室日誌 Review</span>
    </div>
    <div class="navbar-right">
        <span class="user-badge" id="userBadge"></span>
        <a href="/" class="btn-back">🏠 返回主頁</a>
    </div>
</nav>

<!-- 無權訪問 -->
<div class="no-access" id="noAccess" style="display:none;">
    <div class="icon">🔒</div>
    <h2>無權訪問</h2>
    <p>您沒有查看課室日誌的權限，請聯繫管理員。</p>
</div>

<!-- 主容器 -->
<div class="container" id="mainContainer" style="display:none;">

    <!-- 每日 AI 報告區 (僅報告接收人可見) -->
    <div id="dailyReportSection" style="display:none;">
        <div class="daily-report-card">
            <div class="daily-report-header">
                <h3>📊 今日課室日誌報告</h3>
                <span class="report-date" id="reportDate"></span>
            </div>
            <div id="dailyReportStatus"></div>
            <div id="dailyReportContent"></div>
            <div id="dailyAnomalies"></div>
        </div>
    </div>

    <!-- 篩選欄 -->
    <div class="filter-bar">
        <label>📅 日期</label>
        <input type="date" id="filterDate">
        <label>🏫 班級</label>
        <select id="filterClass">
            <option value="">全部班級</option>
        </select>
        <button id="exportBtn" class="btn-export" style="display:none;" onclick="exportCSV()">📥 匯出 CSV</button>
    </div>

    <!-- 班級匯總 -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- 記錄列表 -->
    <div class="entries-section" id="entriesSection" style="display:none;">
        <div class="entries-header">
            <h3 id="entriesTitle">課堂記錄</h3>
            <span class="entries-count" id="entriesCount">0 條</span>
        </div>
        <div style="overflow-x:auto;">
            <table class="entries-table">
                <thead>
                    <tr>
                        <th>節數</th>
                        <th>科目</th>
                        <th>紀律</th>
                        <th>整潔</th>
                        <th>缺席</th>
                        <th>遲到</th>
                        <th>嘉許</th>
                        <th>違規</th>
                        <th>簽名</th>
                    </tr>
                </thead>
                <tbody id="entriesBody"></tbody>
            </table>
        </div>

        <!-- 空狀態 -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">📭</div>
            <p>該日期暫無評級記錄</p>
        </div>
    </div>
</div>

<!-- 簽名模態框 -->
<div class="sig-modal-overlay" id="sigModal">
    <div class="sig-modal">
        <img id="sigModalImg" src="" alt="簽名">
        <br>
        <button onclick="closeSigModal()">關閉</button>
    </div>
</div>

<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/class_diary_review.js"></script>
</body>
</html>
