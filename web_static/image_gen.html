<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="ig.pageTitle">AI 圖片生成 - 培僑中學</title>
    <style>
        :root {
            --brand: #6366F1;
            --brand-light: #EEF2FF;
            --text-primary: #1D1D1F;
            --text-secondary: #6E6E73;
            --bg: #F5F5F7;
            --card-bg: #FFFFFF;
            --border: #E0E0E0;
            --radius: 12px;
            --error: #D32F2F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .ig-header {
            position: sticky; top: 0; z-index: 10;
            display: flex; align-items: center; gap: 12px;
            padding: 16px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .ig-header__back {
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }
        .ig-header__title {
            font-size: 18px;
            font-weight: 700;
        }

        /* Main */
        .ig-main {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* Card */
        .ig-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        /* Label */
        .ig-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* Textarea */
        .ig-textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }
        .ig-textarea:focus {
            outline: none;
            border-color: var(--brand);
        }
        .ig-textarea:disabled {
            background: #F9F9F9;
            color: #999;
        }

        /* Input footer */
        .ig-input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }
        .ig-char-count {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .ig-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Buttons */
        .ig-btn-primary {
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .ig-btn-primary:hover:not(:disabled) { opacity: 0.9; }
        .ig-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .ig-btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ig-btn-secondary:hover { background: var(--bg); }

        /* Status */
        .ig-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .ig-spinner {
            width: 20px; height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: ig-spin 0.8s linear infinite;
        }
        @keyframes ig-spin { to { transform: rotate(360deg); } }
        .ig-status__text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Result */
        .ig-result {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }
        .ig-result__image {
            max-width: 100%;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .ig-result__actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        /* Error */
        .ig-error {
            padding: 12px 16px;
            background: #FFF0F0;
            border: 1px solid #FFCDD2;
            border-radius: 8px;
            color: var(--error);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .ig-main { padding: 16px 12px; }
            .ig-card { padding: 16px; }
            .ig-input-footer { flex-direction: column; gap: 10px; align-items: stretch; }
            .ig-btn-primary { text-align: center; }
        }
    </style>
</head>
<body>
    <header class="ig-header">
        <a href="/" class="ig-header__back" data-i18n="ig.back">&larr; 返回</a>
        <h1 class="ig-header__title" data-i18n="ig.headerTitle">AI 圖片生成</h1>
    </header>

    <main class="ig-main">
        <!-- Input -->
        <div class="ig-card">
            <label class="ig-label" for="promptInput" data-i18n="ig.promptLabel">描述你想生成的圖片</label>
            <textarea id="promptInput" class="ig-textarea"
                placeholder="例如：一隻可愛的柴犬戴著畢業帽..." data-i18n-placeholder="ig.promptPlaceholder"
                maxlength="500" rows="3"></textarea>
            <p class="ig-hint" data-i18n="ig.hintCtrlEnter">按 Ctrl+Enter 快速生成</p>
            <div class="ig-input-footer">
                <span id="charCount" class="ig-char-count">0 / 500</span>
                <button id="generateBtn" class="ig-btn-primary" data-i18n="ig.generateBtn">生成圖片</button>
            </div>
        </div>

        <!-- Status -->
        <div id="statusArea" class="ig-status" style="display:none">
            <div class="ig-spinner"></div>
            <span id="statusText" class="ig-status__text" data-i18n="ig.queuing">排隊中...</span>
        </div>

        <!-- Error -->
        <div id="errorArea" class="ig-error" style="display:none">
            <span id="errorText"></span>
        </div>

        <!-- Result -->
        <div id="resultArea" class="ig-result" style="display:none">
            <img id="resultImage" class="ig-result__image" alt="AI 生成的圖片" data-i18n-title="ig.imageAlt">
            <div class="ig-result__actions">
                <button id="downloadBtn" class="ig-btn-secondary" data-i18n="ig.downloadBtn">&#128190; 下載圖片</button>
                <button id="newGenBtn" class="ig-btn-secondary" data-i18n="ig.regenerateBtn">&#128260; 重新生成</button>
            </div>
        </div>
    </main>

    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/i18n.js"></script>
    <script src="/static/js/shared/i18n/image_gen.js"></script>
    <script src="/static/js/image_gen.js"></script>
</body>
</html>
