<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的遊戲 - AI學習夥伴</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        /* 页面容器 */
        .my-games-page {
            min-height: 100vh;
            background: var(--bg-page);
        }

        /* 顶部导航 */
        .page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: var(--bg-page);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-base) var(--ease-out);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--bg-card);
            border-color: var(--border-strong);
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--brand);
        }

        .header-actions {
            display: flex;
            gap: var(--space-3);
        }

        .btn {
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-base) var(--ease-out);
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
        }

        .btn-primary {
            background: var(--brand);
            color: white;
        }

        .btn-primary:hover {
            background: var(--brand-hover);
        }

        /* 主内容区 */
        .page-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: var(--space-6);
        }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-card);
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--brand);
            margin-bottom: var(--space-1);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-5);
            flex-wrap: wrap;
        }

        .filter-select {
            padding: var(--space-2) var(--space-4);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-full);
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--brand);
        }

        /* 游戏列表 */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .game-item {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: all var(--duration-base) var(--ease-out);
        }

        .game-item:hover {
            box-shadow: var(--shadow-card-hover);
        }

        .game-content {
            display: flex;
            gap: var(--space-4);
            padding: var(--space-5);
        }

        .game-icon {
            font-size: 32px;
            line-height: 1;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            border-radius: var(--radius-md);
            flex-shrink: 0;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
        }

        .game-info {
            flex: 1;
            min-width: 0;
        }

        .game-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
        }

        .game-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .game-badges {
            display: flex;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .badge {
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
        }

        .badge-public {
            background: var(--brand-lighter);
            color: var(--brand);
        }

        .badge-private {
            background: var(--bg-page);
            color: var(--text-secondary);
        }

        .badge-subject {
            background: #E0F2FE;
            color: #0369A1;
        }

        .game-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: var(--space-3);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-meta {
            display: flex;
            gap: var(--space-4);
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .game-actions {
            display: flex;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-5);
            background: var(--bg-page);
            border-top: 1px solid var(--border-light);
        }

        .action-btn {
            padding: var(--space-2) var(--space-3);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--duration-base) var(--ease-out);
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
        }

        .action-btn:hover {
            border-color: var(--border-strong);
            background: var(--bg-card-hover);
        }

        .action-btn.danger {
            color: var(--color-error);
        }

        .action-btn.danger:hover {
            background: #FEE2E2;
            border-color: var(--color-error);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: var(--space-12);
        }

        .empty-icon {
            margin-bottom: var(--space-4);
            opacity: 0.3;
            color: var(--text-secondary);
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: var(--space-5);
        }

        /* 分享弹窗 */
        .share-modal-body {
            text-align: center;
        }

        .share-duration-options {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .duration-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-default);
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .duration-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .duration-btn.active {
            border-color: var(--brand);
            background: var(--brand-light);
            color: var(--brand);
        }

        .share-generate-btn {
            width: 100%;
            padding: 12px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .share-generate-btn:hover {
            background: var(--brand-hover);
        }

        .share-generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .share-result {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .share-result.show {
            display: block;
        }

        .qr-container {
            margin: 16px auto;
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .share-url-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            align-items: stretch;
        }

        .share-url-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-default);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-page);
            min-width: 0;
        }

        .share-url-input:focus {
            outline: none;
            border-color: var(--brand);
        }

        .copy-btn {
            padding: 10px 18px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: var(--brand-hover);
        }

        .share-expires-info {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 确认对话框 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-modal);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: var(--space-3);
        }

        .modal-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: var(--space-5);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
        }

        .modal-btn {
            padding: var(--space-2) var(--space-5);
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }

        .modal-btn-cancel {
            background: var(--bg-page);
            color: var(--text-primary);
        }

        .modal-btn-danger {
            background: var(--color-error);
            color: white;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: var(--space-3);
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .btn-primary {
                flex: 1;
                justify-content: center;
            }

            .game-content {
                flex-direction: column;
            }

            .game-header {
                flex-direction: column;
                gap: var(--space-2);
            }

            .game-badges {
                align-self: flex-start;
            }

            .game-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="my-games-page">
        <!-- 顶部导航 -->
        <header class="page-header">
            <div class="header-left">
                <a href="/games" class="back-btn">
                    <span>←</span>
                    <span>返回</span>
                </a>
                <span class="page-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="6" y2="12.01"/><line x1="10" y1="12" x2="10" y2="12.01"/><line x1="14" y1="12" x2="14" y2="12.01"/><line x1="18" y1="12" x2="18" y2="12.01"/></svg> 我的遊戲</span>
            </div>
            <div class="header-actions">
                <a href="/game_upload" class="btn btn-primary">
                    <span>+</span>
                    <span>上傳新遊戲</span>
                </a>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="page-main">
            <!-- 统计 -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">-</div>
                    <div class="stat-label">總遊戲數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="publicCount">-</div>
                    <div class="stat-label">已公開</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="privateCount">-</div>
                    <div class="stat-label">私有</div>
                </div>
            </div>

            <!-- 筛选 -->
            <div class="filter-bar">
                <select class="filter-select" id="subjectFilter">
                    <option value="all">全部學科</option>
                    <option value="chinese">中文</option>
                    <option value="math">數學</option>
                    <option value="english">英文</option>
                    <option value="history">歷史</option>
                    <option value="ict">ICT</option>
                    <option value="physics">物理</option>
                    <option value="chemistry">化學</option>
                    <option value="biology">生物</option>
                    <option value="ces">公民</option>
                </select>
                <select class="filter-select" id="visibilityFilter">
                    <option value="all">全部狀態</option>
                    <option value="public">已公開</option>
                    <option value="private">私有</option>
                </select>
            </div>

            <!-- 游戏列表 -->
            <div id="gamesList" class="games-list">
                <div class="loading">載入中...</div>
            </div>
        </main>
    </div>

    <!-- 确认删除对话框 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-title">確認刪除</div>
            <div class="modal-message">確定要刪除這個遊戲嗎？此操作無法撤銷。</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="MyGamesPage.closeDeleteModal()">取消</button>
                <button class="modal-btn modal-btn-danger" id="confirmDeleteBtn">刪除</button>
            </div>
        </div>
    </div>

    <!-- 分享二维码弹窗 -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal" style="max-width:420px;">
            <div class="modal-title" id="shareModalTitle">分享遊戲</div>
            <div class="share-modal-body">
                <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;">
                    選擇有效期後生成二維碼，學生掃碼即可直接玩遊戲（無需登入）
                </p>

                <div class="share-duration-options" id="shareDurationOptions">
                    <button class="duration-btn" data-duration="30m">30 分鐘</button>
                    <button class="duration-btn active" data-duration="1h">1 小時</button>
                    <button class="duration-btn" data-duration="1d">1 天</button>
                    <button class="duration-btn" data-duration="1w">1 週</button>
                </div>

                <button class="share-generate-btn" id="shareGenerateBtn" onclick="MyGamesPage.generateShareLink()">
                    生成二維碼
                </button>

                <div class="share-result" id="shareResult">
                    <div class="qr-container" id="shareQrCode"></div>
                    <div class="share-url-row">
                        <input type="text" class="share-url-input" id="shareUrlInput" readonly>
                        <button class="copy-btn" onclick="MyGamesPage.copyShareUrl()">複製</button>
                    </div>
                    <div class="share-expires-info" id="shareExpiresInfo"></div>
                </div>
            </div>
            <div class="modal-actions" style="margin-top:20px;">
                <button class="modal-btn modal-btn-cancel" onclick="MyGamesPage.closeShareModal()">關閉</button>
            </div>
        </div>
    </div>

    <!-- QR Code 库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
/**
 * 我的游戏页面
 */
const MyGamesPage = {
    games: [],
    filteredGames: [],
    userId: null,
    userRole: null,
    deleteTarget: null,

    subjectNames: {
        chinese: '中文',
        math: '數學',
        english: '英文',
        history: '歷史',
        ict: 'ICT',
        physics: '物理',
        chemistry: '化學',
        biology: '生物',
        ces: '公民'
    },

    async init() {
        await this.checkAuth();
        await this.loadGames();
        this.bindEvents();
    },

    async checkAuth() {
        const token = localStorage.getItem('auth_token');
        const role = localStorage.getItem('user_role');

        if (!token || !['teacher', 'admin'].includes(role)) {
            alert('只有教師和管理員可以訪問此頁面');
            window.location.href = '/';
            return;
        }

        // 获取用户信息
        try {
            const response = await fetch('/api/user/info', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            if (data.success && data.data) {
                this.userId = data.data.id;
                this.userRole = data.data.role;
            }
        } catch (error) {
            console.error('获取用户信息失败', error);
        }
    },

    async loadGames() {
        try {
            const token = localStorage.getItem('auth_token');
            const response = await fetch(
                `/api/games/list?only_mine=true`,
                { headers: { 'Authorization': `Bearer ${token}` } }
            );
            const result = await response.json();

            if (result.success) {
                this.games = result.data;
                this.applyFilters();
                this.updateStats();
            }
        } catch (error) {
            console.error('加载游戏失败', error);
            this.renderError();
        }
    },

    bindEvents() {
        document.getElementById('subjectFilter').addEventListener('change', () => this.applyFilters());
        document.getElementById('visibilityFilter').addEventListener('change', () => this.applyFilters());
    },

    applyFilters() {
        const subject = document.getElementById('subjectFilter').value;
        const visibility = document.getElementById('visibilityFilter').value;

        this.filteredGames = this.games.filter(game => {
            if (subject !== 'all' && game.subject !== subject) return false;
            if (visibility === 'public' && !game.is_public) return false;
            if (visibility === 'private' && game.is_public) return false;
            return true;
        });

        this.renderGames();
    },

    updateStats() {
        const total = this.games.length;
        const publicCount = this.games.filter(g => g.is_public).length;
        const privateCount = total - publicCount;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('publicCount').textContent = publicCount;
        document.getElementById('privateCount').textContent = privateCount;
    },

    renderGames() {
        const container = document.getElementById('gamesList');

        if (this.filteredGames.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg></div>
                    <div class="empty-title">還沒有遊戲</div>
                    <div class="empty-desc">點擊上方「上傳新遊戲」按鈕開始創建</div>
                    <a href="/game_upload" class="btn btn-primary">+ 上傳新遊戲</a>
                </div>
            `;
            return;
        }

        container.innerHTML = this.filteredGames.map(game => this.renderGameItem(game)).join('');
    },

    renderGameItem(game) {
        const subjectName = this.subjectNames[game.subject] || game.subject;
        const createdDate = new Date(game.created_at).toLocaleDateString('zh-TW');
        const fileSize = this.formatFileSize(game.file_size);

        return `
            <div class="game-item" data-uuid="${game.uuid}">
                <div class="game-content">
                    <div class="game-icon">${game.icon}</div>
                    <div class="game-info">
                        <div class="game-header">
                            <span class="game-name">${game.name}</span>
                            <div class="game-badges">
                                <span class="badge badge-subject">${subjectName}</span>
                                ${game.teacher_only ? '<span class="badge" style="background:#FEF3C7;color:#D97706;">僅教師</span>' : `<span class="badge ${game.is_public ? 'badge-public' : 'badge-private'}">${game.is_public ? '公開' : '私有'}</span>`}
                                ${(game.visible_to && game.visible_to.length > 0) ? `<span class="badge" style="background:#E0E7FF;color:#4338CA;">限 ${game.visible_to.join(', ')}</span>` : ''}
                            </div>
                        </div>
                        <div class="game-desc">${game.description}</div>
                        <div class="game-meta">
                            <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${createdDate}</span>
                            <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${fileSize}</span>
                            ${game.difficulty ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${game.difficulty.join(', ')}</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="game-actions">
                    <button class="action-btn" onclick="MyGamesPage.previewGame('${game.uuid}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 預覽
                    </button>
                    <button class="action-btn" onclick="MyGamesPage.editGame('${game.uuid}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 編輯
                    </button>
                    <button class="action-btn" onclick="MyGamesPage.showShareModal('${game.uuid}', '${game.name.replace(/'/g, "\\'")}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> 分享
                    </button>
                    <button class="action-btn" onclick="MyGamesPage.toggleVisibility('${game.uuid}')">
                        ${game.is_public
                            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 設為私有'
                            : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> 設為公開'}
                    </button>
                    <button class="action-btn danger" onclick="MyGamesPage.showDeleteModal('${game.uuid}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 刪除
                    </button>
                </div>
            </div>
        `;
    },

    formatFileSize(bytes) {
        if (!bytes) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    },

    previewGame(uuid) {
        window.open(`/uploaded_games/${uuid}`, '_blank');
    },

    editGame(uuid) {
        // 跳转到上传页面，带上编辑参数
        window.location.href = `/game_upload?edit=${uuid}`;
    },

    async toggleVisibility(uuid) {
        try {
            const token = localStorage.getItem('auth_token');
            const response = await fetch(
                `/api/games/${uuid}/visibility`,
                {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                }
            );
            const result = await response.json();

            if (result.success) {
                // 更新本地数据
                const game = this.games.find(g => g.uuid === uuid);
                if (game) {
                    game.is_public = result.data.is_public;
                }
                this.applyFilters();
                this.updateStats();
            } else {
                alert(result.message || '操作失敗');
            }
        } catch (error) {
            console.error('切换可见性失败', error);
            alert('操作失敗，請重試');
        }
    },

    showDeleteModal(uuid) {
        this.deleteTarget = uuid;
        document.getElementById('deleteModal').classList.add('active');
        document.getElementById('confirmDeleteBtn').onclick = () => this.deleteGame();
    },

    closeDeleteModal() {
        this.deleteTarget = null;
        document.getElementById('deleteModal').classList.remove('active');
    },

    async deleteGame() {
        if (!this.deleteTarget) return;

        try {
            const token = localStorage.getItem('auth_token');
            const response = await fetch(
                `/api/games/${this.deleteTarget}`,
                {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                }
            );
            const result = await response.json();

            if (result.success) {
                // 从列表中移除
                this.games = this.games.filter(g => g.uuid !== this.deleteTarget);
                this.applyFilters();
                this.updateStats();
                this.closeDeleteModal();
            } else {
                alert(result.message || '刪除失敗');
            }
        } catch (error) {
            console.error('删除游戏失败', error);
            alert('刪除失敗，請重試');
        }
    },

    renderError() {
        document.getElementById('gamesList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
                <div class="empty-title">載入失敗</div>
                <div class="empty-desc">請檢查網絡連接後重試</div>
                <button class="btn btn-primary" onclick="location.reload()">重新載入</button>
            </div>
        `;
    },

    // ==================== 分享功能 ====================

    shareTarget: null,
    selectedDuration: '1h',
    shareQrInstance: null,

    showShareModal(uuid, gameName) {
        this.shareTarget = uuid;
        this.selectedDuration = '1h';

        // 设置标题
        document.getElementById('shareModalTitle').textContent = `分享：${gameName}`;

        // 重置 duration 按钮状态
        document.querySelectorAll('#shareDurationOptions .duration-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.duration === '1h');
        });

        // 隐藏之前的结果
        document.getElementById('shareResult').classList.remove('show');
        document.getElementById('shareGenerateBtn').disabled = false;
        document.getElementById('shareGenerateBtn').textContent = '生成二維碼';

        // 清除旧二维码
        const qrContainer = document.getElementById('shareQrCode');
        qrContainer.innerHTML = '';
        this.shareQrInstance = null;

        // 绑定 duration 按钮点击
        document.querySelectorAll('#shareDurationOptions .duration-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#shareDurationOptions .duration-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.selectedDuration = btn.dataset.duration;
            };
        });

        document.getElementById('shareModal').classList.add('active');
    },

    closeShareModal() {
        this.shareTarget = null;
        document.getElementById('shareModal').classList.remove('active');
    },

    async generateShareLink() {
        if (!this.shareTarget) return;

        const btn = document.getElementById('shareGenerateBtn');
        btn.disabled = true;
        btn.textContent = '生成中...';

        try {
            const authToken = localStorage.getItem('auth_token');
            const response = await fetch(`/api/games/${this.shareTarget}/share`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ duration: this.selectedDuration })
            });

            const result = await response.json();

            if (result.success) {
                const data = result.data;
                const shareUrl = data.share_url;

                // 显示结果区域
                document.getElementById('shareResult').classList.add('show');

                // 设置链接
                document.getElementById('shareUrlInput').value = shareUrl;

                // 生成二维码
                const qrContainer = document.getElementById('shareQrCode');
                qrContainer.innerHTML = '';
                this.shareQrInstance = new QRCode(qrContainer, {
                    text: shareUrl,
                    width: 180,
                    height: 180,
                    colorDark: '#1D1D1F',
                    colorLight: '#FFFFFF',
                    correctLevel: QRCode.CorrectLevel.M
                });

                // 显示过期时间
                const expiresAt = new Date(data.expires_at);
                const durationLabels = { '30m': '30 分鐘', '1h': '1 小時', '1d': '1 天', '1w': '1 週' };
                document.getElementById('shareExpiresInfo').textContent =
                    `有效期：${durationLabels[this.selectedDuration]} | 過期時間：${expiresAt.toLocaleString('zh-TW')}`;

                btn.textContent = '重新生成';
                btn.disabled = false;
            } else {
                alert(result.message || '生成失敗');
                btn.textContent = '生成二維碼';
                btn.disabled = false;
            }
        } catch (error) {
            console.error('生成分享链接失败:', error);
            alert('生成失敗，請重試');
            btn.textContent = '生成二維碼';
            btn.disabled = false;
        }
    },

    copyShareUrl() {
        const input = document.getElementById('shareUrlInput');
        input.select();
        navigator.clipboard.writeText(input.value).then(() => {
            const btn = input.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = '已複製';
            setTimeout(() => { btn.textContent = originalText; }, 2000);
        }).catch(() => {
            // Fallback
            document.execCommand('copy');
        });
    }
};

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    MyGamesPage.init();
});
</script>
</body>
</html>
