<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雷射雕刻 — 圖片轉純黑白</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111;--card:#1a1a1a;--border:#333;--text:#e0e0e0;--muted:#888;--accent:#4dabf7;--accent2:#339af0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent)}

.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:18px;font-weight:600}
.topbar .subtitle{color:var(--muted);font-size:13px}

.app{display:flex;height:calc(100vh - 49px)}

/* ── Left Panel: Controls ── */
.panel{width:300px;min-width:300px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-group label{font-size:13px;color:var(--text);display:flex;justify-content:space-between;align-items:center}
.ctrl-group label span.val{color:var(--accent);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
select,input[type=number]{width:100%;padding:7px 10px;background:#222;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
select:focus,input[type=number]:focus{border-color:var(--accent)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#333;border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.algo-desc{font-size:11px;color:var(--muted);line-height:1.5;padding:6px 8px;background:#222;border-radius:6px;margin-top:2px}

/* Upload area */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(77,171,247,.06)}
.upload-zone .icon{font-size:36px;margin-bottom:8px;opacity:.4}
.upload-zone p{font-size:13px;color:var(--muted)}
.upload-zone input{display:none}

.file-info{font-size:12px;color:var(--muted);padding:6px 8px;background:#222;border-radius:6px;display:none}
.file-info.show{display:block}

/* Checkbox */
.chk{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none}
.chk input{accent-color:var(--accent);width:16px;height:16px}

/* Buttons */
.btn{padding:10px 16px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-group{display:flex;gap:8px}
.btn-group .btn{flex:1}

/* ── Main Preview Area ── */
.preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.preview-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px}
.preview-tabs button{padding:10px 20px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.preview-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.preview-tabs button:hover{color:var(--text)}
.tab-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tab-right span{font-size:12px;color:var(--muted)}

.canvas-wrap{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#0a0a0a;position:relative}
.canvas-wrap canvas{image-rendering:pixelated;max-width:100%;max-height:100%;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.canvas-wrap .empty{color:var(--muted);font-size:15px;text-align:center;padding:40px}
.canvas-wrap .empty .big{font-size:48px;opacity:.3;margin-bottom:12px}

/* Side-by-side mode */
.side-by-side{display:flex;flex:1;overflow:hidden}
.side-by-side .half{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:#0a0a0a;position:relative}
.side-by-side .half:first-child{border-right:1px solid var(--border)}
.side-by-side .half canvas{image-rendering:pixelated;max-width:95%;max-height:95%;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.half-label{position:absolute;top:10px;left:10px;font-size:11px;background:rgba(0,0,0,.7);color:var(--muted);padding:3px 10px;border-radius:4px}

/* Processing overlay */
.processing{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10;display:none}
.processing.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:900px){
  .app{flex-direction:column;height:auto}
  .panel{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border)}
  .side-by-side{flex-direction:column}
  .side-by-side .half{min-height:40vh}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" style="color:var(--accent);text-decoration:none;font-size:14px;font-weight:600;margin-right:4px;">&#x276E; 返回</a>
  <h1>雷射雕刻 — 圖片轉純黑白</h1>
  <span class="subtitle">彩色圖 → 抖動/網點 → 純黑白 1-bit 圖片</span>
</div>

<div class="app">
  <!-- ── Controls Panel ── -->
  <div class="panel">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📁</div>
      <p>拖入圖片 或 點擊上傳</p>
      <p style="font-size:11px;margin-top:4px">支持 JPG / PNG / BMP / WebP</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="file-info" id="fileInfo"></div>

    <div class="ctrl-group">
      <div class="section-title">演算法</div>
      <select id="algorithm">
        <option value="floyd-steinberg">Floyd-Steinberg（推薦）</option>
        <option value="atkinson">Atkinson（高對比）</option>
        <option value="stucki">Stucki（超平滑）</option>
        <option value="jarvis">Jarvis-Judice-Ninke</option>
        <option value="ordered">Ordered Bayer（規律網點）</option>
        <option value="halftone">Halftone（圓點網點）</option>
      </select>
      <div class="algo-desc" id="algoDesc">誤差擴散法，照片效果最佳，疏密點自然過渡</div>
    </div>

    <div class="ctrl-group">
      <div class="section-title">調整</div>
      <label>亮度 <span class="val" id="brightnessVal">0</span></label>
      <input type="range" id="brightness" min="-100" max="100" value="0">

      <label>對比度 <span class="val" id="contrastVal">0</span></label>
      <input type="range" id="contrast" min="-100" max="100" value="0">

      <label>閾值 <span class="val" id="thresholdVal">128</span></label>
      <input type="range" id="threshold" min="0" max="255" value="128">
    </div>

    <div class="ctrl-group" id="halftoneGroup" style="display:none">
      <div class="section-title">網點設定</div>
      <label>網點大小 <span class="val" id="dotSizeVal">4</span></label>
      <input type="range" id="dotSize" min="2" max="16" value="4" step="1">
    </div>

    <div class="ctrl-group">
      <div class="section-title">輸出</div>
      <label>寬度 (px)</label>
      <input type="number" id="outputWidth" min="100" max="10000" value="1000" step="100">
      <label class="chk"><input type="checkbox" id="invertChk"> 反轉黑白</label>
      <label class="chk"><input type="checkbox" id="lockRatio" checked> 鎖定比例</label>
    </div>

    <div style="margin-top:auto;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" id="processBtn" disabled>轉換</button>
      <div class="btn-group">
        <button class="btn btn-outline" id="dlPng" disabled>下載 PNG</button>
        <button class="btn btn-outline" id="dlBmp" disabled>下載 BMP</button>
      </div>
    </div>
  </div>

  <!-- ── Preview ── -->
  <div class="preview-area">
    <div class="preview-tabs">
      <button class="active" data-tab="compare">對比</button>
      <button data-tab="original">原圖</button>
      <button data-tab="result">結果</button>
      <div class="tab-right">
        <span id="imgDim"></span>
      </div>
    </div>

    <!-- Compare side by side -->
    <div class="side-by-side" id="viewCompare">
      <div class="half">
        <span class="half-label">原圖（灰度）</span>
        <canvas id="cvOriginal"></canvas>
        <div class="empty" id="emptyHint"><div class="big">←</div>上傳圖片開始</div>
      </div>
      <div class="half">
        <span class="half-label">轉換結果</span>
        <canvas id="cvResult"></canvas>
      </div>
      <div class="processing" id="procOverlay"><div class="spinner"></div><span style="color:var(--muted);font-size:13px">處理中…</span></div>
    </div>
    <div class="canvas-wrap" id="viewOriginal" style="display:none"><canvas id="cvOriginal2"></canvas></div>
    <div class="canvas-wrap" id="viewResult" style="display:none"><canvas id="cvResult2"></canvas></div>
  </div>
</div>

<script>
/* ================================================================
   Laser Engrave — Dithering Engine
   ================================================================ */
(() => {
"use strict";

// ── DOM ──
const $ = s => document.querySelector(s);
const fileInput   = $('#fileInput');
const uploadZone  = $('#uploadZone');
const fileInfo    = $('#fileInfo');
const algoSelect  = $('#algorithm');
const algoDesc    = $('#algoDesc');
const brightness  = $('#brightness');
const contrast    = $('#contrast');
const threshold   = $('#threshold');
const dotSize     = $('#dotSize');
const outputWidth = $('#outputWidth');
const invertChk   = $('#invertChk');
const lockRatio   = $('#lockRatio');
const processBtn  = $('#processBtn');
const dlPng       = $('#dlPng');
const dlBmp       = $('#dlBmp');
const procOverlay = $('#procOverlay');
const imgDim      = $('#imgDim');
const halftoneGrp = $('#halftoneGroup');
const emptyHint   = $('#emptyHint');

// Value displays
const sliders = [
  [brightness, $('#brightnessVal')],
  [contrast, $('#contrastVal')],
  [threshold, $('#thresholdVal')],
  [dotSize, $('#dotSizeVal')],
];
sliders.forEach(([input, display]) => {
  input.addEventListener('input', () => display.textContent = input.value);
});

// ── State ──
let srcImage = null;  // original Image element
let resultCanvas = null;  // final 1-bit result

// ── Algorithm descriptions ──
const ALGO_DESC = {
  'floyd-steinberg': '誤差擴散法，照片效果最佳，疏密點自然過渡',
  'atkinson':        '只擴散 75% 誤差，保留高對比，適合線條/文字',
  'stucki':          '擴散範圍更大，灰度過渡極為平滑',
  'jarvis':          '12 鄰域擴散，品質最高但速度稍慢',
  'ordered':         'Bayer 矩陣規律網點，結構化圖案，適合機械感風格',
  'halftone':        '模擬印刷圓點，深色區域點大密、淺色區域點小疏',
};

algoSelect.addEventListener('change', () => {
  algoDesc.textContent = ALGO_DESC[algoSelect.value] || '';
  halftoneGrp.style.display = algoSelect.value === 'halftone' ? '' : 'none';
});

// ── Upload ──
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

function loadFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      srcImage = img;
      outputWidth.value = Math.min(img.naturalWidth, 2000);
      fileInfo.textContent = `${file.name}  —  ${img.naturalWidth} × ${img.naturalHeight}`;
      fileInfo.classList.add('show');
      emptyHint.style.display = 'none';
      processBtn.disabled = false;
      drawOriginal();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

// ── Draw original (grayscale preview) ──
function drawOriginal() {
  if (!srcImage) return;
  const w = parseInt(outputWidth.value) || srcImage.naturalWidth;
  const h = lockRatio.checked
    ? Math.round(srcImage.naturalHeight * (w / srcImage.naturalWidth))
    : srcImage.naturalHeight;

  [cvOriginal, cvOriginal2].forEach(cv => {
    if (!cv) return;
    cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.drawImage(srcImage, 0, 0, w, h);
    // Convert to grayscale for preview
    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = g;
    }
    ctx.putImageData(imgData, 0, 0);
  });
  imgDim.textContent = `${w} × ${h}`;
}

const cvOriginal  = $('#cvOriginal');
const cvResult    = $('#cvResult');
const cvOriginal2 = $('#cvOriginal2');
const cvResult2   = $('#cvResult2');

// ── Tab switching ──
document.querySelectorAll('.preview-tabs button[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preview-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $('#viewCompare').style.display = btn.dataset.tab === 'compare' ? '' : 'none';
    $('#viewOriginal').style.display = btn.dataset.tab === 'original' ? '' : 'none';
    $('#viewResult').style.display = btn.dataset.tab === 'result' ? '' : 'none';
  });
});

// ── Process ──
processBtn.addEventListener('click', () => {
  if (!srcImage) return;
  processBtn.disabled = true;
  procOverlay.classList.add('show');

  // Use setTimeout to let UI update before heavy computation
  setTimeout(() => {
    try {
      doProcess();
    } catch (err) {
      console.error(err);
      alert('處理失敗: ' + err.message);
    }
    processBtn.disabled = false;
    procOverlay.classList.remove('show');
  }, 50);
});

function doProcess() {
  const w = parseInt(outputWidth.value) || srcImage.naturalWidth;
  const h = lockRatio.checked
    ? Math.round(srcImage.naturalHeight * (w / srcImage.naturalWidth))
    : srcImage.naturalHeight;

  // Draw source to temp canvas
  const tmpCv = document.createElement('canvas');
  tmpCv.width = w; tmpCv.height = h;
  const tmpCtx = tmpCv.getContext('2d');
  tmpCtx.drawImage(srcImage, 0, 0, w, h);
  const imgData = tmpCtx.getImageData(0, 0, w, h);

  // Convert to grayscale float array with brightness/contrast
  const gray = toGrayscale(imgData.data, w, h,
    parseInt(brightness.value), parseInt(contrast.value));

  // Apply dithering
  const algo = algoSelect.value;
  const thr = parseInt(threshold.value);
  let output;

  if (algo === 'halftone') {
    output = halftone(gray, w, h, parseInt(dotSize.value), invertChk.checked);
  } else {
    switch (algo) {
      case 'floyd-steinberg': floydSteinberg(gray, w, h, thr); break;
      case 'atkinson':        atkinson(gray, w, h, thr); break;
      case 'stucki':          stucki(gray, w, h, thr); break;
      case 'jarvis':          jarvis(gray, w, h, thr); break;
      case 'ordered':         ordered(gray, w, h); break;
    }
    // Convert to 1-bit image data
    output = grayToImageData(gray, w, h, invertChk.checked);
  }

  // Draw result
  [cvResult, cvResult2].forEach(cv => {
    if (!cv) return;
    cv.width = w; cv.height = h;
    cv.getContext('2d').putImageData(output, 0, 0);
  });

  // Also update original preview
  drawOriginal();

  // Store for download
  resultCanvas = cvResult;
  dlPng.disabled = false;
  dlBmp.disabled = false;
}

// ── Grayscale conversion with brightness/contrast ──
function toGrayscale(pixels, w, h, bright, contr) {
  const size = w * h;
  const gray = new Float32Array(size);
  const factor = (259 * (contr + 255)) / (255 * (259 - contr));

  for (let i = 0; i < size; i++) {
    const pi = i * 4;
    let g = 0.299 * pixels[pi] + 0.587 * pixels[pi + 1] + 0.114 * pixels[pi + 2];
    g += bright;
    g = factor * (g - 128) + 128;
    gray[i] = Math.max(0, Math.min(255, g));
  }
  return gray;
}

// ── Floyd-Steinberg Dithering ──
function floydSteinberg(g, w, h, thr) {
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = g[i];
      const nw = old < thr ? 0 : 255;
      g[i] = nw;
      const err = old - nw;
      if (x + 1 < w)             g[i + 1]     += err * 7 / 16;
      if (y + 1 < h) {
        if (x - 1 >= 0)          g[i + w - 1] += err * 3 / 16;
                                  g[i + w]     += err * 5 / 16;
        if (x + 1 < w)           g[i + w + 1] += err * 1 / 16;
      }
    }
  }
}

// ── Atkinson Dithering ──
function atkinson(g, w, h, thr) {
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = g[i];
      const nw = old < thr ? 0 : 255;
      g[i] = nw;
      const err = (old - nw) / 8;
      if (x + 1 < w)                          g[i + 1]       += err;
      if (x + 2 < w)                          g[i + 2]       += err;
      if (y + 1 < h) {
        if (x - 1 >= 0)                       g[i + w - 1]   += err;
                                               g[i + w]       += err;
        if (x + 1 < w)                        g[i + w + 1]   += err;
      }
      if (y + 2 < h)                          g[i + w * 2]   += err;
    }
  }
}

// ── Stucki Dithering ──
function stucki(g, w, h, thr) {
  const d = 42;
  const k = [
    /*            x+1    x+2  */  [0, 1, 8/d], [0, 2, 4/d],
    /* y+1 */    [1,-2, 2/d], [1,-1, 4/d], [1, 0, 8/d], [1, 1, 4/d], [1, 2, 2/d],
    /* y+2 */    [2,-2, 1/d], [2,-1, 2/d], [2, 0, 4/d], [2, 1, 2/d], [2, 2, 1/d],
  ];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = g[i];
      const nw = old < thr ? 0 : 255;
      g[i] = nw;
      const err = old - nw;
      for (const [dy, dx, weight] of k) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < w && ny < h)
          g[ny * w + nx] += err * weight;
      }
    }
  }
}

// ── Jarvis-Judice-Ninke Dithering ──
function jarvis(g, w, h, thr) {
  const d = 48;
  const k = [
    [0, 1, 7/d], [0, 2, 5/d],
    [1,-2, 3/d], [1,-1, 5/d], [1, 0, 7/d], [1, 1, 5/d], [1, 2, 3/d],
    [2,-2, 1/d], [2,-1, 3/d], [2, 0, 5/d], [2, 1, 3/d], [2, 2, 1/d],
  ];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = g[i];
      const nw = old < thr ? 0 : 255;
      g[i] = nw;
      const err = old - nw;
      for (const [dy, dx, weight] of k) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < w && ny < h)
          g[ny * w + nx] += err * weight;
      }
    }
  }
}

// ── Ordered (Bayer 8×8) Dithering ──
function ordered(g, w, h) {
  const bayer8 = [
     0, 32,  8, 40,  2, 34, 10, 42,
    48, 16, 56, 24, 50, 18, 58, 26,
    12, 44,  4, 36, 14, 46,  6, 38,
    60, 28, 52, 20, 62, 30, 54, 22,
     3, 35, 11, 43,  1, 33,  9, 41,
    51, 19, 59, 27, 49, 17, 57, 25,
    15, 47,  7, 39, 13, 45,  5, 37,
    63, 31, 55, 23, 61, 29, 53, 21,
  ];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const t = (bayer8[(y & 7) * 8 + (x & 7)] / 64) * 255;
      g[i] = g[i] > t ? 255 : 0;
    }
  }
}

// ── Halftone (variable-size dots) ──
function halftone(gray, w, h, cellSize, invert) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  // White background
  ctx.fillStyle = invert ? '#000' : '#fff';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = invert ? '#fff' : '#000';

  const half = cellSize / 2;
  for (let cy = 0; cy < h; cy += cellSize) {
    for (let cx = 0; cx < w; cx += cellSize) {
      // Average brightness in cell
      let sum = 0, count = 0;
      for (let dy = 0; dy < cellSize && cy + dy < h; dy++) {
        for (let dx = 0; dx < cellSize && cx + dx < w; dx++) {
          sum += gray[(cy + dy) * w + (cx + dx)];
          count++;
        }
      }
      const avg = sum / count;
      // Darker = larger dot
      const darkness = 1 - avg / 255;
      const radius = half * Math.sqrt(darkness);  // sqrt for perceptual linearity
      if (radius > 0.3) {
        ctx.beginPath();
        ctx.arc(cx + half, cy + half, radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  return ctx.getImageData(0, 0, w, h);
}

// ── Gray array → ImageData ──
function grayToImageData(g, w, h, invert) {
  const imgData = new ImageData(w, h);
  const d = imgData.data;
  for (let i = 0; i < g.length; i++) {
    let v = g[i] < 128 ? 0 : 255;
    if (invert) v = 255 - v;
    const pi = i * 4;
    d[pi] = d[pi + 1] = d[pi + 2] = v;
    d[pi + 3] = 255;
  }
  return imgData;
}

// ── Download PNG ──
dlPng.addEventListener('click', () => {
  if (!resultCanvas) return;
  const link = document.createElement('a');
  link.download = 'laser_engrave.png';
  link.href = resultCanvas.toDataURL('image/png');
  link.click();

// ── Download 1-bit BMP ──
dlBmp.addEventListener('click', () => {
  if (!resultCanvas) return;
  const w = resultCanvas.width, h = resultCanvas.height;
  const ctx = resultCanvas.getContext('2d');
  const imgData = ctx.getImageData(0, 0, w, h);
  const blob = createBmp1bit(imgData.data, w, h);
  const link = document.createElement('a');
  link.download = 'laser_engrave.bmp';
  link.href = URL.createObjectURL(blob);
  link.click();
  setTimeout(() => URL.revokeObjectURL(link.href), 5000);
});

function createBmp1bit(pixels, w, h) {
  // Row bytes must be multiple of 4
  const rowBytes = Math.ceil(w / 8);
  const paddedRow = (rowBytes + 3) & ~3;
  const pixelDataSize = paddedRow * h;
  const headerSize = 14 + 40 + 8; // BMP + DIB + 2-color palette
  const fileSize = headerSize + pixelDataSize;

  const buf = new ArrayBuffer(fileSize);
  const view = new DataView(buf);

  // BMP Header (14 bytes)
  view.setUint8(0, 0x42); view.setUint8(1, 0x4D); // "BM"
  view.setUint32(2, fileSize, true);
  view.setUint32(10, headerSize, true);

  // DIB Header (40 bytes)
  view.setUint32(14, 40, true);           // header size
  view.setInt32(18, w, true);             // width
  view.setInt32(22, h, true);             // height (bottom-up)
  view.setUint16(26, 1, true);            // planes
  view.setUint16(28, 1, true);            // bits per pixel
  view.setUint32(34, pixelDataSize, true); // image size

  // Color table: black, white
  view.setUint32(54, 0x00000000, false); // color 0 = black (BGRA)
  view.setUint32(58, 0xFFFFFF00, false); // color 1 = white (BGRA)

  // Pixel data (bottom-up, MSB first)
  const data = new Uint8Array(buf);
  for (let y = 0; y < h; y++) {
    const srcY = h - 1 - y; // BMP is bottom-up
    const rowStart = headerSize + y * paddedRow;
    for (let x = 0; x < w; x++) {
      const pi = (srcY * w + x) * 4;
      const isWhite = pixels[pi] > 128 ? 1 : 0;
      if (isWhite) {
        const byteIdx = rowStart + Math.floor(x / 8);
        data[byteIdx] |= (0x80 >> (x % 8));
      }
    }
  }
  return new Blob([buf], { type: 'image/bmp' });
}

// ── Auto-process on param change ──
let autoTimer = null;
function autoProcess() {
  if (!srcImage) return;
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => processBtn.click(), 300);
}
[brightness, contrast, threshold, dotSize].forEach(el =>
  el.addEventListener('input', autoProcess));
algoSelect.addEventListener('change', autoProcess);
invertChk.addEventListener('change', autoProcess);
outputWidth.addEventListener('change', () => { drawOriginal(); autoProcess(); });
lockRatio.addEventListener('change', () => { drawOriginal(); autoProcess(); });

})();
