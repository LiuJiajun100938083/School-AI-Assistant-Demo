<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲工作室 - 校園AI助手</title>
    <script src="/static/js/shared/theme.js"></script>
    <link rel="stylesheet" href="/static/css/game_upload.css">
</head>
<body>
    <div class="gs-page">
        <!-- ── Header ── -->
        <header class="gs-header">
            <div class="gs-header__left">
                <a href="/" class="gs-header__back">← 返回</a>
                <span class="gs-header__title">🎮 遊戲工作室</span>
            </div>
            <div class="gs-header__tabs">
                <button class="gs-tab gs-tab--active" data-mode="chat">💬 AI 對話</button>
                <button class="gs-tab" data-mode="code">✏️ 代碼編輯</button>
            </div>
        </header>

        <!-- ── 分屏主區域 ── -->
        <div class="gs-panels">
            <!-- 左側面板 -->
            <div class="gs-panels__left">
                <!-- AI 對話模式 -->
                <div class="gs-chat" id="chatPanel">
                    <div class="gs-chat__messages" id="chatMessages"></div>
                    <div class="gs-chat__input">
                        <textarea id="chatInput" placeholder="描述你想做的教育遊戲..." rows="2"></textarea>
                        <button id="chatSendBtn" class="gs-chat__send" title="發送">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </button>
                        <button id="chatStopBtn" class="gs-chat__stop" style="display:none" title="停止生成">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>

                <!-- 代碼編輯模式 -->
                <div class="gs-editor" id="editorPanel" style="display:none">
                    <textarea id="codeEditor" class="gs-editor__code" placeholder="在此編輯 HTML 代碼..." spellcheck="false"></textarea>
                </div>
            </div>

            <!-- 分隔條 -->
            <div class="gs-panels__divider"></div>

            <!-- 右側預覽 -->
            <div class="gs-panels__right">
                <div class="gs-preview__header">📱 即時預覽</div>
                <div class="gs-preview__body">
                    <div class="gs-preview__empty" id="previewEmpty">
                        <div class="gs-preview__empty-icon">🎮</div>
                        <div class="gs-preview__empty-text">尚未生成遊戲</div>
                        <div class="gs-preview__empty-hint">在左側描述你的遊戲需求，AI 會為你生成</div>
                    </div>
                    <iframe id="previewFrame" class="gs-preview__frame" sandbox="allow-scripts" referrerpolicy="no-referrer" style="display:none"></iframe>
                </div>
            </div>
        </div>

        <!-- ── 底部操作欄 ── -->
        <footer class="gs-footer">
            <button id="applyBtn" class="gs-footer__btn" disabled>✓ 滿意，填寫信息並上傳</button>
        </footer>

        <!-- ── 上傳信息 Modal ── -->
        <div class="gs-modal" id="uploadModal">
            <div class="gs-modal__overlay" onclick="GameStudio.closeUploadModal()"></div>
            <div class="gs-modal__card">
                <div class="gs-modal__header">
                    <h3>填寫遊戲信息</h3>
                    <button class="gs-modal__close" onclick="GameStudio.closeUploadModal()">×</button>
                </div>
                <div class="gs-modal__body">
                    <div id="modalError" class="gs-modal__error" style="display:none"></div>

                    <label class="gs-form__label">遊戲名稱 <span style="color:#ef4444">*</span></label>
                    <input type="text" id="modalGameName" class="gs-form__input" placeholder="輸入遊戲名稱" maxlength="100">

                    <label class="gs-form__label">遊戲描述 <span style="color:#ef4444">*</span></label>
                    <textarea id="modalGameDesc" class="gs-form__textarea" placeholder="簡短描述遊戲的內容和學習目標" maxlength="500"></textarea>

                    <label class="gs-form__label">學科分類 <span style="color:#ef4444">*</span></label>
                    <select id="modalGameSubject" class="gs-form__select">
                        <option value="">請選擇學科</option>
                        <option value="chinese">📖 中文</option>
                        <option value="math">📐 數學</option>
                        <option value="english">🔤 英文</option>
                        <option value="history">📜 歷史</option>
                        <option value="ict">💻 ICT</option>
                        <option value="physics">⚡ 物理</option>
                        <option value="chemistry">🧪 化學</option>
                        <option value="biology">🧬 生物</option>
                        <option value="ces">🏛️ 公民</option>
                    </select>

                    <label class="gs-form__label">顯示圖標</label>
                    <div class="gs-form__icons">
                        <div class="icon-option selected" data-icon="🎮">🎮</div>
                        <div class="icon-option" data-icon="🎯">🎯</div>
                        <div class="icon-option" data-icon="🧩">🧩</div>
                        <div class="icon-option" data-icon="🎲">🎲</div>
                        <div class="icon-option" data-icon="🏆">🏆</div>
                        <div class="icon-option" data-icon="⭐">⭐</div>
                        <div class="icon-option" data-icon="🚀">🚀</div>
                        <div class="icon-option" data-icon="💡">💡</div>
                    </div>

                    <label class="gs-form__label">適用年級</label>
                    <div class="gs-form__checkboxes">
                        <label><input type="checkbox" name="difficulty" value="中一" checked> 中一</label>
                        <label><input type="checkbox" name="difficulty" value="中二" checked> 中二</label>
                        <label><input type="checkbox" name="difficulty" value="中三" checked> 中三</label>
                        <label><input type="checkbox" name="difficulty" value="中四"> 中四</label>
                        <label><input type="checkbox" name="difficulty" value="中五"> 中五</label>
                        <label><input type="checkbox" name="difficulty" value="中六"> 中六</label>
                    </div>
                </div>
                <div class="gs-modal__footer">
                    <button id="modalCancelBtn" class="gs-btn gs-btn--secondary">取消</button>
                    <button id="modalSubmitBtn" class="gs-btn gs-btn--primary">上傳遊戲</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/game_studio.js"></script>
</body>
</html>
