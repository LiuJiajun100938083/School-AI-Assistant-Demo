<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對話 · 策問 QUAERO</title>
    <!-- Old Money 字體：Cormorant Garamond (serif) + Inter (sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/chat.css?v=20260420d">
    <link rel="stylesheet" href="/static/css/learning_modes.css?v=20260414">
    <link rel="stylesheet" href="/static/css/learning_summary.css?v=20260414">
    <!-- PrismJS 代码高亮 -->
    <script src="/static/vendor/prism/prism.min.js"></script>
    <script src="/static/vendor/prism/components/prism-markup.min.js"></script>
    <script src="/static/vendor/prism/components/prism-css.min.js"></script>
    <script src="/static/vendor/prism/components/prism-python.min.js"></script>
    <script src="/static/vendor/prism/components/prism-javascript.min.js"></script>
    <script src="/static/vendor/prism/components/prism-typescript.min.js"></script>
    <script src="/static/vendor/prism/components/prism-java.min.js"></script>
    <script src="/static/vendor/prism/components/prism-c.min.js"></script>
    <script src="/static/vendor/prism/components/prism-cpp.min.js"></script>
    <script src="/static/vendor/prism/components/prism-bash.min.js"></script>
    <script src="/static/vendor/prism/components/prism-json.min.js"></script>
    <script src="/static/vendor/prism/components/prism-sql.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            startup: {
                ready() { MathJax.startup.defaultReady(); }
            }
        };
    </script>
    <script src="/static/vendor/mathjax/tex-chtml.js" id="MathJax-script"></script>
    <!-- GSAP -->
    <script src="/static/vendor/gsap/gsap.min.js"></script>
</head>
<body>

<!-- 密碼修改模態框 -->
<div id="changePasswordModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-title" data-i18n="password.title">修改密碼</div>
        <form id="changePasswordForm" class="modal-form">
            <input type="password" id="oldPasswordInput" class="modal-input" data-i18n-placeholder="password.current" placeholder="當前密碼" required>
            <input type="password" id="newPasswordInput" class="modal-input" data-i18n-placeholder="password.new" placeholder="新密碼（至少8位）"
                   minlength="8" required>
            <input type="password" id="confirmPasswordInput" class="modal-input" data-i18n-placeholder="password.confirmNew" placeholder="確認新密碼" required>
            <div id="passwordError" class="modal-error"></div>
            <div class="modal-buttons">
                <button type="button" id="cancelPasswordChange" class="modal-button secondary" data-i18n="common.cancel">取消</button>
                <button type="submit" id="confirmPasswordChange" class="modal-button primary" data-i18n="password.confirmBtn">確認修改</button>
            </div>
        </form>
    </div>
</div>

<!-- 確認刪除對話框 -->
<div id="confirmDialog" class="confirm-dialog">
    <div class="confirm-dialog-content">
        <div class="confirm-dialog-title" data-i18n="chat.confirmDeleteTitle">確認刪除</div>
        <div id="confirmDialogMessage" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-buttons">
            <button id="confirmCancel" class="confirm-dialog-button cancel" data-i18n="chat.cancelBtn">取消</button>
            <button id="confirmDelete" class="confirm-dialog-button danger" data-i18n="chat.deleteBtn">刪除</button>
        </div>
    </div>
</div>

<!-- 新建对话 - 科目选择弹窗 -->
<div id="newChatModal" class="modal-overlay" style="display:none;">
    <div class="new-chat-modal">
        <div class="new-chat-modal-header">
            <div class="new-chat-modal-title" data-i18n="chat.newChatTitle">開始新對話</div>
            <button class="new-chat-modal-close" id="newChatModalClose" aria-label="Close">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="new-chat-modal-subtitle" data-i18n="chat.selectSubject">選擇學科</div>
        <div class="subject-grid" id="subjectGrid"></div>
        <div class="new-chat-name-section" id="newChatNameSection" style="display:none;">
            <div class="new-chat-name-label" data-i18n="chat.convName">對話名稱</div>
            <div class="new-chat-name-row">
                <input type="text" id="newChatNameInput" class="new-chat-name-input"
                       data-i18n-placeholder="chat.convNamePlaceholder" placeholder="輸入對話名稱（可留空）" maxlength="50">
                <button id="newChatConfirmBtn" class="new-chat-confirm-btn" data-i18n="chat.start">開始</button>
            </div>
        </div>
    </div>
</div>

<!-- 背景動態虛化層（全站統一） -->
<div class="liquid-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     Scholar's Correspondence — 學者書簡式對話版面
     結構完全重設：無側欄、無氣泡、無固定 header
     ═══════════════════════════════════════════════════════════ -->
<div id="mainContainer" class="corr">

    <!-- ▸ 浮動書封 pill（頂部中央，極小，編輯式） -->
    <nav class="corr-seal" role="navigation" aria-label="Correspondence navigation">
        <a href="/" id="backToHomeBtn" class="corr-seal__back" data-i18n-title="chat.backHome" title="返回首頁">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <button id="sidebarMobileToggle" class="corr-seal__archive"
                data-i18n-title="chat.archiveTooltip"
                data-i18n-aria-label="chat.archiveOpen"
                title="對話歷史"
                aria-label="打開對話歷史"
                aria-expanded="false"
                aria-controls="sidebar">
            <!-- Book with bookmark — 往來書簡的具象 icon，優於抽象的檔案櫃 -->
            <svg class="corr-seal__archive-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v16.5"/>
                <path d="M4 4.5v13.5A2.5 2.5 0 0 0 6.5 20.5H20"/>
                <path d="M8 7h7"/>
                <path d="M8 11h5"/>
            </svg>
            <span class="corr-seal__archive-label" data-i18n="chat.archiveLabel">對話錄</span>
        </button>
        <span class="corr-seal__hairline"></span>
        <div class="corr-seal__masthead">
            <span class="corr-seal__wordmark">QUAERO</span>
            <span id="headerTitle" class="corr-seal__subject">ICT · Informatics</span>
        </div>
        <span class="corr-seal__hairline"></span>
        <div class="user-info corr-seal__user" id="userInfo" aria-label="Account">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-details" style="display:none;">
                <div class="user-name" id="userName" data-i18n="home.defaultUser">學生</div>
                <div class="user-class" id="userClass" data-i18n="home.defaultClass">未分班</div>
            </div>
            <div class="user-menu corr-menu" id="userMenu">
                <div class="user-menu-item" id="viewProfile"><span data-i18n="chat.profile">個人資料</span></div>
                <div class="user-menu-item" id="viewReport"><span data-i18n="chat.report">學習分析報告</span></div>
                <div class="user-menu-item" id="changePassword"><span data-i18n="menu.changePassword">修改密碼</span></div>
                <div class="user-menu-separator"></div>
                <div class="user-menu-item" id="adminPanel" style="display: none;"><span data-i18n="menu.admin">管理後台</span></div>
                <div class="user-menu-separator" id="adminSeparator" style="display: none;"></div>
                <div class="user-menu-item" id="logoutButton"><span data-i18n="menu.logout">退出登入</span></div>
            </div>
        </div>
        <!-- 隱藏但保留的元素 (JS 依賴) -->
        <select id="subjectSelector" style="display:none;" aria-hidden="true"><option value="ict">ICT</option></select>
        <button id="adminButton" style="display:none;" aria-hidden="true"></button>
        <span id="statusIndicator" class="corr-seal__status status-online" data-i18n="chat.statusOnline" title="Online">●</span>
    </nav>

    <!-- ▸ 書頁主區：對話依編輯體例鋪排 -->
    <article class="corr-folio" role="main">
        <!-- 消息容器：此處 JS 將插入 .message 元素 -->
        <div id="messagesContainer" class="corr-stream">
            <!-- 歡迎態：editorial masthead（首次進入時顯示；JS 送第一條後清空） -->
            <section class="welcome-message corr-masthead">
                <div class="corr-masthead__kicker">
                    <span class="corr-hairline corr-hairline--left"></span>
                    <span class="corr-masthead__kicker-text welcome-kicker-text">QVAERENDO</span>
                    <span class="corr-hairline corr-hairline--right"></span>
                </div>
                <h1 class="corr-masthead__title welcome-title" data-i18n="chat.welcome">歡迎使用 策問 QUAERO</h1>
                <p class="corr-masthead__lede welcome-subtitle" data-i18n="chat.welcomeSubtitle">選擇科目並開始提問吧</p>
                <!-- Editorial byline : 3 小字雜誌感的能力一行橫列 -->
                <div class="feature-list corr-masthead__byline" id="featureList"></div>
                <!-- 分節黃銅印：masthead 結束 -->
                <div class="corr-masthead__seal" aria-hidden="true">❧</div>
            </section>
        </div>

        <!-- ▸ 底部書寫區：羽毛筆 fountain pen style -->
        <footer class="input-container corr-compose" id="inputContainer">
            <div class="conversation-files corr-compose__files" id="conversationFiles" style="display:none;"></div>
            <div class="corr-compose__well">
                <span class="corr-compose__speaker" aria-hidden="true">Q.</span>
                <div class="input-area corr-compose__field">
                    <textarea id="messageInput" class="message-input corr-compose__input"
                              data-i18n-placeholder="chat.inputPlaceholder" placeholder="提出您的問題…" rows="1"></textarea>
                </div>
                <div class="input-toolbar corr-compose__tools">
                    <div class="toolbar-left">
                        <!-- Attach：簡約下劃 + 字 -->
                        <button class="toolbar-btn corr-compose__attach" id="fileUploadBtn" data-i18n-title="chat.uploadFile" title="附件">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 11.5l-8 8a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-8 8a2 2 0 0 1-2.8-2.8l7-7"/>
                            </svg>
                            <span class="toolbar-btn-label" data-i18n="chat.attachment">附件</span>
                        </button>
                        <input type="file" id="fileUploadInput" class="file-upload-input" accept=".txt,.docx,.pdf,.pptx,.md" multiple>
                    </div>
                    <button id="sendButton" class="send-button corr-compose__send" aria-label="Send">
                        <span class="send-btn-text" data-i18n="chat.send">呈遞</span>
                        <svg class="send-btn-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </article>
</div>

<!-- ═══════════════════════════════════════════════════════════
     Archive Drawer — 由右側滑入（非持續性側欄）
     ═══════════════════════════════════════════════════════════ -->
<div id="sidebarOverlay" class="corr-drawer-scrim"></div>
<aside id="sidebar" class="sidebar corr-drawer" role="complementary">
    <header class="sidebar-header corr-drawer__header">
        <div>
            <div class="corr-drawer__eyebrow">ARCHIVE</div>
            <h3 data-i18n="chat.history">對話歷史</h3>
        </div>
        <button id="sidebarCloseBtn" class="sidebar-close-btn corr-drawer__close" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </header>
    <button id="newChatButton" class="new-chat-btn corr-drawer__new" data-i18n="chat.newChat">+ 新對話</button>
    <div id="conversationsList" class="conversations-list corr-drawer__list"></div>
</aside>

<!-- 桌面/編輯器舊 toggle（JS 仍引用；保留隱藏） -->
<button id="sidebarToggle" class="sidebar-edge-toggle" style="display:none;" aria-hidden="true"></button>

<script src="/static/js/shared/subject_icons.js?v=20260419"></script>
<script src="/static/js/shared/i18n.js?v=20260414"></script>
<script src="/static/js/shared/i18n/common.js?v=20260414"></script>
<script src="/static/js/shared/i18n/chat.js?v=20260420d"></script>
<script>
    document.title = i18n.t('chat.pageTitle');
    i18n.applyDOM();
</script>
<script src="/static/js/learning_modes_frontend.js?v=20260414"></script>
<script src="/static/js/learning_summary.js?v=20260414"></script>
<script src="/static/js/shared/utils.js?v=20260414"></script>
<script src="/static/js/shared/auth.js?v=20260414"></script>
<script src="/static/js/shared/ui.js?v=20260414"></script>
<script src="/static/js/shared/api.js?v=20260414"></script>
<script src="/static/js/chat.js?v=20260420d"></script>
</body>
</html>
