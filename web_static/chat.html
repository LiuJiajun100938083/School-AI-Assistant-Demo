<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 學習對話 - 培僑中學</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/learning_modes.css">
    <link rel="stylesheet" href="/static/css/learning_summary.css">
    <!-- PrismJS 代码高亮 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            startup: {
                ready() { MathJax.startup.defaultReady(); }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<!-- 密碼修改模態框 -->
<div id="changePasswordModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-title">🔐 修改密碼</div>
        <form id="changePasswordForm" class="modal-form">
            <input type="password" id="oldPasswordInput" class="modal-input" placeholder="當前密碼" required>
            <input type="password" id="newPasswordInput" class="modal-input" placeholder="新密碼（至少4位）"
                   minlength="4" required>
            <input type="password" id="confirmPasswordInput" class="modal-input" placeholder="確認新密碼" required>
            <div id="passwordError" class="modal-error"></div>
            <div class="modal-buttons">
                <button type="button" id="cancelPasswordChange" class="modal-button secondary">取消</button>
                <button type="submit" id="confirmPasswordChange" class="modal-button primary">確認修改</button>
            </div>
        </form>
    </div>
</div>

<!-- 確認刪除對話框 -->
<div id="confirmDialog" class="confirm-dialog">
    <div class="confirm-dialog-content">
        <div class="confirm-dialog-title">⚠️ 確認刪除</div>
        <div id="confirmDialogMessage" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-buttons">
            <button id="confirmCancel" class="confirm-dialog-button cancel">取消</button>
            <button id="confirmDelete" class="confirm-dialog-button danger">刪除</button>
        </div>
    </div>
</div>

<!-- 新建对话 - 科目选择弹窗 -->
<div id="newChatModal" class="modal-overlay" style="display:none;">
    <div class="new-chat-modal">
        <div class="new-chat-modal-header">
            <div class="new-chat-modal-title">開始新對話</div>
            <button class="new-chat-modal-close" id="newChatModalClose">✕</button>
        </div>
        <div class="new-chat-modal-subtitle">選擇學科</div>
        <div class="subject-grid" id="subjectGrid"></div>
        <div class="new-chat-name-section" id="newChatNameSection" style="display:none;">
            <div class="new-chat-name-label">對話名稱</div>
            <div class="new-chat-name-row">
                <input type="text" id="newChatNameInput" class="new-chat-name-input"
                       placeholder="輸入對話名稱（可留空）" maxlength="50">
                <button id="newChatConfirmBtn" class="new-chat-confirm-btn">開始</button>
            </div>
        </div>
    </div>
</div>

<!-- 主界面 -->
<div id="mainContainer" class="main-container">
    <!-- 頂部工具欄 -->
    <div class="header">
        <div class="header-left">
            <button id="backToHomeBtn" class="back-home-btn" title="返回首頁">←</button>
            <button id="sidebarMobileToggle" class="sidebar-mobile-toggle" title="對話歷史">☰</button>
            <div id="headerTitle" class="header-title">💻 ICT AI 學習夥伴</div>
            <select id="subjectSelector" class="subject-selector" style="display:none;">
                <option value="ict">💻 ICT (載入中...)</option>
            </select>
            <input type="hidden" id="modeSelector" value="local">
        </div>
        <div class="header-right">
            <button id="adminButton" class="admin-button" style="display: none;">
                <span>⚙️</span>管理後台
            </button>
            <div id="statusIndicator" class="status-indicator status-online">● 連接正常</div>
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="userName">學生</div>
                    <div class="user-class" id="userClass">未分班</div>
                </div>
                <div class="user-menu" id="userMenu">
                    <div class="user-menu-item" id="viewProfile"><span>👤 個人資料</span></div>
                    <div class="user-menu-item" id="viewReport"><span>📊 學習分析報告</span></div>
                    <div class="user-menu-item" id="changePassword"><span>🔐 修改密碼</span></div>
                    <div class="user-menu-separator"></div>
                    <div class="user-menu-item" id="adminPanel" style="display: none;"><span>⚙️ 管理後台</span></div>
                    <div class="user-menu-separator" id="adminSeparator" style="display: none;"></div>
                    <div class="user-menu-item" id="logoutButton"><span>🚪 退出登入</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- 側邊欄 -->
        <div id="sidebar" class="sidebar">
            <button id="sidebarCloseBtn" class="sidebar-close-btn">✕</button>
            <div class="sidebar-header">
                <h3>對話歷史</h3>
                <button id="newChatButton" class="new-chat-btn">+ 新對話</button>
            </div>
            <div id="conversationsList" class="conversations-list"></div>
        </div>

        <!-- 側邊欄邊緣 toggle（桌面） -->
        <button id="sidebarToggle" class="sidebar-edge-toggle" title="收起/展開側邊欄">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>

        <!-- 聊天區域 -->
        <div class="chat-container">
            <div id="messagesContainer" class="messages-container">
                <div class="welcome-message">
                    <div class="welcome-title">歡迎使用 AI 學習夥伴！</div>
                    <div class="welcome-subtitle">選擇科目並開始提問吧</div>
                    <div class="feature-list" id="featureList"></div>
                </div>
            </div>

            <div class="input-container" id="inputContainer">
                <div class="conversation-files" id="conversationFiles" style="display: none;"></div>
                <div class="input-area">
                    <textarea id="messageInput" class="message-input"
                              placeholder="輸入訊息或拖曳檔案到此處..." rows="1"></textarea>
                </div>
                <div class="input-toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" id="fileUploadBtn" title="上傳檔案到當前對話">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                            <span class="toolbar-btn-label">附件</span>
                        </button>
                        <input type="file" id="fileUploadInput" class="file-upload-input"
                               accept=".txt,.docx,.pdf,.pptx,.md" multiple>
                        <div class="toolbar-divider"></div>
                        <div class="thinking-toggle" id="thinkingToggleLabel"
                             title="開啟後 AI 會先進行深度推理再回答，適合複雜問題">
                            <input class="thinking-toggle-checkbox" type="checkbox" id="thinkingToggle" checked>
                            <label class="thinking-switch" for="thinkingToggle">
                                <div class="thinking-switch-knob">
                                    <div class="thinking-switch-led"></div>
                                </div>
                            </label>
                            <span class="thinking-toggle-text" id="thinkingToggleText">深度思考</span>
                        </div>
                    </div>
                    <button id="sendButton" class="send-button">
                        <span class="send-btn-text">發送</span>
                        <svg class="send-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/learning_modes_frontend.js"></script>
<script src="/static/js/learning_summary.js"></script>
<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
