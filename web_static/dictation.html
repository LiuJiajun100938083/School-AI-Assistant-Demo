<!DOCTYPE html>
<html lang="zh-TW" style="color-scheme: light only;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="dict.page.title">英文默書</title>
    <link rel="stylesheet" href="/static/css/dictation.css">
    <script src="/static/js/shared/i18n.js"></script>
    <script src="/static/js/shared/i18n/common.js"></script>
    <script src="/static/js/shared/i18n/dictation.js"></script>
</head>
<body>
    <header class="top-bar">
        <button class="back-btn" onclick="window.location.href='/'">
            <span data-i18n="dict.page.backHome">← 返回首頁</span>
        </button>
        <div class="header-title">✍️ <span data-i18n="dict.page.title">英文默書</span></div>
        <div class="header-right">
            <select id="langSwitch" class="lang-switch">
                <option value="zh">中文</option>
                <option value="en">EN</option>
            </select>
            <div class="user-info" id="userInfo"></div>
        </div>
    </header>

    <div class="app-layout">
        <!-- ─── 側邊欄 ─── -->
        <aside class="sidebar">
            <button class="primary-btn create-btn teacher-only" onclick="app.openCreateModal()">
                + <span data-i18n="dict.sidebar.createTitle">建立默書</span>
            </button>

            <nav class="filter-nav teacher-only">
                <div class="filter-item active" data-status="">
                    <span data-i18n="dict.sidebar.filterAll">全部</span>
                </div>
                <div class="filter-item" data-status="draft">
                    <span data-i18n="dict.sidebar.filterDraft">草稿</span>
                </div>
                <div class="filter-item" data-status="published">
                    <span data-i18n="dict.sidebar.filterPublished">已發布</span>
                </div>
                <div class="filter-item" data-status="closed">
                    <span data-i18n="dict.sidebar.filterClosed">已關閉</span>
                </div>
            </nav>

            <div class="student-only">
                <div class="side-label" data-i18n="dict.sidebar.myList">我的默書</div>
            </div>

            <button class="secondary-btn reload-btn" onclick="app.reload()">
                ⟳ <span data-i18n="dict.sidebar.refresh">重新載入</span>
            </button>
        </aside>

        <!-- ─── 主內容 ─── -->
        <main class="main-area">
            <div id="mainContent">
                <div class="loading" data-i18n="dict.page.loading">載入中...</div>
            </div>
        </main>
    </div>

    <!-- ─── 建立/編輯 Modal ─── -->
    <div class="modal-overlay" id="createModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="createModalTitle" data-i18n="dict.sidebar.createTitle">建立默書</h3>
                <button class="modal-close" onclick="app.closeCreateModal()">×</button>
            </div>
            <div class="modal-body">
                <label data-i18n="dict.create.title">標題</label>
                <input type="text" id="f_title" data-i18n-placeholder="dict.create.titlePh">

                <label data-i18n="dict.create.description">說明 (選填)</label>
                <textarea id="f_description" rows="2" data-i18n-placeholder="dict.create.descriptionPh"></textarea>

                <label data-i18n="dict.create.reference">默書原文</label>
                <div class="reference-actions">
                    <button type="button" class="chip-btn" onclick="document.getElementById('refFileInput').click()">
                        📄 <span data-i18n="dict.create.uploadFile">上傳文件</span>
                    </button>
                    <button type="button" class="chip-btn" onclick="document.getElementById('refPhotoInput').click()">
                        📷 <span data-i18n="dict.create.takePhoto">拍照辨識</span>
                    </button>
                    <span class="chip-hint" id="refExtractHint"></span>
                </div>
                <input type="file" id="refFileInput" accept=".txt,.md,.pdf,.docx,.pptx" style="display:none;"
                       onchange="app.extractReferenceFromFile(this.files[0])">
                <input type="file" id="refPhotoInput" accept="image/*" capture="environment" style="display:none;"
                       onchange="app.extractReferenceFromFile(this.files[0])">
                <textarea id="f_reference" rows="6" data-i18n-placeholder="dict.create.referencePh"></textarea>

                <label data-i18n="dict.create.target">對象</label>
                <select id="f_target_type" onchange="app.onTargetTypeChange()">
                    <option value="all" data-i18n="dict.create.targetAll">全部學生</option>
                    <option value="class" data-i18n="dict.create.targetClass">指定班級</option>
                    <option value="student" data-i18n="dict.create.targetStudent">指定學生</option>
                </select>
                <div id="f_target_picker" class="target-picker"></div>

                <label data-i18n="dict.create.deadline">截止時間 (選填)</label>
                <input type="datetime-local" id="f_deadline">

                <label class="checkbox-row">
                    <input type="checkbox" id="f_allow_late">
                    <span data-i18n="dict.create.allowLate">允許逾期提交</span>
                </label>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn" onclick="app.closeCreateModal()" data-i18n="dict.create.cancel">取消</button>
                <button class="primary-btn" onclick="app.doCreate()" data-i18n="dict.create.submit">建立</button>
            </div>
        </div>
    </div>

    <!-- ─── 學生提交 Modal ─── -->
    <div class="modal-overlay" id="submitModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3 data-i18n="dict.submit.title">拍照提交默書</h3>
                <button class="modal-close" onclick="app.closeSubmitModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="submit-tip" data-i18n="dict.submit.tip">提示:盡量對焦清楚</div>
                <input type="file" id="submitFiles" accept="image/*" multiple capture="environment">
                <div id="submitPreview" class="submit-preview"></div>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn" onclick="app.closeSubmitModal()" data-i18n="dict.submit.cancel">取消</button>
                <button class="primary-btn" onclick="app.doSubmit()" data-i18n="dict.submit.submit">上傳提交</button>
            </div>
        </div>
    </div>

    <!-- ─── 批改結果 Modal ─── -->
    <div class="modal-overlay" id="resultModal" style="display:none;">
        <div class="modal-box modal-wide">
            <div class="modal-header">
                <h3 data-i18n="dict.result.title">批改結果</h3>
                <button class="modal-close" onclick="app.closeResultModal()">×</button>
            </div>
            <div class="modal-body" id="resultBody">
                <div class="loading" data-i18n="dict.page.loading">載入中...</div>
            </div>
        </div>
    </div>

    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/ui.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/dictation.js"></script>
</body>
</html>
