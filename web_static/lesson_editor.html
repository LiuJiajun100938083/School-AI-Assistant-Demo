<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課案編輯器</title>
    <script src="/static/js/shared/theme.js"></script>
    <link rel="stylesheet" href="/static/css/lesson_editor.css">
</head>
<body>
    <!-- Top Toolbar -->
    <div class="editor-toolbar">
        <div class="toolbar-left">
            <button class="tool-btn back-btn" id="backBtn" title="返回課堂列表">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                返回
            </button>
            <div class="separator"></div>
            <input type="text" id="planTitle" class="plan-title-input" placeholder="課案標題...">
        </div>
        <div class="toolbar-center">
            <span class="save-status" id="saveStatus"></span>
        </div>
        <div class="toolbar-right">
            <select id="planStatus" class="status-select">
                <option value="draft">草稿</option>
                <option value="ready">就緒</option>
                <option value="archived">已歸檔</option>
            </select>
            <button class="tool-btn preview-btn" id="previewBtn" title="模擬上課預覽">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                模擬上課
            </button>
            <button class="tool-btn save-btn" id="saveBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                儲存
            </button>
        </div>
    </div>

    <!-- Main Three-Panel Layout -->
    <div class="editor-main">
        <!-- Left: Timeline Panel -->
        <div class="panel panel-timeline">
            <div class="panel-header">
                <span class="panel-title">幻燈片</span>
                <span class="slide-count" id="slideCount">0</span>
            </div>
            <div class="slide-list" id="slideList">
                <!-- Slides rendered here -->
            </div>
            <div class="add-slide-bar">
                <button class="add-slide-btn" id="addSlideBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新增幻燈片
                </button>
            </div>
        </div>

        <!-- Center: Preview Panel -->
        <div class="panel panel-preview">
            <div class="preview-area" id="previewArea">
                <div class="preview-empty" id="previewEmpty">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    <p>選擇或新增幻燈片</p>
                </div>
                <div class="preview-content" id="previewContent" style="display:none;"></div>
            </div>
        </div>

        <!-- Right: Config Panel -->
        <div class="panel panel-config">
            <div class="panel-header">
                <span class="panel-title">設定</span>
            </div>
            <div class="config-form" id="configForm" style="display:none;">
                <div class="config-section">
                    <label class="config-label">類型</label>
                    <span class="config-type-badge" id="slideTypeBadge"></span>
                </div>
                <div class="config-section">
                    <label class="config-label" for="slideTitle">標題</label>
                    <input type="text" id="slideTitle" class="config-input" placeholder="幻燈片標題...">
                </div>
                <div class="config-section">
                    <label class="config-label" for="slideDuration">時限 (秒, 0=無限)</label>
                    <input type="number" id="slideDuration" class="config-input" min="0" value="0">
                </div>
                <!-- Type-specific config rendered dynamically -->
                <div id="typeConfigArea"></div>
                <div class="config-actions">
                    <button class="btn-save-slide" id="saveSlideBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                        儲存此頁
                    </button>
                    <button class="btn-delete-slide" id="deleteSlideBtn">刪除幻燈片</button>
                </div>
            </div>
            <div class="config-empty" id="configEmpty">
                <p>選擇幻燈片以編輯</p>
            </div>
        </div>
    </div>

    <!-- Add Slide Modal -->
    <div class="modal-overlay" id="addSlideModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>新增幻燈片</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="slide-type-grid">
                    <div class="slide-type-card" data-type="ppt">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        </div>
                        <div class="type-name">PPT</div>
                        <div class="type-desc">投影片頁面展示</div>
                    </div>
                    <div class="slide-type-card" data-type="game">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="11" r="1"/><circle cx="18" cy="13" r="1"/></svg>
                        </div>
                        <div class="type-name">遊戲</div>
                        <div class="type-desc">嵌入遊戲中心遊戲</div>
                    </div>
                    <div class="slide-type-card" data-type="quiz">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <div class="type-name">測驗</div>
                        <div class="type-desc">互動測驗</div>
                    </div>
                    <div class="slide-type-card" data-type="poll">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        </div>
                        <div class="type-name">投票</div>
                        <div class="type-desc">即時投票</div>
                    </div>
                    <div class="slide-type-card" data-type="link">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                        </div>
                        <div class="type-name">連結</div>
                        <div class="type-desc">連結 + QR Code</div>
                    </div>
                    <div class="slide-type-card" data-type="interactive">
                        <div class="type-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                                <path d="M10 6.5h4M6.5 10v4M17.5 10v4M10 17.5h4" stroke-dasharray="2 2"/>
                            </svg>
                        </div>
                        <div class="type-name">互動活動</div>
                        <div class="type-desc">拖拽排序 / 配對 / 放置</div>
                    </div>
                </div>

                <!-- PPT Import Section (shown when PPT type selected) -->
                <div id="pptImportSection" style="display:none;">
                    <!-- Tabs: Upload vs Select from Room -->
                    <div class="ppt-source-tabs">
                        <button class="ppt-tab active" data-tab="upload" id="pptTabUpload">從電腦上傳</button>
                        <button class="ppt-tab" data-tab="room" id="pptTabRoom">從房間選擇</button>
                    </div>

                    <!-- Tab: Direct Upload -->
                    <div class="ppt-tab-content" id="pptUploadTab">
                        <div class="ppt-upload-zone" id="pptUploadZone">
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <p>拖放 PPTX 檔案到此處</p>
                            <span>或</span>
                            <button class="ppt-upload-btn" id="pptUploadBtn">選擇檔案</button>
                            <input type="file" id="pptFileInput" accept=".pptx,.ppt" style="display:none;">
                            <p class="ppt-upload-hint">支援 .pptx / .ppt，最大 150MB</p>
                        </div>
                        <!-- Upload Progress -->
                        <div class="ppt-upload-progress" id="pptUploadProgress" style="display:none;">
                            <div class="ppt-progress-info">
                                <span class="ppt-progress-filename" id="pptProgressFilename"></span>
                                <span class="ppt-progress-status" id="pptProgressStatus">上傳中...</span>
                            </div>
                            <div class="ppt-progress-bar">
                                <div class="ppt-progress-fill" id="pptProgressFill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: Select from Room -->
                    <div class="ppt-tab-content" id="pptRoomTab" style="display:none;">
                        <div class="config-section">
                            <label class="config-label">選擇房間</label>
                            <select id="pptSourceSelect" class="config-input">
                                <option value="">-- 選擇房間 --</option>
                            </select>
                        </div>
                        <div id="pptFileList" class="ppt-file-list"></div>
                    </div>
                </div>

                <!-- Game Select Section -->
                <div id="gameSelectSection" style="display:none;">
                    <div class="config-section">
                        <label class="config-label">搜尋遊戲</label>
                        <input type="text" id="gameSearch" class="config-input" placeholder="輸入遊戲名稱...">
                    </div>
                    <div id="gameList" class="game-list"></div>
                </div>

                <!-- Link Input Section -->
                <div id="linkInputSection" style="display:none;">
                    <div class="config-section">
                        <label class="config-label">連結 URL</label>
                        <input type="url" id="linkUrlInput" class="config-input" placeholder="https://example.com">
                    </div>
                    <div class="config-section">
                        <label class="config-label">描述 (選填)</label>
                        <input type="text" id="linkDescInput" class="config-input" placeholder="連結描述...">
                    </div>
                    <button class="ppt-upload-btn" id="linkCreateBtn" style="width:100%;">建立連結幻燈片</button>
                </div>

                <!-- Interactive Activity Config Section -->
                <div id="interactiveConfigSection" style="display:none;">
                    <div id="interactiveTemplateConfig"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Picker Modal (subject-based) -->
    <div class="modal-overlay" id="gamePickerModal" style="display:none;">
        <div class="modal game-picker-modal">
            <div class="modal-header">
                <h3 id="gamePickerTitle">選擇遊戲</h3>
                <button class="modal-close" id="closeGamePickerBtn">&times;</button>
            </div>
            <div class="game-picker-body">
                <div class="game-picker-sidebar">
                    <div class="game-picker-subjects" id="gamePickerSubjects">
                        <!-- Subject tabs rendered here -->
                    </div>
                </div>
                <div class="game-picker-content">
                    <div class="game-picker-search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="gamePickerSearch" placeholder="搜尋遊戲名稱...">
                    </div>
                    <div class="game-picker-list" id="gamePickerList">
                        <!-- Games rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lesson Preview Overlay (模擬上課) -->
    <div id="lessonPreviewOverlay" style="display:none;"></div>

    <!-- Runtime renderers for live preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="/static/css/lesson_runtime.css">
    <link rel="stylesheet" href="/static/css/interactive_activity.css">
    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/lesson_slide_renderers.js"></script>
    <script src="/static/js/shared/interactive_renderers.js"></script>

    <script src="/static/js/lesson_editor.js"></script>
    <script src="/static/js/editors/interactive_editor.js"></script>
    <script src="/static/js/editors/interactive_editor_drag_sort.js"></script>
    <script src="/static/js/editors/interactive_editor_drag_match.js"></script>
    <script src="/static/js/editors/interactive_editor_drag_place.js"></script>
    <script src="/static/js/editors/interactive_editor_free_canvas.js"></script>
    <script src="/static/js/editors/interactive_editor_html_sandbox.js"></script>
    <script src="/static/js/editors/lesson_preview.js"></script>
</body>
</html>
