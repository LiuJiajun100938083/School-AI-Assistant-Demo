<!DOCTYPE html>
<html lang="zh-TW" style="color-scheme: light only;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業管理</title>
    <link rel="stylesheet" href="/static/css/assignment.css">
</head>
<body>
    <!-- App Shell -->
    <div class="app-shell">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" id="sidebarToggle" onclick="AssignmentApp.toggleSidebar()" aria-label="切換側邊欄">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <a href="/" class="topbar-back" title="返回首頁" onclick="event.preventDefault(); history.length > 1 ? history.back() : location.href='/';">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
                <div class="topbar-divider"></div>
                <h1 class="topbar-title">作業管理</h1>
                <nav class="topbar-breadcrumb breadcrumb" id="breadcrumb"></nav>
            </div>
            <div class="topbar-actions" id="headerActions"></div>
        </header>

        <!-- Body: Sidebar + Workspace -->
        <div class="app-body">

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-inner">
                    <!-- Primary Action (teacher: new assignment) -->
                    <div class="sidebar-section" id="sidebarAction"></div>

                    <!-- Navigation / Filters -->
                    <nav class="sidebar-nav" id="sidebarNav"></nav>

                    <!-- Quick Stats -->
                    <div class="sidebar-stats" id="sidebarStats"></div>
                </div>
            </aside>

            <!-- Sidebar overlay for mobile -->
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="AssignmentApp.toggleSidebar()"></div>

            <!-- Main Workspace -->
            <main class="workspace" id="mainContent" aria-live="polite">
                <div class="workspace-loading">
                    <div class="loading-spinner"></div>
                    <p>載入中...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Submit Modal -->
    <div class="modal-overlay" id="submitModal" role="dialog" aria-modal="true" aria-labelledby="submitModalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="submitModalTitle">提交作業</h2>
                <button class="modal-close" onclick="AssignmentApp.closeSubmitModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>備註說明</label>
                <textarea id="submitContent" rows="3" placeholder="輸入你的作業說明或備註..."></textarea>
            </div>
            <div class="form-group">
                <label>上傳文件</label>
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-zone-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg></div>
                    <div class="upload-zone-text">點擊或拖拽文件到此處</div>
                    <div class="upload-zone-hint">支持 PDF、Word、PPT、圖片、視頻、代碼等，單文件最大 50MB</div>
                </div>
                <input type="file" id="fileInput" multiple style="display:none">
                <div class="file-list" id="selectedFiles" style="margin-top:12px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="AssignmentApp.closeSubmitModal()">取消</button>
                <button class="btn btn-primary" id="submitBtn" onclick="AssignmentApp.doSubmit()">提交</button>
            </div>
        </div>
    </div>

    <!-- Create/Edit Panel (Step Wizard) -->
    <div class="modal-overlay" id="createModal" role="dialog" aria-modal="true" aria-labelledby="createModalTitle">
        <div class="modal-content create-panel">
            <div class="modal-header">
                <h2 id="createModalTitle">創建作業</h2>
                <button class="modal-close" onclick="AssignmentApp.closeCreateModal()">&times;</button>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-item active" id="stepItem1" onclick="AssignmentApp.goToStep(1)">
                    <div class="step-circle">1</div>
                    <span>基本信息</span>
                </div>
                <div class="step-line"></div>
                <div class="step-item" id="stepItem2" onclick="AssignmentApp.goToStep(2)">
                    <div class="step-circle">2</div>
                    <span>評分標準</span>
                </div>
            </div>

            <!-- Step 1: Basic Info -->
            <div class="step-content" id="step1">
                <div class="form-group">
                    <label>作業標題 *</label>
                    <input type="text" id="asgTitle" placeholder="輸入作業標題">
                </div>
                <div class="form-group">
                    <label>作業描述</label>
                    <textarea id="asgDesc" rows="4" placeholder="描述作業要求..."></textarea>
                </div>
                <!-- 附件上傳 -->
                <div class="form-group">
                    <label>附件 <span style="color:var(--text-tertiary);font-weight:400;">(PDF、Word、PPT、圖片等)</span></label>
                    <div class="attachment-zone" id="attachmentZone">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        <span>點擊或拖拽文件到此處上傳</span>
                    </div>
                    <input type="file" id="attachmentInput" multiple style="display:none">
                    <div id="existingAttachments"></div>
                    <div id="pendingAttachments"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目標類型</label>
                        <select id="asgTargetType" onchange="AssignmentApp.onTargetTypeChange()">
                            <option value="all">所有學生</option>
                            <option value="class">指定班級</option>
                            <option value="student">指定學生</option>
                        </select>
                    </div>
                    <div class="form-group" id="targetValueGroup" style="display:none;">
                        <label id="targetValueLabel">目標值</label>
                        <select id="asgTargetValue"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>截止日期</label>
                        <input type="datetime-local" id="asgDeadline">
                    </div>
                    <div class="form-group">
                        <label>最大文件數</label>
                        <input type="number" id="asgMaxFiles" value="5" min="1" max="20">
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="asgAllowLate">
                    <label for="asgAllowLate">允許逾期提交</label>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" onclick="AssignmentApp.closeCreateModal()">取消</button>
                    <button class="btn btn-primary" onclick="AssignmentApp.goToStep(2)">下一步</button>
                </div>
            </div>

            <!-- Step 2: Rubric Configuration -->
            <div class="step-content" id="step2" style="display:none;">
                <div class="form-group">
                    <label>選擇評分方式</label>
                    <div class="rubric-type-grid" id="rubricTypeGrid"></div>
                </div>
                <div id="rubricEditorArea"></div>
                <div class="modal-footer">
                    <button class="btn btn-outline" onclick="AssignmentApp.goToStep(1)">上一步</button>
                    <button class="btn btn-outline" onclick="AssignmentApp.saveAsDraft()">保存草稿</button>
                    <button class="btn btn-primary" onclick="AssignmentApp.saveAndPublish()">發布</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/shared/utils.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/ui.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/assignment.js"></script>
</body>
</html>
