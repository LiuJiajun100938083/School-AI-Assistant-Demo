<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習分析報告 - 示範學校</title>
    <link rel="stylesheet" href="/static/css/index.css?v=20260414">
    <link rel="stylesheet" href="/static/css/student_report.css?v=20260414">
</head>
<body>
    <!-- SVG Icon Sprite -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
        <!-- Navigation -->
        <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </symbol>
        <!-- Actions -->
        <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
        </symbol>
        <symbol id="icon-stop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        </symbol>
        <!-- Title / Overview -->
        <symbol id="icon-chart-bar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </symbol>
        <!-- Welcome / Book -->
        <symbol id="icon-book-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </symbol>
        <!-- Lightbulb (tip) -->
        <symbol id="icon-lightbulb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
        </symbol>
        <!-- Subject Icons -->
        <symbol id="icon-monitor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </symbol>
        <symbol id="icon-building" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><line x1="8" y1="6" x2="10" y2="6"/><line x1="14" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/>
        </symbol>
        <symbol id="icon-scroll" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/><path d="M19 17V5a2 2 0 0 0-2-2H4"/>
        </symbol>
        <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </symbol>
        <symbol id="icon-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </symbol>
        <symbol id="icon-calculator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="8" y1="11" x2="8" y2="11.01"/><line x1="12" y1="11" x2="12" y2="11.01"/><line x1="16" y1="11" x2="16" y2="11.01"/><line x1="8" y1="15" x2="8" y2="15.01"/><line x1="12" y1="15" x2="12" y2="15.01"/><line x1="8" y1="19" x2="8" y2="19.01"/><line x1="12" y1="19" x2="12" y2="19.01"/>
        </symbol>
        <symbol id="icon-atom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z"/>
        </symbol>
        <symbol id="icon-flask" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3h6"/><path d="M10 9V3"/><path d="M14 9V3"/><path d="M10 9l-4.7 7.4c-.8 1.3-.1 3.1 1.5 3.5.5.1 1 .1 1.5.1h7.4c.5 0 1 0 1.5-.1 1.6-.4 2.3-2.2 1.5-3.5L14 9"/>
        </symbol>
        <symbol id="icon-dna" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993"/><path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993"/><path d="m17 6-2.5-2.5"/><path d="m14 8-1-1"/><path d="m7 18 2.5 2.5"/><path d="m3.5 14.5.5.5"/><path d="m20 9 .5.5"/><path d="m6.5 12.6 1 1"/><path d="m16.5 10.4 1 1"/>
        </symbol>
        <!-- Report Section Icons -->
        <symbol id="icon-graduation" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1 4 3 6 3s6-2 6-3v-5"/>
        </symbol>
        <symbol id="icon-palette" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
        </symbol>
        <symbol id="icon-alert-triangle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </symbol>
        <symbol id="icon-trending-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
        </symbol>
        <symbol id="icon-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
        </symbol>
    </svg>

    <div class="report-page">
        <!-- Top Bar -->
        <div class="report-topbar">
            <button class="back-btn" data-i18n-title="report.back" title="返回主頁">
                <svg class="icon"><use href="#icon-arrow-left"/></svg>
                <span data-i18n="report.back">返回主頁</span>
            </button>
            <h1 class="report-topbar__title">
                <svg class="icon"><use href="#icon-chart-bar"/></svg>
                <span data-i18n="report.title">學習分析報告</span>
            </h1>
            <div class="report-topbar__spacer"></div>
        </div>

        <div class="report-container">
            <div class="report-card">
                <div class="control-panel">
                    <div class="control-row">
                        <div class="select-wrapper">
                            <select id="subjectSelect">
                                <option value="all" selected data-i18n="report.allSubjects">全部學科</option>
                                <option value="ict">ICT</option>
                                <option value="ces">CES</option>
                                <option value="history" data-i18n="subject.history">歷史</option>
                                <option value="chinese" data-i18n="subject.chinese">中文</option>
                                <option value="english" data-i18n="subject.english">英文</option>
                                <option value="math" data-i18n="subject.math">數學</option>
                                <option value="physics" data-i18n="subject.physics">物理</option>
                                <option value="chemistry" data-i18n="subject.chemistry">化學</option>
                                <option value="biology" data-i18n="subject.biology">生物</option>
                            </select>
                        </div>

                        <button id="startAnalysisBtn" class="btn btn-primary">
                            <svg class="icon"><use href="#icon-play"/></svg>
                            <span data-i18n="report.startAnalysis">開始分析</span>
                        </button>

                        <button id="cancelAnalysisBtn" class="btn btn-danger" style="display: none;">
                            <svg class="icon"><use href="#icon-stop"/></svg>
                            <span data-i18n="report.cancelAnalysis">中斷分析</span>
                        </button>
                    </div>
                </div>

                <div id="statusMessage" class="status-message"></div>

                <div id="analyzingStatus" class="analyzing-status" style="display: none;">
                    <div class="spinner"></div>
                    <span data-i18n="report.analyzing">正在生成學習報告，請稍候...</span>
                    <small style="color: var(--text-tertiary); margin-left: var(--space-3);" data-i18n="report.analyzingEst">預計需要 10-30 秒</small>
                </div>

                <div id="welcomeState" class="welcome-state">
                    <div class="welcome-icon">
                        <svg class="icon"><use href="#icon-book-open"/></svg>
                    </div>
                    <h2 data-i18n="report.welcomeTitle">歡迎使用學習分析報告</h2>
                    <p data-i18n="report.welcomeDesc" data-i18n-html>
                        選擇您想要分析的學科，然後點擊「開始分析」按鈕。<br>
                        系統將使用 AI 技術深入分析您的學習數據，生成個性化的學習報告。
                    </p>
                    <p class="welcome-tip">
                        <svg class="icon"><use href="#icon-lightbulb"/></svg>
                        <span data-i18n="report.welcomeTip">提示：選擇「全部學科」可以獲得完整的學習概覽</span>
                    </p>
                </div>

                <div id="reportContent" class="report-content">
                    <!-- 報告內容將動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 共享工具模組 -->
    <script src="/static/js/shared/i18n.js?v=20260414"></script>
<script src="/static/js/shared/i18n/common.js?v=20260414"></script>
<script src="/static/js/shared/i18n/mistake_book.js?v=20260414"></script>
    <script src="/static/js/shared/utils.js?v=20260414"></script>
    <script src="/static/js/shared/auth.js?v=20260414"></script>
    <script src="/static/js/shared/ui.js?v=20260414"></script>
    <script src="/static/js/shared/api.js?v=20260414"></script>
    <!-- 頁面邏輯 -->
    <script src="/static/js/student_report.js?v=20260414"></script>
    <script>i18n.applyDOM();</script>
</body>
</html>
