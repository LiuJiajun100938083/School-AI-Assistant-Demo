<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培僑中學 學習夥伴</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <!-- 学习模式样式 -->
    <link rel="stylesheet" href="/static/css/learning_modes.css">
    <!-- PrismJS 代码高亮（自定义主题在 index.css 中） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <!-- MathJax配置和加载 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            startup: {
                ready() {
                    MathJax.startup.defaultReady();
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script"></script>
    <!-- GSAP 動畫引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<div class="login-bg-layer"></div>
<div class="login-edge-light"></div>
<div class="login-focus-area"></div>

<!-- 已登入用戶跳過啟動動畫（內聯腳本，最早執行） -->
<script>
    if (localStorage.getItem('auth_token') || localStorage.getItem('token')) {
        document.write('<style>#splashScreen{display:none!important}</style>');
    }
</script>

<!-- 啟動畫面（全屏居中，之後變形為左面板） -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="splash-icon">
            <img src="/static/images/ai_hourse.png" alt="AI 學習夥伴" class="splash-mascot">
        </div>
        <div class="splash-title">AI 學習夥伴</div>
        <div class="splash-subtitle">培僑中學</div>
        <div class="splash-loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>
    </div>
</div>

<!-- 登入界面：左右分屏 -->
<div id="loginContainer" class="login-container" style="display: none;">

    <!-- ====== 左側品牌面板 ====== -->
    <div class="login-brand-panel">
        <!-- 裝飾性波浪 -->
        <svg class="brand-wave" viewBox="0 0 200 600" preserveAspectRatio="none">
            <path d="M180,0 C160,100 200,200 170,300 C140,400 190,500 180,600 L200,600 L200,0 Z"
                  fill="rgba(255,255,255,0.06)"/>
            <path d="M190,0 C175,80 200,180 185,280 C170,380 195,480 190,600 L200,600 L200,0 Z"
                  fill="rgba(255,255,255,0.04)"/>
        </svg>
        <!-- 浮動裝飾圓點 -->
        <div class="brand-dots">
            <div class="brand-dot" style="top:12%;left:15%;width:8px;height:8px;opacity:0.3"></div>
            <div class="brand-dot" style="top:28%;left:75%;width:12px;height:12px;opacity:0.2"></div>
            <div class="brand-dot" style="top:55%;left:20%;width:6px;height:6px;opacity:0.25"></div>
            <div class="brand-dot" style="top:72%;left:65%;width:10px;height:10px;opacity:0.15"></div>
            <div class="brand-dot" style="top:88%;left:40%;width:7px;height:7px;opacity:0.2"></div>
        </div>

        <div class="brand-panel-content">
            <img src="/static/images/ai_hourse.png" alt="AI 學習夥伴" class="brand-mascot">
            <div class="brand-welcome">歡迎回來</div>
            <div class="brand-app-name">AI 學習夥伴</div>
            <div class="brand-school">培僑中學學生學習AI系統</div>
            <!-- 名言區域（移到左面板底部） -->
            <div class="brand-quote" id="quotesContainer">
                <div class="quote-wrapper" id="quoteWrapper">
                    <!-- 名言将由 JavaScript 动态生成 -->
                </div>
                <div class="quote-indicators" id="quoteIndicators"></div>
            </div>
        </div>
    </div>

    <!-- ====== 右側登入表單 ====== -->
    <div class="login-form-panel">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <img src="/static/images/pkms_logo.png" alt="培僑中學" style="width: 48px; height: auto;">
                </div>
                <div class="login-title">登入帳戶</div>
                <div class="login-subtitle">請輸入您的用戶名和密碼</div>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label class="input-label" for="usernameInput">用戶名</label>
                    <input type="text" id="usernameInput" class="login-input" placeholder="請輸入用戶名"
                           maxlength="20" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label class="input-label" for="passwordInput">密碼</label>
                    <input type="password" id="passwordInput" class="login-input" placeholder="請輸入密碼"
                           required autocomplete="current-password">
                </div>
                <button type="submit" id="loginButton" class="login-button">
                    <span class="btn-text">登入</span>
                    <span class="btn-icon">→</span>
                </button>
            </form>

            <div id="loginError" class="login-error"></div>
            <div id="loginLoading" class="login-loading">
                <div class="loading-spinner"><span></span></div>
            </div>
        </div>
    </div>

</div>

<!-- 密碼修改模態框 -->
<div id="changePasswordModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-title">🔐 修改密碼</div>
        <form id="changePasswordForm" class="modal-form">
            <input type="password" id="oldPasswordInput" class="modal-input" placeholder="當前密碼" required>
            <input type="password" id="newPasswordInput" class="modal-input" placeholder="新密碼（至少4位）"
                   minlength="4" required>
            <input type="password" id="confirmPasswordInput" class="modal-input" placeholder="確認新密碼" required>
            <div id="passwordError" class="modal-error"></div>
            <div class="modal-buttons">
                <button type="button" id="cancelPasswordChange" class="modal-button secondary">取消</button>
                <button type="submit" id="confirmPasswordChange" class="modal-button primary">確認修改</button>
            </div>
        </form>
    </div>
</div>

<!-- 確認刪除對話框 -->
<div id="confirmDialog" class="confirm-dialog">
    <div class="confirm-dialog-content">
        <div class="confirm-dialog-title">⚠️ 確認刪除</div>
        <div id="confirmDialogMessage" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-buttons">
            <button id="confirmCancel" class="confirm-dialog-button cancel">取消</button>
            <button id="confirmDelete" class="confirm-dialog-button danger">刪除</button>
        </div>
    </div>
</div>

<!-- 新建对话 - 科目选择弹窗 -->
<div id="newChatModal" class="modal-overlay" style="display:none;">
    <div class="new-chat-modal">
        <div class="new-chat-modal-header">
            <div class="new-chat-modal-title">開始新對話</div>
            <button class="new-chat-modal-close" id="newChatModalClose">✕</button>
        </div>
        <div class="new-chat-modal-subtitle">選擇學科</div>
        <div class="subject-grid" id="subjectGrid">
            <!-- 科目卡片由 JS 动态生成 -->
        </div>
        <div class="new-chat-name-section" id="newChatNameSection" style="display:none;">
            <div class="new-chat-name-label">對話名稱</div>
            <div class="new-chat-name-row">
                <input type="text" id="newChatNameInput" class="new-chat-name-input" placeholder="輸入對話名稱（可留空）" maxlength="50">
                <button id="newChatConfirmBtn" class="new-chat-confirm-btn">開始</button>
            </div>
        </div>
    </div>
</div>

<!-- 应用导航首页 -->
<div id="homeContainer" class="home-container" style="display: none;">
    <div class="home-header-bar">
        <div class="home-header-left">
            <img src="/static/images/pkms_logo.png" alt="培僑中學" class="home-logo">
            <span class="home-brand">培僑中學</span>
        </div>
        <div class="home-header-right">
            <div class="home-user-info" id="homeUserInfo">
                <div class="user-avatar" id="homeUserAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="homeUserName">學生</div>
                    <div class="user-class" id="homeUserClass">未分班</div>
                </div>
                <div class="user-menu" id="homeUserMenu">
                    <div class="user-menu-item" id="homeChangePassword">
                        <span>🔐 修改密碼</span>
                    </div>
                    <div class="user-menu-separator"></div>
                    <div class="user-menu-item" id="homeAdminPanel" style="display: none;">
                        <span>⚙️ 管理後台</span>
                    </div>
                    <div class="user-menu-separator" id="homeAdminSeparator" style="display: none;"></div>
                    <div class="user-menu-item" id="homeLogout">
                        <span>🚪 退出登入</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="home-content">
        <div class="home-title-section">
            <div class="home-title">AI 學習應用助手</div>
            <div class="home-subtitle">選擇下方應用開始使用</div>
        </div>
        <div class="home-apps-grid" id="homeAppsGrid">
            <!-- 应用卡片将由 JS 动态生成 -->
        </div>
    </div>
</div>

<!-- 主界面 -->
<div id="mainContainer" class="main-container" style="display: none;">
    <!-- 顶部工具栏 -->
    <div class="header">
        <div class="header-left">
            <button id="backToHomeBtn" class="back-home-btn" title="返回首頁">←</button>
            <button id="sidebarToggle" class="new-chat-btn">☰</button>
            <div id="headerTitle" class="header-title">💻 ICT AI 學習夥伴</div>
            <!-- 科目选择器（隐藏，仅作数据载体） -->
            <select id="subjectSelector" class="subject-selector" style="display:none;">
                <option value="ict">💻 ICT (載入中...)</option>
            </select>
            <!-- 添加隐藏的固定值 -->
            <input type="hidden" id="modeSelector" value="local">
        </div>
        <div class="header-right">
            <!-- 管理員按鈕（僅管理員可見） -->
            <button id="adminButton" class="admin-button" style="display: none;">
                <span>⚙️</span>管理後台
            </button>

            <div id="statusIndicator" class="status-indicator status-online">● 連接正常</div>

            <!-- 用戶資訊區域 -->
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="userName">學生</div>
                    <div class="user-class" id="userClass">未分班</div>
                </div>
                <div class="user-menu" id="userMenu">
                    <div class="user-menu-item" id="viewProfile">
                        <span>👤 個人資料</span>
                    </div>
                    <div class="user-menu-item" id="viewReport">
                        <span>📊 學習分析報告</span>
                    </div>
                    <div class="user-menu-item" id="changePassword">
                        <span>🔐 修改密碼</span>
                    </div>
                    <div class="user-menu-separator"></div>
                    <div class="user-menu-item" id="adminPanel" style="display: none;">
                        <span>⚙️ 管理後台</span>
                    </div>
                    <div class="user-menu-separator" id="adminSeparator" style="display: none;"></div>
                    <div class="user-menu-item" id="logoutButton">
                        <span>🚪 退出登入</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-container">
        <!-- 側邊欄遮罩（移動端） -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- 侧边栏 -->
        <div id="sidebar" class="sidebar">
            <!-- 關閉按鈕（移動端） -->
            <button id="sidebarCloseBtn" class="sidebar-close-btn">✕</button>
            <div class="sidebar-header">
                <h3>對話歷史</h3>
                <button id="newChatButton" class="new-chat-btn">+ 新對話</button>
            </div>
            <div id="conversationsList" class="conversations-list">
                <!-- 對話列表將在這裡動態生成 -->
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container">
            <div id="messagesContainer" class="messages-container">
                <div class="welcome-message">
                    <div class="welcome-title">歡迎使用 AI 學習夥伴！</div>
                    <div class="welcome-subtitle">選擇科目並開始提問吧</div>
                    <div class="feature-list" id="featureList">
                        <!-- 功能列表将动态生成 -->
                    </div>
                </div>
            </div>

            <!-- ChatGPT风格输入区域 -->
            <div class="input-container" id="inputContainer">
                <!-- 当前对话中的文件显示区域 -->
                <div class="conversation-files" id="conversationFiles" style="display: none;">
                    <!-- 文件将在这里显示 -->
                </div>

                <div class="input-row">
                    <button class="file-upload-btn" id="fileUploadBtn" title="上傳檔案到當前對話">📎</button>
                    <input type="file" id="fileUploadInput" class="file-upload-input"
                           accept=".txt,.docx,.pdf,.pptx,.md" multiple>

                    <textarea id="messageInput" class="message-input"
                              placeholder="輸入訊息或拖曳檔案到此處..." rows="1"></textarea>

                    <!-- 思考模式开关 -->
                    <label class="thinking-toggle" id="thinkingToggleLabel" title="開啟後 AI 會先進行深度推理再回答，適合複雜問題">
                        <input type="checkbox" id="thinkingToggle" checked>
                        <span class="thinking-toggle-slider"></span>
                        <span class="thinking-toggle-text" id="thinkingToggleText">深度思考</span>
                    </label>

                    <button id="sendButton" class="send-button">發送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 共享模組 -->
<script src="/static/js/learning_modes_frontend.js"></script>
<script src="/static/js/learning_summary.js"></script>
<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/index.js"></script>
</body>
</html>
