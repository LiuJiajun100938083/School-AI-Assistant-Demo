<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策問 · QUAERO</title>
    <!-- Old Money 字體：Cormorant Garamond (serif) + Inter (sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/index.css?v=20260419">
    <link rel="stylesheet" href="/static/css/pet.css?v=20260414">
    <link rel="stylesheet" href="/static/css/spinner.css?v=20260419">
    <!-- GSAP 動畫引擎（啟動畫面） -->
    <script src="/static/vendor/gsap/gsap.min.js"></script>
</head>
<body>
<!-- 未登入用戶直接跳轉登入頁（最早執行，零閃爍） -->
<script>
    if (!localStorage.getItem('auth_token') && !localStorage.getItem('token') && !localStorage.getItem('refresh_token')) {
        window.location.replace('/login');
    }
</script>

<!-- ====== 動態虛化背景（與 login 同款 — Old Money 沉穩 blob） ====== -->
<div class="liquid-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>

<!-- 第一幕：系統喚醒 -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="splash-icon">
        </div>
        <div class="splash-title" data-i18n="home.splashTitle">校園AI助手</div>
        <div class="splash-subtitle" data-i18n="home.splashSubtitle"></div>
        <!-- Editorial ink-stroke loader — draws + erases a brass hairline -->
        <div class="splash-loader">
            <div class="quaero-loader" aria-label="Loading">
                <span class="quaero-loader__track">
                    <span class="quaero-loader__ink"></span>
                </span>
                <span class="quaero-loader__text">IN · QVAERENDO</span>
            </div>
        </div>
    </div>
</div>

<!-- 過渡遮罩層 -->
<div class="glass-panel" id="glassPanel"></div>

<!-- ╔═══════════════════════════════════════════════════╗
     ║  About · 關於「策問 QUAERO」的名字               ║
     ╚═══════════════════════════════════════════════════╝ -->
<div id="aboutModal" class="modal-overlay about-overlay" aria-hidden="true">
    <div class="modal about-modal" role="dialog" aria-labelledby="aboutTitle">
        <button type="button" class="about-close" id="aboutClose" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>

        <div class="about-kicker">
            <span class="lobby-hairline lobby-hairline--left"></span>
            <span class="about-kicker-text" data-i18n="about.divider">學而後問 · 問而後識</span>
            <span class="lobby-hairline lobby-hairline--right"></span>
        </div>

        <h2 class="about-title" id="aboutTitle" data-i18n="about.title">策問 · QUAERO</h2>
        <p class="about-subtitle" data-i18n="about.subtitle">古典策問 × AI 檢索</p>

        <div class="about-divider" aria-hidden="true"></div>

        <section class="about-entry">
            <h3 class="about-entry__heading" data-i18n="about.ceWenHeading">策問  Cè Wèn</h3>
            <p class="about-entry__body" data-i18n="about.ceWenBody">
                古代科舉考試的一種答卷體裁 — 由朝廷提出時政之問，士子作答論述。天然是古代的「人機問答」。
            </p>
        </section>

        <section class="about-entry">
            <h3 class="about-entry__heading" data-i18n="about.quaeroHeading">Quaero</h3>
            <p class="about-entry__body" data-i18n="about.quaeroBody">
                拉丁文「我尋求」（第一人稱單數現在式）。亦為 2006 年歐洲發起的知識檢索計畫之名。
            </p>
        </section>

        <div class="about-footer">
            <span class="about-monogram-seal">Q</span>
        </div>
    </div>
</div>

<!-- 密碼修改模態框 -->
<div id="changePasswordModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-title" data-i18n="password.title">修改密碼</div>
        <form id="changePasswordForm" class="modal-form">
            <input type="password" id="oldPasswordInput" class="modal-input" data-i18n-placeholder="password.current" placeholder="當前密碼" required>
            <input type="password" id="newPasswordInput" class="modal-input" data-i18n-placeholder="password.new" placeholder="新密碼（至少8位）"
                   minlength="8" required>
            <input type="password" id="confirmPasswordInput" class="modal-input" data-i18n-placeholder="password.confirmNew" placeholder="確認新密碼" required>
            <div id="passwordError" class="modal-error"></div>
            <div class="modal-buttons">
                <button type="button" id="cancelPasswordChange" class="modal-button secondary" data-i18n="common.cancel">取消</button>
                <button type="submit" id="confirmPasswordChange" class="modal-button primary" data-i18n="password.confirmBtn">確認修改</button>
            </div>
        </form>
    </div>
</div>

<!-- ========================================================
     Club Foyer Layout — Apple × Old Money 主頁 v5
     - 浮動薄 header（玻璃藥丸形）
     - 編輯式 Hero 大標
     - 分類 chips 橫向一列
     - Bento Grid（首卡 2×2 hero，其餘 1×1）
     ======================================================== -->
<div id="homeContainer" class="lobby">

    <!-- ▸ Floating Header Pill ───────────────────────────── -->
    <header class="lobby-topbar">
        <button type="button" class="lobby-topbar__brand" id="openAbout"
                aria-label="About the name" title="關於此名">
            <span class="lobby-topbar__monogram" aria-hidden="true">Q</span>
            <span class="lobby-topbar__wordmark" data-i18n="app.fullName">策問 · QUAERO</span>
        </button>
        <div class="lobby-topbar__right">
            <button class="lobby-topbar__lang" onclick="i18n.toggle()" title="Switch Language" aria-label="Switch Language">
                <span id="homeLangLabel"></span>
            </button>
            <div class="lobby-topbar__user home-user-info" id="homeUserInfo">
                <div class="user-avatar lobby-user-avatar" id="homeUserAvatar">A</div>
                <div class="user-details lobby-user-details">
                    <div class="user-name lobby-user-name" id="homeUserName" data-i18n="home.defaultUser">學生</div>
                    <div class="user-class lobby-user-class" id="homeUserClass" data-i18n="home.defaultClass">未分班</div>
                </div>
                <div class="user-menu lobby-user-menu" id="homeUserMenu">
                    <div class="user-menu-item" id="homeChangePassword">
                        <span data-i18n="menu.changePassword">修改密碼</span>
                    </div>
                    <div class="user-menu-separator"></div>
                    <div class="user-menu-item" id="homeAdminPanel" style="display: none;">
                        <span data-i18n="menu.admin">管理後台</span>
                    </div>
                    <div class="user-menu-separator" id="homeAdminSeparator" style="display: none;"></div>
                    <div class="user-menu-item" id="homeLogout">
                        <span data-i18n="menu.logout">退出登入</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ▸ Main Stack ────────────────────────────────────── -->
    <main class="lobby-main">

        <!-- Hero / Editorial Masthead -->
        <section class="lobby-hero home-welcome" id="homeWelcome">
            <div class="lobby-hero__kicker">
                <span class="lobby-hairline lobby-hairline--left"></span>
                <span class="lobby-hero__chapter" id="homeHeroChapter" data-i18n="home.chapter">QUAERO</span>
                <span class="lobby-hairline lobby-hairline--right"></span>
            </div>
            <h1 class="lobby-hero__title" id="homeWelcomeTitle" data-i18n="home.welcomeBack">歡迎回來</h1>
            <p class="lobby-hero__subtitle" data-i18n="home.subtitle">選擇下方應用開始使用</p>

            <!-- Stats row（保留 homeWelcomeStats id 讓 JS 填） -->
            <div class="lobby-hero__stats" id="homeWelcomeStats"></div>
        </section>

        <!-- Category Chips（用 JS 已有 homeFilterBar 的 DOM 目標；取代 sidebar） -->
        <nav class="lobby-chips home-filter-bar" id="homeFilterBar" aria-label="Categories">
            <!-- JS 動態生成 chip -->
        </nav>

        <!-- Bento App Grid（保留 homeAppsGrid id） -->
        <section class="lobby-bento home-apps-grid" id="homeAppsGrid">
            <!-- JS 動態生成 groups + cards -->
        </section>

    </main>

    <!-- Hidden sidebar (保留給 JS 填寫，但視覺上隱藏) -->
    <aside class="home-sidebar lobby-hidden-sidebar" id="homeSidebar" aria-hidden="true">
        <nav class="home-sidebar__nav" id="homeSidebarNav"></nav>
        <div id="homePetWidget" class="home-sidebar__pet" style="display:none;"></div>
    </aside>
</div>

<!-- 漫游桌面宠物（fixed 浮动，JS 控制位置） -->
<div id="roamingPet" class="home-roaming-pet" style="display:none;">
    <div class="home-roaming-pet__bubble" id="roamingPetBubble" style="display:none;"></div>
    <canvas id="roamingPetCanvas" width="256" height="256"></canvas>
    <div class="home-roaming-pet__info" id="roamingPetInfo"></div>
</div>

<script src="/static/js/shared/i18n.js?v=20260414"></script>
<script src="/static/js/shared/i18n/common.js?v=20260414"></script>
<script>
    document.title = i18n.t('home.pageTitle');
    i18n.applyDOM();
    var ll = document.getElementById('homeLangLabel');
    if (ll) ll.textContent = i18n.isZh ? 'EN' : '中文';
</script>
<script src="/static/js/shared/utils.js?v=20260414"></script>
<script src="/static/js/shared/auth.js?v=20260414"></script>
<script src="/static/js/shared/ui.js?v=20260414"></script>
<script src="/static/js/shared/api.js?v=20260414"></script>
<script src="/static/js/shared/decrypt_text.js?v=20260414"></script>
<script src="/static/js/pet_renderer.js?v=20260414"></script>
<script src="/static/js/shared/i18n/pet.js?v=20260414"></script>
<script src="/static/js/index.js?v=20260419"></script>
<script>
    /* About modal — 點 monogram 顯示「為什麼叫策問 QUAERO」 */
    (function () {
        const trigger = document.getElementById('openAbout');
        const modal   = document.getElementById('aboutModal');
        const closer  = document.getElementById('aboutClose');
        if (!trigger || !modal) return;
        function open(e) {
            if (e) e.stopPropagation();
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
        }
        function close() {
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
        }
        trigger.addEventListener('click', open);
        if (closer) closer.addEventListener('click', close);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) close();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) close();
        });
    })();
</script>
</body>
</html>
