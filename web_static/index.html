<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園AI助手</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <script src="/static/js/shared/theme.js"></script>
    <link rel="stylesheet" href="/static/css/spinner.css">
    <!-- GSAP 動畫引擎（啟動畫面） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
<!-- 未登入用戶直接跳轉登入頁（最早執行，零閃爍） -->
<script>
    if (!localStorage.getItem('auth_token') && !localStorage.getItem('token') && !localStorage.getItem('refresh_token')) {
        window.location.replace('/login');
    }
</script>

<!-- 第一幕：系統喚醒 -->
<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="splash-icon">
        </div>
        <div class="splash-title" data-i18n="home.splashTitle">校園AI助手</div>
        <div class="splash-subtitle" data-i18n="home.splashSubtitle"></div>
        <div class="splash-loader">
            <div class="domino-spinner domino-spinner--light"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        </div>
    </div>
</div>

<!-- 過渡遮罩層 -->
<div class="glass-panel" id="glassPanel"></div>

<!-- 密碼修改模態框 -->
<div id="changePasswordModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-title" data-i18n="password.title">修改密碼</div>
        <form id="changePasswordForm" class="modal-form">
            <input type="password" id="oldPasswordInput" class="modal-input" data-i18n-placeholder="password.current" placeholder="當前密碼" required>
            <input type="password" id="newPasswordInput" class="modal-input" data-i18n-placeholder="password.new" placeholder="新密碼（至少4位）"
                   minlength="4" required>
            <input type="password" id="confirmPasswordInput" class="modal-input" data-i18n-placeholder="password.confirmNew" placeholder="確認新密碼" required>
            <div id="passwordError" class="modal-error"></div>
            <div class="modal-buttons">
                <button type="button" id="cancelPasswordChange" class="modal-button secondary" data-i18n="common.cancel">取消</button>
                <button type="submit" id="confirmPasswordChange" class="modal-button primary" data-i18n="password.confirmBtn">確認修改</button>
            </div>
        </form>
    </div>
</div>

<!-- 主界面 -->
<div id="homeContainer" class="home-container">
    <!-- HEADER -->
    <header class="home-header">
        <div class="home-header__left">
            <span class="home-header__brand" data-i18n="app.name">校園AI助手</span>
        </div>
        <div class="home-header__right">
            <div class="home-user-info" id="homeUserInfo">
                <div class="user-avatar" id="homeUserAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="homeUserName" data-i18n="home.defaultUser">學生</div>
                    <div class="user-class" id="homeUserClass" data-i18n="home.defaultClass">未分班</div>
                </div>
                <div class="user-menu" id="homeUserMenu">
                    <div class="user-menu-item" id="homeChangePassword">
                        <span data-i18n="menu.changePassword">修改密碼</span>
                    </div>
                    <div class="user-menu-separator"></div>
                    <div class="user-menu-item" id="homeAdminPanel" style="display: none;">
                        <span data-i18n="menu.admin">管理後台</span>
                    </div>
                    <div class="user-menu-separator" id="homeAdminSeparator" style="display: none;"></div>
                    <div class="user-menu-item" id="homeLogout">
                        <span data-i18n="menu.logout">退出登入</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- BODY: SIDEBAR + MAIN -->
    <div class="home-body">
        <!-- SIDEBAR -->
        <aside class="home-sidebar" id="homeSidebar">
            <nav class="home-sidebar__nav" id="homeSidebarNav">
                <!-- JS 動態生成分類導航 -->
            </nav>
            <div class="home-sidebar__footer">
                <button class="home-sidebar__lang-toggle" onclick="i18n.toggle()" title="Switch Language">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span id="homeLangLabel"></span>
                </button>
                <div class="home-sidebar__version">v3.0</div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="home-main">
            <!-- 歡迎橫幅 -->
            <section class="home-welcome" id="homeWelcome">
                <div class="home-welcome__text">
                    <div>
                        <h1 class="home-welcome__title" id="homeWelcomeTitle" data-i18n="home.welcomeBack">歡迎回來</h1>
                        <p class="home-welcome__subtitle" data-i18n="home.subtitle">選擇下方應用開始使用</p>
                    </div>
                </div>
                <div class="home-welcome__stats" id="homeWelcomeStats">
                    <!-- JS 動態生成統計 -->
                </div>
            </section>

            <!-- 分類過濾 (手機用) -->
            <div class="home-filter-bar" id="homeFilterBar">
                <!-- JS 動態生成 -->
            </div>

            <!-- 應用卡片網格 -->
            <div class="home-apps-grid" id="homeAppsGrid">
                <!-- JS 動態生成 -->
            </div>
        </main>
    </div>
</div>

<script src="/static/js/shared/i18n.js"></script>
<script>
    document.title = i18n.t('home.pageTitle');
    i18n.applyDOM();
    var ll = document.getElementById('homeLangLabel');
    if (ll) ll.textContent = i18n.isZh ? 'EN' : '中文';
</script>
<script src="/static/js/shared/utils.js"></script>
<script src="/static/js/shared/auth.js"></script>
<script src="/static/js/shared/ui.js"></script>
<script src="/static/js/shared/api.js"></script>
<script src="/static/js/shared/decrypt_text.js"></script>
<script src="/static/js/index.js"></script>
</body>
</html>
